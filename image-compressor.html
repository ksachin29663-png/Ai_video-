<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Image Compressor & KB Resizer - Sachin AI</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.4);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: #334155;
            --success: #22c55e;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, sans-serif; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 12px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 650px;
            padding: 20px 0;
            text-align: center;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
        }

        .logo { font-size: 1.5rem; font-weight: 800; color: var(--accent); letter-spacing: -0.5px; }
        .tagline { font-size: 0.85rem; color: var(--text-dim); margin-top: 4px; }

        .container {
            width: 100%;
            max-width: 650px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.5);
        }

        .upload-box {
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(15, 23, 42, 0.3);
            position: relative;
            overflow: hidden;
        }

        .upload-box:hover { border-color: var(--accent); background: rgba(56, 189, 248, 0.05); transform: translateY(-2px); }
        .upload-box i { font-size: 3rem; display: block; margin-bottom: 12px; }
        .upload-text { font-weight: 600; font-size: 1.1rem; }
        .upload-sub { font-size: 0.8rem; color: var(--text-dim); margin-top: 6px; }

        #fileInput { display: none; }

        .editor-view { display: none; margin-top: 24px; }

        .controls-grid {
            display: grid;
            gap: 20px;
            background: rgba(15, 23, 42, 0.5);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            margin-bottom: 24px;
        }

        .control-item { display: flex; flex-direction: column; gap: 10px; }
        .label-row { display: flex; justify-content: space-between; align-items: center; }
        .label-text { font-size: 0.9rem; font-weight: 600; color: var(--text-dim); }
        .label-val { font-size: 0.9rem; font-weight: 700; color: var(--accent); background: rgba(56, 189, 248, 0.1); padding: 2px 8px; border-radius: 6px; }

        input[type="range"] {
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 10px;
            appearance: none;
            outline: none;
            accent-color: var(--accent);
        }

        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: rgba(15, 23, 42, 0.4);
            padding: 16px;
            border-radius: 14px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .stat-label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
        .stat-value { font-size: 1.1rem; font-weight: 800; }

        .preview-area {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            margin-bottom: 24px;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 200px;
        }

        #previewImg { max-width: 100%; max-height: 400px; display: block; }

        .btn-group { display: flex; flex-direction: column; gap: 12px; }

        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary { background: var(--accent); color: var(--bg); box-shadow: 0 4px 15px var(--accent-glow); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px var(--accent-glow); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-outline:hover { background: rgba(255,255,255,0.05); }

        .toast {
            position: fixed;
            bottom: 24px;
            background: var(--success);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: none;
            z-index: 1000;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        @media (max-width: 480px) {
            .container { padding: 16px; }
            .stats-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">Sachin AI Studio</div>
    <div class="tagline">Advanced Image Compressor & KB Resizer</div>
</header>

<div class="container">
    <div class="upload-box" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <span style="font-size: 3rem;">📸</span>
        <div class="upload-text">Select Image to Compress</div>
        <div class="upload-sub">Supports JPG, PNG, WEBP (Max 20MB)</div>
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <div class="editor-view" id="editorView">
        <div class="controls-grid">
            <div class="control-item">
                <div class="label-row">
                    <span class="label-text">Compression Quality</span>
                    <span class="label-val" id="qVal">80%</span>
                </div>
                <input type="range" id="qInput" min="1" max="100" value="80">
            </div>
            <div class="control-item">
                <div class="label-row">
                    <span class="label-text">Resize Scale</span>
                    <span class="label-val" id="sVal">100%</span>
                </div>
                <input type="range" id="sInput" min="10" max="100" value="100">
            </div>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-label">Original Size</div>
                <div class="stat-value" id="oSize">0 KB</div>
            </div>
            <div class="stat-card" style="border-color: var(--accent);">
                <div class="stat-label" style="color: var(--accent);">Target Size</div>
                <div class="stat-value" id="cSize" style="color: var(--accent);">0 KB</div>
            </div>
        </div>

        <div class="preview-area">
            <img id="previewImg" alt="Preview">
        </div>

        <div class="btn-group">
            <button class="btn btn-primary" id="downloadBtn">⬇️ Download Compressed Image</button>
            <button class="btn btn-outline" onclick="location.reload()">🔄 Start New</button>
        </div>
    </div>
</div>

<div class="toast" id="toast">Image Compressed Successfully!</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const editorView = document.getElementById('editorView');
    const uploadBox = document.getElementById('dropZone');
    const qInput = document.getElementById('qInput');
    const sInput = document.getElementById('sInput');
    const qVal = document.getElementById('qVal');
    const sVal = document.getElementById('sVal');
    const oSizeText = document.getElementById('oSize');
    const cSizeText = document.getElementById('cSize');
    const previewImg = document.getElementById('previewImg');
    const downloadBtn = document.getElementById('downloadBtn');
    const toast = document.getElementById('toast');

    let originalImg = null;
    let fileName = "compressed_image";

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) processFile(file);
    });

    function processFile(file) {
        fileName = file.name.split('.')[0];
        oSizeText.textContent = formatBytes(file.size);
        
        const reader = new FileReader();
        reader.onload = (e) => {
            originalImg = new Image();
            originalImg.onload = () => {
                uploadBox.style.display = 'none';
                editorView.style.display = 'block';
                updateCompression();
            };
            originalImg.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function updateCompression() {
        if (!originalImg) return;

        const quality = qInput.value / 100;
        const scale = sInput.value / 100;
        
        qVal.textContent = qInput.value + '%';
        sVal.textContent = sInput.value + '%';

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');

        const width = originalImg.width * scale;
        const height = originalImg.height * scale;

        canvas.width = width;
        canvas.height = height;
        ctx.drawImage(originalImg, 0, 0, width, height);

        canvas.toBlob((blob) => {
            const url = URL.createObjectURL(blob);
            previewImg.src = url;
            cSizeText.textContent = formatBytes(blob.size);
            
            downloadBtn.onclick = () => {
                const a = document.createElement('a');
                a.href = url;
                a.download = `${fileName}_sachin_ai.jpg`;
                a.click();
                showToast();
            };
        }, 'image/jpeg', quality);
    }

    qInput.oninput = updateCompression;
    sInput.oninput = updateCompression;

    function formatBytes(bytes) {
        if (bytes === 0) return '0 Bytes';
        const k = 1024;
        const sizes = ['Bytes', 'KB', 'MB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    function showToast() {
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }

    // Drag & Drop
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(e => {
        uploadBox.addEventListener(e, (evt) => {
            evt.preventDefault();
            evt.stopPropagation();
        });
    });

    uploadBox.addEventListener('drop', (e) => {
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) processFile(file);
    });
</script>

</body>
</html>
