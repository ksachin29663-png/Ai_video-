  <label>Story Idea / Plot (optional)</label>
  <textarea id="plot" placeholder="जैसे: एक लड़की को पुरानी haveli में रहस्यमयी आवाजें आती हैं...&#10;या खाली छोड़ो — AI खुद story बनाएगा!"></textarea>

</div>
<div class="card" id="resultCard" style="display:none">

<script>
const state={genre:'Romantic',len:'Short (300-500 words)'};
function pick(el,key){document.querySelectorAll('[onclick*="pick(this,\''+key+'\'"]').forEach(e=>e.classList.remove('active'));el.classList.add('active');state[key]=el.dataset.val;}
async function generate(){
  const btn=document.getElementById('btn');btn.disabled=true;btn.textContent='⏳ Story लिखी जा रही है...';
  document.getElementById('err').style.display='none';
  const chars=document.getElementById('chars').value.trim();
  const plot=document.getElementById('plot').value.trim();
  const prompt=`You are a talented Hindi story writer. Write a ${state.genre} story that is ${state.len}.
${chars?'Main Characters: '+chars:''}
${plot?'Story Idea: '+plot:'Create an original, engaging story.'}

Requirements:
- Write in beautiful Hindi (हिंदी)
- Start with an engaging title
- Include vivid descriptions, dialogue, emotions
- ${state.genre==='Horror/Thriller'?'Build suspense and create real fear':''}
- ${state.genre==='Children/Moral'?'Include a moral lesson at the end':''}
- ${state.genre==='Motivational'?'Inspire and motivate the reader':''}
- End satisfyingly
- Use proper paragraphs

Write the complete story now:`;
  try{
    const r=await fetch('/generate-content',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt})});
    const d=await r.json();if(!r.ok)throw new Error(d.error||'Error');
    document.getElementById('result').textContent=d.result;
    document.getElementById('resultCard').style.display='block';
    document.getElementById('resultCard').scrollIntoView({behavior:'smooth'});
  }catch(e){const err=document.getElementById('err');err.textContent='❌ '+e.message;err.style.display='block';}
  finally{btn.disabled=false;btn.textContent='📖 Story लिखो';}
}
function copyText(){navigator.clipboard.writeText(document.getElementById('result').textContent).then(()=>alert('Copied! 📋'));}
</script>
