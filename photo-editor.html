.adj-label{display:flex;justify-content:space-between;font-size:12px;color:#8b949e}
.adj-label span:last-child{color:#58a6ff;font-weight:600;min-width:36px;text-align:right}
input[type=range]{width:100%;accent-color:#f78166;height:4px;cursor:pointer}

        </div>
        <input type="range" min="${cfg.min}" max="${cfg.max}" value="${cfg.val}" id="adj-${key}"
          oninput="ADJS['${key}'].val=+this.value;document.getElementById('val-${key}').innerHTML='${cfg.val}${cfg.unit} <span class=\"adj-reset\" onclick=\"resetAdj(\\\'${key}\\\')\">↺</span>';document.getElementById('val-${key}').childNodes[0].textContent=this.value+'${cfg.unit} ';renderCanvas()">
      </div>`;
  }
}

function buildFrames() {
  const g = document.getElementById('framesGrid');
  g.innerHTML = FRAMES.map(f => `
    <div class="frame-btn${f.id===activeFrame?' active':''}" onclick="setFrame('${f.id}',this)">
      ${f.icon}<span>${f.label}</span>
    </div>`).join('');
}

function buildFilters() {
  const grid = document.getElementById('filtersGrid');
  grid.innerHTML = '';
  FILTERS.forEach(([name]) => {
    const div = document.createElement('div');
    div.className = 'filter-thumb' + (name===activeFilter?' active':'');
    div.id = 'ft-' + name;
    const c = document.createElement('canvas');
    c.width = 90; c.height = 70;
    const label = document.createElement('div');
    label.className = 'filter-name';
    label.textContent = name;
    div.appendChild(c);
    div.appendChild(label);
    div.onclick = () => applyFilter(name);
    grid.appendChild(div);
  });
}

// ════════════════════════════════════════════════════════════════════
// LOAD IMAGE
// ════════════════════════════════════════════════════════════════════
function loadImage(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      origImg = img;
      rotation = 0; flipH = false; flipV = false;
      activeFilter = 'Normal'; activeFrame = 'none';
      resetAllAdjs();
      rebuildBase();
      document.getElementById('uploadZone').style.display = 'none';
      document.getElementById('editorContainer').classList.add('show');
      updateFilterThumbs();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('uploadZone').classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) loadImage({ target: { files: [file] } });
}

function changeImage() {
  document.getElementById('uploadZone').style.display = 'block';
  document.getElementById('editorContainer').classList.remove('show');
  document.getElementById('fileInput').value = '';
}

// ════════════════════════════════════════════════════════════════════
// CANVAS OPERATIONS
// ════════════════════════════════════════════════════════════════════
function rebuildBase() {
  const maxW = Math.min(origImg.width, 1400);
  const scale = maxW / origImg.width;
  let w = Math.round(origImg.width * scale);
  let h = Math.round(origImg.height * scale);
  // Apply rotation dimensions
  const isOdd = (rotation / 90) % 2 !== 0;
  baseCanvas.width  = isOdd ? h : w;
  baseCanvas.height = isOdd ? w : h;
  const bc = baseCanvas.getContext('2d');
  bc.save();
  bc.translate(baseCanvas.width / 2, baseCanvas.height / 2);
  bc.rotate(rotation * Math.PI / 180);
  if (flipH) bc.scale(-1, 1);
  if (flipV) bc.scale(1, -1);
  bc.drawImage(origImg, -w/2, -h/2, w, h);
  bc.restore();
  renderCanvas();
}

function getFilterCSS(name, adjs) {
  const f = Object.fromEntries(FILTERS.filter(([n])=>n===name).map(([,v])=>[name,v]))[name] || {};
  const b  = (1 + (adjs.brightness.val + (adjs.exposure.val * 0.5)) / 100) * (f.brightness||1);
  const c  = (1 + adjs.contrast.val / 100) * (f.contrast||1);
  const s  = (1 + adjs.saturation.val / 100) * (f.saturate||1);
  const h  = (adjs.hue.val) + (typeof f.hue === 'string' ? parseInt(f.hue)||0 : 0);
  const se = Math.min(1, (adjs.sepia.val / 100) + (f.sepia||0));
  const g  = Math.min(1, (adjs.grayscale.val / 100) + (f.grayscale||0));
  const iv = adjs.invert.val / 100;
  const bl = adjs.blur.val + (f.blur||0);
  const fa = adjs.fade.val / 100;
  const op = 1 - fa * 0.3;
  return `brightness(${b}) contrast(${c}) saturate(${s}) hue-rotate(${h}deg) sepia(${se}) grayscale(${g}) invert(${iv}) blur(${bl}px) opacity(${op})`;
}

function renderCanvas() {
  const mc = document.getElementById('mainCanvas');
  const bw = baseCanvas.width, bh = baseCanvas.height;

  // Frame padding
  const fp = getFramePad();
  mc.width  = bw + fp.l + fp.r;
  mc.height = bh + fp.t + fp.b;

  const ctx = mc.getContext('2d');
  ctx.clearRect(0, 0, mc.width, mc.height);

  // Draw frame bg
  drawFrameBg(ctx, mc.width, mc.height, fp);

  // Apply CSS filter via offscreen canvas
  const off = document.createElement('canvas');
  off.width = bw; off.height = bh;
  const oc = off.getContext('2d');
  oc.drawImage(baseCanvas, 0, 0);

  // Apply warmth as color tint
  const wt = ADJS.warmth.val;
  if (wt !== 0) {
    oc.globalCompositeOperation = 'multiply';
    oc.fillStyle = wt > 0
      ? `rgba(${Math.round(wt*1.5)},${Math.round(wt*0.5)},0,${Math.abs(wt)/300})`
      : `rgba(0,${Math.round(-wt*0.5)},${Math.round(-wt*1.5)},${Math.abs(wt)/300})`;
    oc.fillRect(0, 0, bw, bh);
    oc.globalCompositeOperation = 'source-over';
  }

  // Highlights / Shadows tint
  const hl = ADJS.highlights.val, sh = ADJS.shadows.val;
  if (hl !== 0) {
    oc.globalCompositeOperation = 'screen';
    oc.fillStyle = `rgba(255,255,255,${Math.abs(hl)/500})`;
    oc.fillRect(0, 0, bw, bh);
    oc.globalCompositeOperation = 'source-over';
  }

  // Draw with CSS filter
  ctx.filter = getFilterCSS(activeFilter, ADJS);
  ctx.drawImage(off, fp.l, fp.t);
  ctx.filter = 'none';

  // Vignette
  const vig = ADJS.vignette.val;
  if (vig > 0) {
    const grad = ctx.createRadialGradient(mc.width/2, mc.height/2, mc.width*0.3, mc.width/2, mc.height/2, mc.width*0.8);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, `rgba(0,0,0,${vig/100})`);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, mc.width, mc.height);
  }

  // Film grain
  const grain = ADJS.grain.val;
  if (grain > 0) {
    const imgd = ctx.getImageData(fp.l, fp.t, bw, bh);
    const d = imgd.data;
    const intensity = grain * 0.8;
    for (let i = 0; i < d.length; i += 4) {
      const n = (Math.random() - 0.5) * intensity;
      d[i] += n; d[i+1] += n; d[i+2] += n;
    }
    ctx.putImageData(imgd, fp.l, fp.t);
  }

  // Frame border decoration
  drawFrameDeco(ctx, mc.width, mc.height, fp);

  // Text overlay
  const txt = document.getElementById('textInput')?.value;
  if (txt) {
    const fs = +document.getElementById('fontSize').value || 32;
    const ff = document.getElementById('fontFamily').value || 'Arial';
    const fc = document.getElementById('textColor').value;
    const sc = document.getElementById('shadowColor').value;
    const bold = document.getElementById('boldText').checked;
    const tx = (+document.getElementById('textX').value / 100) * mc.width;
    const ty = (+document.getElementById('textY').value / 100) * mc.height;
    const align = document.getElementById('textAlign').value || 'center';
    ctx.font = `${bold?'bold ':''} ${fs}px ${ff}`;
    ctx.textAlign = align;
    ctx.shadowColor = sc;
    ctx.shadowBlur = 6;
    ctx.fillStyle = fc;
    txt.split('\n').forEach((line, i) => ctx.fillText(line, tx, ty + i * (fs + 4)));
    ctx.shadowBlur = 0;
  }

  saveHistory();
  updateFilterThumbs();
}

// ════════════════════════════════════════════════════════════════════
// FRAMES
// ════════════════════════════════════════════════════════════════════
function getFramePad() {
  const pads = {
    none:     { l:0,r:0,t:0,b:0 },
    white:    { l:20,r:20,t:20,b:20 },
    black:    { l:20,r:20,t:20,b:20 },
    gold:     { l:16,r:16,t:16,b:16 },
    round:    { l:16,r:16,t:16,b:16 },
    shadow:   { l:12,r:12,t:12,b:12 },
    double:   { l:24,r:24,t:24,b:24 },
    neon:     { l:20,r:20,t:20,b:20 },
    film:     { l:30,r:30,t:60,b:60 },
    polaroid: { l:20,r:20,t:20,b:80 },
  };
  return pads[activeFrame] || pads.none;
}

function drawFrameBg(ctx, w, h, fp) {
  switch (activeFrame) {
    case 'white':    ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h); break;
    case 'black':    ctx.fillStyle='#111'; ctx.fillRect(0,0,w,h); break;
    case 'gold':     ctx.fillStyle='#c9a84c'; ctx.fillRect(0,0,w,h); break;
    case 'neon':     ctx.fillStyle='#0d0d0d'; ctx.fillRect(0,0,w,h); break;
    case 'film':     ctx.fillStyle='#1a1a1a'; ctx.fillRect(0,0,w,h); break;
    case 'polaroid': ctx.fillStyle='#f8f5f0'; ctx.fillRect(0,0,w,h); break;
    case 'double':   ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h); break;
    case 'shadow':   ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h); break;
    default: ctx.fillStyle='#0d1117'; ctx.fillRect(0,0,w,h);
  }
}

function drawFrameDeco(ctx, w, h, fp) {
  switch (activeFrame) {
    case 'gold':
      ctx.strokeStyle='#8a6a00'; ctx.lineWidth=3;
      ctx.strokeRect(4,4,w-8,h-8);
      ctx.strokeStyle='#ffd700'; ctx.lineWidth=1;
      ctx.strokeRect(8,8,w-16,h-16);
      break;
    case 'double':
      ctx.strokeStyle='#333'; ctx.lineWidth=2; ctx.strokeRect(4,4,w-8,h-8);
      ctx.strokeStyle='#333'; ctx.lineWidth=1; ctx.strokeRect(10,10,w-20,h-20);
      break;
    case 'neon':
      ctx.shadowColor='#00ffff'; ctx.shadowBlur=12;
      ctx.strokeStyle='#00ffff'; ctx.lineWidth=2;
      ctx.strokeRect(6,6,w-12,h-12);
      ctx.shadowColor='#ff00ff'; ctx.shadowBlur=12;
      ctx.strokeStyle='#ff00ff'; ctx.lineWidth=1;
      ctx.strokeRect(10,10,w-20,h-20);
      ctx.shadowBlur=0;
      break;
    case 'film':
      ctx.fillStyle='#fff'; ctx.font='bold 14px monospace';
      ctx.textAlign='center';
      ctx.fillText('📷 SACHIN AI STUDIO', w/2, 35);
      ctx.fillStyle='#555'; ctx.font='11px monospace';
      ctx.fillText('KODAK GOLD 200', w/2, h-15);
      // Sprocket holes
      for (let i = 20; i < h-30; i += 28) {
        ctx.fillStyle='#333'; ctx.fillRect(6, i, 14, 18); ctx.fillRect(w-20, i, 14, 18);
      }
      break;
    case 'polaroid':
      ctx.fillStyle='#888'; ctx.font='bold 16px Arial';
      ctx.textAlign='center';
      ctx.fillText(document.getElementById('textInput')?.value.split('\n')[0] || 'Sachin AI', w/2, h-20);
      break;
    case 'round':
      ctx.save();
      ctx.beginPath(); ctx.roundRect(fp.l-2,fp.t-2,w-fp.l-fp.r+4,h-fp.t-fp.b+4, 20);
      ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=2; ctx.stroke();
      ctx.restore();
      break;
    case 'shadow':
      ctx.shadowColor='rgba(0,0,0,0.5)'; ctx.shadowBlur=20;
      ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=2;
      ctx.strokeRect(fp.l,fp.t,w-fp.l-fp.r,h-fp.t-fp.b);
      ctx.shadowBlur=0;
      break;
  }
}

// ════════════════════════════════════════════════════════════════════
// FILTER THUMBNAILS
// ════════════════════════════════════════════════════════════════════
function updateFilterThumbs() {
  if (!origImg) return;
  FILTERS.forEach(([name]) => {
    const fc = document.getElementById('ft-' + name);
    if (!fc) return;
    const c = fc.querySelector('canvas');
    if (!c) return;
    c.width = 90; c.height = 70;
    const ctx = c.getContext('2d');
    ctx.filter = getFilterCSS(name, Object.fromEntries(
      Object.entries(ADJS).map(([k,v]) => [k, {...v, val: k==='blur'?0:v.val}])
    ));
    const sw = origImg.width, sh = origImg.height;
    const scale = Math.min(90/sw, 70/sh);
    const tw = sw*scale, th = sh*scale;
    ctx.drawImage(origImg, (90-tw)/2, (70-th)/2, tw, th);
    ctx.filter = 'none';
    fc.className = 'filter-thumb' + (name===activeFilter?' active':'');
  });
}

// ════════════════════════════════════════════════════════════════════
// ACTIONS
// ════════════════════════════════════════════════════════════════════
function applyFilter(name) {
  activeFilter = name;
  renderCanvas();
}

function setFrame(id, el) {
  activeFrame = id;
  document.querySelectorAll('.frame-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderCanvas();
}

function rotate(deg) {
  rotation = (rotation + deg + 360) % 360;
  rebuildBase();
}

function flip(dir) {
  if (dir==='h') flipH=!flipH;
  else flipV=!flipV;
  rebuildBase();
}

function clearText() {
  document.getElementById('textInput').value = '';
  renderCanvas();
}

function resetAdj(key) {
  const cfg = ADJS[key];
  cfg.val = 0;
  document.getElementById('adj-' + key).value = 0;
  document.getElementById('val-' + key).childNodes[0].textContent = '0' + cfg.unit + ' ';
  renderCanvas();
}

function resetAllAdjs() {
  for (const [key, cfg] of Object.entries(ADJS)) {
    cfg.val = 0;
    const el = document.getElementById('adj-' + key);
    if (el) el.value = 0;
    const vl = document.getElementById('val-' + key);
    if (vl && vl.childNodes[0]) vl.childNodes[0].textContent = '0' + cfg.unit + ' ';
  }
}

function resetAll() {
  activeFilter = 'Normal';
  activeFrame = 'none';
  rotation = 0; flipH = false; flipV = false;
  resetAllAdjs();
  document.getElementById('textInput').value = '';
  buildFrames();
  rebuildBase();
}

function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  ['filters','adjust','text','frames'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t===tab ? '' : 'none';
  });
}

// ════════════════════════════════════════════════════════════════════
// DOWNLOAD
// ════════════════════════════════════════════════════════════════════
function downloadImage(fmt) {
  const mc = document.getElementById('mainCanvas');
  const link = document.createElement('a');
  link.download = `sachin-ai-photo-${Date.now()}.${fmt}`;
  link.href = mc.toDataURL(fmt==='jpg' ? 'image/jpeg' : 'image/png', 0.95);
  link.click();
}

// ════════════════════════════════════════════════════════════════════
// HISTORY
// ════════════════════════════════════════════════════════════════════
let _historyPause = false;
function saveHistory() {
  if (_historyPause) return;
  _historyPause = true;
  const mc = document.getElementById('mainCanvas');
  historyStack.push(mc.toDataURL());
  if (historyStack.length > 20) historyStack.shift();
  redoStack = [];
  setTimeout(() => _historyPause = false, 100);
}

function undo() {
  if (historyStack.length < 2) return;
  const mc = document.getElementById('mainCanvas');
  redoStack.push(historyStack.pop());
  const prev = historyStack[historyStack.length-1];
  const img = new Image();
  img.onload = () => { mc.getContext('2d').drawImage(img, 0, 0); };
  img.src = prev;
}

function redo() {
  if (!redoStack.length) return;
  const mc = document.getElementById('mainCanvas');
  const next = redoStack.pop();
  historyStack.push(next);
  const img = new Image();
  img.onload = () => { mc.getContext('2d').drawImage(img, 0, 0); };
  img.src = next;
}

// ════════════════════════════════════════════════════════════════════
// START
// ════════════════════════════════════════════════════════════════════
init();
</script>
