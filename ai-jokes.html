<script>
const state={cat:'Pati-Patni',style:'Family-friendly'};
function pick(el,key){document.querySelectorAll('[onclick*="pick(this,\''+key+'\'"]').forEach(e=>e.classList.remove('active'));el.classList.add('active');state[key]=el.dataset.val;}
async function generate(){
  const btn=document.getElementById('btn');btn.disabled=true;btn.innerHTML='⏳ आ रहे हैं...';
  document.getElementById('err').style.display='none';
  const count=parseInt(document.getElementById('count').value)||3;
  const prompt=`तुम एक मशहूर Hindi comedian हो। ${count} ${state.style} jokes लिखो category: "${state.cat}"।
Rules:
- हर joke clearly numbered हो (1., 2., 3....)
- Jokes Hindi में हों, funny और clean
- ${state.style==='One-liner'?'हर joke सिर्फ 1-2 lines में':''}
- ${state.style==='Dialogue-based'?'Format: A: ... B: ... के साथ':''}
- Real humor हो, forced नहीं
- हर joke के बाद एक blank line छोड़ो
सिर्फ jokes लिखो, introduction नहीं।`;
  try{
    const r=await fetch('/generate-content',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt})});
    const d=await r.json();if(!r.ok)throw new Error(d.error||'Error');
    document.getElementById('result').textContent=d.result;
    document.getElementById('jokeCard').style.display='block';
    document.getElementById('jokeCard').scrollIntoView({behavior:'smooth'});
  }catch(e){const err=document.getElementById('err');err.textContent='❌ '+e.message;err.style.display='block';}
  finally{btn.disabled=false;btn.innerHTML='😂 Jokes सुनाओ!';}
}
function copyText(){navigator.clipboard.writeText(document.getElementById('result').textContent).then(()=>alert('Copied! Share करो 😂'));}
</script>
