            <div class="compare-panel"><img id="origImg" alt="Original"><div class="panel-label">Before</div></div>

<script>
    let originalSrc = null;

    function loadImg(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            originalSrc = e.target.result;
            document.getElementById('restoreBtn').disabled = false;
        };
        reader.readAsDataURL(file);
    }

    function restorePhoto() {
        if (!originalSrc) return;
        const img = new Image();
        img.onload = () => {
            const canvas = document.getElementById('workCanvas');
            const scale = Math.min(1200 / img.width, 1200 / img.height, 2);
            canvas.width = img.width * scale;
            canvas.height = img.height * scale;
            const ctx = canvas.getContext('2d');
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';

            const brightness = document.getElementById('brightness').value;
            const contrast = document.getElementById('contrastRange').value;
            const saturation = document.getElementById('saturation').value;
            const doColorize = document.getElementById('colorize').checked;
            const doSharpen = document.getElementById('sharpen').checked;
            const doContrast = document.getElementById('contrast').checked;

            let filters = `brightness(${brightness}%) `;
            if (doContrast) filters += `contrast(${contrast}%) `;
            filters += `saturate(${doColorize ? 180 : saturation}%) `;
            if (document.getElementById('denoise').checked) filters += 'blur(0.3px) ';

            ctx.filter = filters;
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            if (doSharpen) {
                ctx.filter = 'none';
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                applyUnsharpMask(imageData, canvas.width, canvas.height);
                ctx.putImageData(imageData, 0, 0);
            }

            const resultSrc = canvas.toDataURL('image/jpeg', 0.95);
            document.getElementById('origImg').src = originalSrc;
            document.getElementById('restoredImg').src = resultSrc;
            document.getElementById('compareBox').style.display = 'grid';
            document.getElementById('resultCard').style.display = 'block';
            document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth' });
        };
        img.src = originalSrc;
    }

    function applyUnsharpMask(imageData, width, height) {
        const d = imageData.data;
        const kernel = [-1,-1,-1,-1,9,-1,-1,-1,-1];
        const copy = new Uint8ClampedArray(d);
        for (let y = 1; y < height - 1; y++) {
            for (let x = 1; x < width - 1; x++) {
                for (let c = 0; c < 3; c++) {
                    let sum = 0;
                    for (let ky = -1; ky <= 1; ky++) {
                        for (let kx = -1; kx <= 1; kx++) {
                            const idx = ((y + ky) * width + (x + kx)) * 4 + c;
                            sum += copy[idx] * kernel[(ky+1)*3+(kx+1)];
                        }
                    }
                    d[(y * width + x) * 4 + c] = Math.min(255, Math.max(0, sum));
                }
            }
        }
    }

    function downloadRestored() {
        const canvas = document.getElementById('workCanvas');
        const a = document.createElement('a');
        a.download = 'sachin-ai-restored.jpg';
        a.href = canvas.toDataURL('image/jpeg', 0.95);
        a.click();
    }
</script>
