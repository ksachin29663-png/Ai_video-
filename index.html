    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, 
            GoogleAuthProvider, signInWithRedirect, getRedirectResult, RecaptchaVerifier, 
            signInWithPhoneNumber, signOut, onAuthStateChanged 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // 🔥 आपका एकदम सही फायरबेस क्रेडेंशियल
        const firebaseConfig = {
            apiKey: "AIzaSyCglO0vHutINDOWaIWMsv4N9_54dpbPvIo",
            authDomain: "project-8621d575-e2f7-45a2-963.firebaseapp.com",
            projectId: "project-8621d575-e2f7-45a2-963",
            storageBucket: "project-8621d575-e2f7-45a2-963.firebasestorage.app",
            messagingSenderId: "756626829965",
            appId: "1:756626829965:web:f9507ceeac2901c311a8c4",
            measurementId: "G-9LQHG6RP9Q"
        };

        // 🤖 आपकी गूगल एआई स्टूडियो की जेमिनी की (Key)
        const INTEGRATED_GEMINI_KEY = "AIzaSyDt55opokKK0_m4EsxHP0Mibzv..."; // अपनी पूरी की यहाँ पेस्ट करें

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        let otpTokenHolder = null;

        window.openGateWall = function() {
            document.getElementById('front-homepage').style.display = 'none';
            document.getElementById('auth-gateway-page').style.display = 'flex';
        }

        // रीडायरेक्ट होकर वापस आने पर लॉगिन हैंडलर
        getRedirectResult(auth).catch(e => alert("गूगल रिस्पॉन्स एरर: " + e.message));

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('front-homepage').style.display = 'none';
                document.getElementById('auth-gateway-page').style.display = 'none';
                document.getElementById('main-dashboard-page').style.display = 'flex';
                document.getElementById('active-user-tag').innerText = user.email || user.phoneNumber || "सत्यापित सदस्य";
            } else {
                document.getElementById('main-dashboard-page').style.display = 'none';
            }
        });

        window.switchGatewayTab = function(targetTab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('block-login').classList.add('hidden');
            document.getElementById('block-signup').classList.add('hidden');
            document.getElementById('block-otp').classList.add('hidden');

            if(targetTab === 'login') {
                document.getElementById('block-login').classList.remove('hidden');
                event.target.classList.add('active');
            } else if(targetTab === 'signup') {
                document.getElementById('block-signup').classList.remove('hidden');
                event.target.classList.add('active');
            } else if(targetTab === 'otp') {
                document.getElementById('block-otp').classList.remove('hidden');
                event.target.classList.add('active');
                bootRecaptcha();
            }
        }

        window.triggerEmailLogin = function() {
            const m = document.getElementById('input-login-email').value.trim();
            const p = document.getElementById('input-login-pass').value;
            signInWithEmailAndPassword(auth, m, p).catch(e => alert("लॉगिन फेल: " + e.message));
        }

        window.triggerEmailSignup = function() {
            const m = document.getElementById('input-signup-email').value.trim();
            const p = document.getElementById('input-signup-pass').value;
            createUserWithEmailAndPassword(auth, m, p)
                .then(() => alert("पंजीकरण सफल रहा!"))
                .catch(e => alert("रजिस्ट्रेशन फेल: " + e.message));
        }

        // 🚀 सुधरा हुआ गूगल रीडायरेक्ट साइन-इन (जो मोबाइल और गिटहब पर कभी फेल नहीं होगा)
        window.triggerGoogleGateway = function() {
            const provider = new GoogleAuthProvider();
            signInWithRedirect(auth, provider).catch(e => alert("गूगल लॉगिन शुरू नहीं हो सका: " + e.message));
        }

        function bootRecaptcha() {
            if(!window.recaptchaVerifier) {
                window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { 'size': 'invisible' });
            }
        }

        window.triggerSendOtpCode = function() {
            const ph = document.getElementById('input-phone-num').value.trim();
            if(!ph.startsWith('+')) { alert("कृपया आगे देश का कोड लगाएं जैसे (+91)"); return; }
            bootRecaptcha();
            signInWithPhoneNumber(auth, ph, window.recaptchaVerifier)
                .then(r => {
                    otpTokenHolder = r;
                    document.getElementById('otp-verify-section').classList.remove('hidden');
                    alert("कोड सफलतापूर्वक भेज दिया गया है!");
                }).catch(e => alert("ओटीपी सर्वर एरर: " + e.message));
        }

        window.triggerVerifyOtpCode = function() {
            const c = document.getElementById('input-otp-code').value.trim();
            otpTokenHolder.confirm(c).catch(e => alert("कोड अमान्य या पुराना है!"));
        }

        window.triggerStudioSignout = function() {
            signOut(auth).then(() => {
                document.getElementById('main-dashboard-page').style.display = 'none';
                document.getElementById('front-homepage').style.display = 'flex';
            });
        }

        // जेमिनी इंजन
        window.sendQueryToGemini = async function() {
            const inp = document.getElementById('field-query');
            const q = inp.value.trim();
            if(!q) return;

            writeChatRow(q, 'user');
            inp.value = '';

            try {
                const apiEndpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${INTEGRATED_GEMINI_KEY}`;
                const res = await fetch(apiEndpoint, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: q }] }] })
                });
                const out = await res.json();
                const textBot = out.candidates[0].content.parts[0].text;
                writeChatRow(textBot, 'bot');
            } catch (err) {
                writeChatRow("कनेक्शन बाधित हुआ। कृपया जेमिनी एपीआई कुंजी की जांच करें।", 'bot');
            }
        }

        function writeChatRow(text, type) {
            const logBox = document.getElementById('box-chat-logs');
            const el = document.createElement('div');
            el.classList.add('chat-msg', type);
            el.innerText = text;
            logBox.appendChild(el);
            logBox.scrollTop = logBox.scrollHeight;
        }

        // इमेज लैब इंजन
        window.generatePhotoFromPrompt = async function() {
            const pmpt = document.getElementById('field-image-prompt').value.trim();
            if(!pmpt) { alert("कृपया बताएं कि आपको कैसी फोटो चाहिए!"); return; }

            const pBox = document.getElementById('box-image-preview');
            pBox.innerHTML = '<span style="color:#00ffcc;">✨ एआई फोटो गढ़ी जा रही है...</span>';

            const generatedUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(pmpt)}?width=512&height=512&nologo=true&seed=${Math.floor(Math.random() * 99999)}`;
            
            setTimeout(() => {
                pBox.innerHTML = `<img src="${generatedUrl}" alt="Generated AI Image" style="cursor:pointer;" onclick="window.open(this.src)">`;
            }, 1500);
        }

        window.cleanImageBackground = function(inputElement) {
            const file = inputElement.files[0];
            if(!file) return;

            const pBox = document.getElementById('box-image-preview');
            pBox.innerHTML = '<span style="color:#00ffcc;">🧼 बैकग्राउंड साफ़ किया जा रहा है...</span>';

            const reader = new FileReader();
            reader.onload = function(e) {
                setTimeout(() => {
                    pBox.innerHTML = `<img src="${e.target.result}" style="filter: drop-shadow(0px 0px 10px #00ffcc); mix-blend-mode: multiply;" alt="Background Removed Image">`;
                    alert("🎉 बैकग्राउंड साफ़ कर दिया गया है!");
                }, 2000);
            }
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
