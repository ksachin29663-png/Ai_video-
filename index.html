<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>AI Website 36 - अपना करियर शुरू करें</title>
    <link rel="stylesheet" href="style.css">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCglO0vHutINDOWaIWMsv4N9_54dpbPvIo",
            databaseURL: "https://project-8621d575-e2f7-45a2-963-default-rtdb.firebaseio.com",
            projectId: "project-8621d575-e2f7-45a2-963"
        };
        const db = getDatabase(initializeApp(firebaseConfig));

        window.onload = () => {
            if (!localStorage.getItem('visited')) {
                alert("स्वागत है! AI Website 36 में आपका स्वागत है। इस वेबसाइट के साथ अपना करियर शुरू करें।");
                localStorage.setItem('visited', 'true');
            }
            loadPosts('home');
        };

        window.loadPosts = function(category) {
            const container = document.getElementById('post-container');
            container.innerHTML = '<p>लोड हो रहा है...</p>';
            
            // अगर 'home' है तो 'posts' का सारा डेटा उठाएं
            const dbRef = (category === 'home') ? ref(db, 'posts') : ref(db, 'posts/' + category);
            
            onValue(dbRef, (snapshot) => {
                container.innerHTML = ''; 
                const data = snapshot.val();
                if (!data) {
                    container.innerHTML = '<p>कोई पोस्ट नहीं मिली।</p>';
                    return;
                }

                // यहाँ से डेटा को 'फ्लैट' करना जरूरी है (ताकि undefined न आए)
                if (category === 'home') {
                    Object.values(data).forEach(catData => {
                        Object.values(catData).forEach(post => renderPost(post));
                    });
                } else {
                    Object.values(data).forEach(post => renderPost(post));
                }
            });
        };

        function renderPost(post) {
            const container = document.getElementById('post-container');
            container.innerHTML += `
                <div class="youtube-card">
                    <a href="${post.postLink || '#'}" target="_blank" style="text-decoration:none; color:inherit;">
                        <img src="${post.imageUrl || 'https://via.placeholder.com/400'}" class="post-thumb">
                        <div class="post-details">
                            <h3>${post.title || 'शीर्षक नहीं है'}</h3>
                        </div>
                    </a>
                </div>
            `;
        }
    </script>
</head>
<body>
    <header><h1>AI Website 36 Tool Create Photo</h1></header>
    <nav class="category-tabs">
        <button onclick="loadPosts('home')">होम</button>
        <button onclick="loadPosts('business')">बिजनेस</button>
        <button onclick="loadPosts('youtube')">YouTube</button>
        <button onclick="loadPosts('shayari')">शायरी</button>
    </nav>
    <main id="post-container" class="youtube-style-grid"></main>
</body>
</html>
