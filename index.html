<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP एडमिन पैनल - AI Website 36</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; padding: 15px; margin: 0; }
        .container { max-width: 600px; margin: auto; background: #1e293b; padding: 20px; border-radius: 15px; border: 2px solid #38bdf8; box-shadow: 0 0 20px rgba(56, 189, 248, 0.2); }
        h2 { text-align: center; color: #38bdf8; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; box-sizing: border-box; }
        input, select { background: #334155; color: white; }
        button { background: #38bdf8; color: #0f172a; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0ea5e9; }
        #editor-container { height: 250px; background: white; color: black; border-radius: 8px; margin-bottom: 15px; }
        .loading { display: none; color: #fbbf24; text-align: center; font-weight: bold; margin: 10px 0; }
        #login-section { margin-top: 100px; }
    </style>
</head>
<body>

<div id="login-section" class="container">
    <h2>🔒 VIP लॉगिन</h2>
    <input type="email" id="email-input" placeholder="अपनी रजिस्टर्ड ईमेल डालें...">
    <button onclick="checkLogin()">लॉगिन करें</button>
</div>

<div id="admin-section" class="container" style="display:none;">
    <h2 id="welcome-msg"></h2>
    
    <label>कैटगरी चुनें:</label>
    <select id="category">
        <option value="business">बिज़नेस आइडियाज</option>
        <option value="youtube">YouTube टूल्स</option>
        <option value="shayari">लेटेस्ट शायरी</option>
    </select>

    <label>आर्टिकल का टाइटल:</label>
    <input type="text" id="title" placeholder="यहाँ टाइटल लिखें...">

    <label>थंबनेल फोटो चुनें (YouTube साइज):</label>
    <input type="file" id="file-input" accept="image/*">

    <label>आर्टिकल का कंटेंट (ब्लॉगर जैसा एडिटर):</label>
    <div id="editor-container"></div>

    <div id="loading-msg" class="loading">⏳ पोस्ट अपलोड हो रही है, कृपया रुकें...</div>
    <button id="submit-btn" onclick="savePost()">🚀 वेबसाइट पर लाइव करें</button>
</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    // आपकी Firebase कॉन्फ़िगरेशन
    const firebaseConfig = {
        apiKey: "AIzaSyCg100vhutIND0WaJvMsv4N9_54dpbVlo",
        databaseURL: "https://project-8621d575-e2f7-45a2-963-default-rtdb.firebaseio.com",
        projectId: "project-8621d575-e2f7-45a2-963",
        storageBucket: "project-8621d575-e2f7-45a2-963.appspot.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const storage = getStorage(app);

    // एडिटर सेटअप
    const quill = new Quill('#editor-container', {
        theme: 'snow',
        placeholder: 'यहाँ अपना विस्तार से आर्टिकल लिखें...',
        modules: {
            toolbar: [
                ['bold', 'italic', 'underline'],
                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                ['link', 'clean']
            ]
        }
    });

    // लॉगिन फंक्शन
    window.checkLogin = function() {
        const email = document.getElementById('email-input').value;
        if (email === "ksachin20663@gmail.com") {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('admin-section').style.display = 'block';
            document.getElementById('welcome-msg').innerText = "स्वागत है, सचिन भाई! 🔥";
        } else {
            alert("पहुँच वर्जित! केवल सचिन भाई लॉगिन कर सकते हैं।");
        }
    };

    // पोस्ट सेव करने का फंक्शन
    window.savePost = async function() {
        const file = document.getElementById('file-input').files[0];
        const title = document.getElementById('title').value;
        const category = document.getElementById('category').value;
        const content = quill.root.innerHTML; // एडिटर से HTML लेना
        const loading = document.getElementById('loading-msg');
        const btn = document.getElementById('submit-btn');

        if (!file || !title || quill.getText().trim().length === 0) {
            alert("भाई, टाइटल, फोटो और कंटेंट तीनों जरूरी हैं!");
            return;
        }

        try {
            loading.style.display = 'block';
            btn.disabled = true;

            // 1. फोटो को Storage में अपलोड करें
            const storageRef = sRef(storage, 'images/' + Date.now() + "_" + file.name);
            const snapshot = await uploadBytes(storageRef, file);
            const url = await getDownloadURL(snapshot.ref);

            // 2. डेटाबेस में जानकारी सेव करें (posts/ के अंदर)
            await push(ref(db, 'posts/'), {
                title: title,
                content: content,
                imageUrl: url,
                category: category,
                date: new Date().toLocaleDateString()
            });

            alert("बधाई हो! आपकी पोस्ट वेबसाइट पर लाइव हो गई है।");
            location.reload(); // पेज रिफ्रेश करें
        } catch (error) {
            console.error(error);
            alert("ओह! कुछ गड़बड़ हो गई। चेक करें कि Firebase Storage ऑन है या नहीं।");
        } finally {
            loading.style.display = 'none';
            btn.disabled = false;
        }
    };
</script>

</body>
</html>
