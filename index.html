<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Website 36 Tool Create Photo</title>
    <link rel="stylesheet" href="style.css">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCglO0vHutINDOWaIWMsv4N9_54dpbPvIo",
            authDomain: "project-8621d575-e2f7-45a2-963.firebaseapp.com",
            databaseURL: "https://project-8621d575-e2f7-45a2-963-default-rtdb.firebaseio.com",
            projectId: "project-8621d575-e2f7-45a2-963",
            storageBucket: "project-8621d575-e2f7-45a2-963.firebasestorage.app",
            messagingSenderId: "756626829965",
            appId: "1:756626829965:web:1a73e566660c489811a8c4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.loadPosts = function(category) {
            const container = document.getElementById('post-container');
            container.innerHTML = '<p>लोड हो रहा है...</p>';
            
            // डेटाबेस का पाथ (अगर 'home' है तो सब ले, वरना कैटेगरी)
            const path = (category === 'home') ? 'posts' : 'posts/' + category;
            const dbRef = ref(db, path);

            onValue(dbRef, (snapshot) => {
                container.innerHTML = ''; 
                const data = snapshot.val();
                
                if (data) {
                    // अगर डेटा एक ऑब्जेक्ट है तो उसे लूप में चलाएं
                                onValue(dbRef, (snapshot) => {
                container.innerHTML = ''; 
                const data = snapshot.val();
                
                if (data) {
                    // अगर डेटा एक ऑब्जेक्ट है (जिसमें ID/Keys हैं)
                    Object.keys(data).forEach((key) => {
                        const item = data[key];

                        // चेक करें कि क्या यह सीधा पोस्ट ऑब्जेक्ट है या कैटेगरी के अंदर का डेटा
                        if (item.title) {
                            // अगर सीधा पोस्ट है
                            renderPost(item);
                        } else {
                            // अगर अंदर और फोल्डर्स (जैसे business/post1) हैं
                            Object.values(item).forEach(post => renderPost(post));
                        }
                    });
                } else {
                    container.innerHTML = '<p>अभी कोई पोस्ट नहीं है।</p>';
                }
            });

            // पोस्ट कार्ड बनाने का छोटा सा हेल्पर फंक्शन
            function renderPost(post) {
                const container = document.getElementById('post-container');
                const img = post.imageUrl || 'https://via.placeholder.com/400';
                container.innerHTML += `
                    <div class="youtube-card">
                        <img src="${img}" class="post-thumb">
                        <div class="post-details">
                            <h3>${post.title || 'शीर्षक नहीं है'}</h3>
                        </div>
                    </div>
                `;
            }

                    Object.values(data).forEach((post) => {
                        container.innerHTML += `
                            <div class="youtube-card">
                                <img src="${post.imageUrl || 'https://via.placeholder.com/400'}" class="post-thumb">
                                <div class="post-details">
                                    <h3>${post.title}</h3>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    container.innerHTML = '<p>कोई पोस्ट नहीं मिली।</p>';
                }
            });
        };

        window.onload = () => window.loadPosts('home');
    </script>
</head>
<body>
    <header><h1>AI Website 36 Tool Create Photo</h1></header>
    <nav class="category-tabs">
        <button onclick="loadPosts('home')">होम</button>
        <button onclick="loadPosts('business')">बिजनेस</button>
        <button onclick="loadPosts('youtube')">YouTube</button>
        <button onclick="loadPosts('shayari')">शायरी</button>
    </nav>
    <main id="post-container" class="youtube-style-grid"></main>
</body>
</html>
