        .form-input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #0f1a20; color: #fff; outline: none; }

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // 🔥 आपका फायरबेस कॉन्फ़िगरेशन
        const firebaseConfig = {
            apiKey: "AIzaSyCglO0vHutINDOWaIWMsv4N9_54dpbPvIo",
            authDomain: "project-8621d575-e2f7-45a2-963.firebaseapp.com",
            projectId: "project-8621d575-e2f7-45a2-963",
            storageBucket: "project-8621d575-e2f7-45a2-963.firebasestorage.app",
            messagingSenderId: "756626829965",
            appId: "1:756626829965:web:f9507ceeac2901c311a8c4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // इंटरफ़ेस फंक्शन्स
        window.openLoginWindow = function() { document.getElementById('popup-gateway').style.display = 'flex'; }
        window.closeLoginWindow = function() { document.getElementById('popup-gateway').style.display = 'none'; }

        window.toggleTab = function(type) {
            if(type === 'login') {
                document.getElementById('tab-login').classList.add('active');
                document.getElementById('tab-signup').classList.remove('active');
                document.getElementById('form-login-block').classList.remove('hidden');
                document.getElementById('form-signup-block').classList.add('hidden');
            } else {
                document.getElementById('tab-signup').classList.add('active');
                document.getElementById('tab-login').classList.remove('active');
                document.getElementById('form-signup-block').classList.remove('hidden');
                document.getElementById('form-login-block').classList.add('hidden');
            }
        }

        // लॉगिन स्थिति ट्रैकर
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-status-bar').classList.add('hidden');
                document.getElementById('user-logged-in-bar').classList.remove('hidden');
                document.getElementById('user-tag').innerText = "सत्यापित ईमेल: " + user.email;
                closeLoginWindow();
            } else {
                document.getElementById('auth-status-bar').classList.remove('hidden');
                document.getElementById('user-logged-in-bar').classList.add('hidden');
            }
        });

        // ईमेल से लॉगिन और साइनअप एक्शन्स
        window.submitEmailLogin = function() {
            const m = document.getElementById('log-email').value.trim();
            const p = document.getElementById('log-pass').value;
            if(!m || !p) { alert("कृपया फॉर्म भरें!"); return; }
            signInWithEmailAndPassword(auth, m, p).catch(e => alert("त्रुटि: " + e.message));
        }

        window.submitEmailSignup = function() {
            const m = document.getElementById('sign-email').value.trim();
            const p = document.getElementById('sign-pass').value;
            if(!m || !p) { alert("कृपया फॉर्म भरें!"); return; }
            createUserWithEmailAndPassword(auth, m, p)
                .then(() => alert("सफलतापूर्वक खाता पंजीकृत हुआ!"))
                .catch(e => alert("त्रुटि: " + e.message));
        }

        window.logoutSession = function() { signOut(auth); }

        // 🎨 शुद्ध एआई फोटो जनरेटर इंजन
        window.generateAiPhotoNow = function() {
            var prompt = document.getElementById('input-prompt').value.trim();
            if(!prompt) { alert("कृपया बताएं कि आपको कैसी फोटो चाहिए!"); return; }

            var outImg = document.getElementById('output-photo');
            var txt = document.getElementById('placeholder-text');

            outImg.classList.add('hidden');
            txt.innerText = '✨ आपकी फोटो तैयार की जा रही है... कृपया प्रतीक्षा करें...';
            txt.classList.remove('hidden');

            var seed = Math.floor(Math.random() * 999999);
            var finalUrl = "https://image.pollinations.ai/prompt/" + encodeURIComponent(prompt) + "?width=512&height=512&nologo=true&seed=" + seed;

            outImg.src = finalUrl;
            
            outImg.onload = function() {
                outImg.classList.remove('hidden');
                txt.classList.add('hidden');
            };
            
            outImg.onerror = function() {
                txt.innerText = 'सर्वर व्यस्त है, कृपया दोबारा प्रयास करें।';
            };
        }
    </script>
