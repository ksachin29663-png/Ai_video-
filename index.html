<!DOCTYPE html>
<html lang="hi">
<head>
   <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3019468976412219"
     crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Website 36 - अपना करियर शुरू करें</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* वेलकम मैसेज का रंगीन स्टाइल */
        #welcome-overlay {
            position: fixed; top:0; left:0; width: 100%; height:100%; 
            background: linear-gradient(135deg, #0f172a, #38bdf8);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999; color: white; text-align: center; padding: 20px;
        }
    </style>
</head>
<body>

    <div id="welcome-overlay">
        <div>
            <h1 style="font-size: 3em;">नमस्ते, सचिन भाई! 🔥</h1>
            <p style="font-size: 1.5em;">AI Website 36 में आपका स्वागत है। अपना करियर शुरू करें!</p>
            <button onclick="document.getElementById('welcome-overlay').style.display='none'" style="padding: 15px 30px; font-size: 1.2em; border-radius: 25px; border:none; cursor:pointer;">वेबसाइट में प्रवेश करें</button>
        </div>
    </div>

    <header><h1>AI Website 36 Tool Create Photo</h1></header>
    <nav class="category-tabs">
        <button onclick="loadPosts('home')">होम</button>
        <button onclick="loadPosts('business')">बिजनेस</button>
        <button onclick="loadPosts('youtube')">YouTube</button>
        <button onclick="loadPosts('shayari')">शायरी</button>
    </nav>
    <main id="post-container" class="youtube-style-grid"></main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const db = getDatabase(initializeApp({
            apiKey: "AIzaSyCglO0vHutINDOWaIWMsv4N9_54dpbPvIo",
            databaseURL: "https://project-8621d575-e2f7-45a2-963-default-rtdb.firebaseio.com",
            projectId: "project-8621d575-e2f7-45a2-963"
        }));

        window.loadPosts = function(category) {
            const container = document.getElementById('post-container');
            container.innerHTML = '<p>लोड हो रहा है...</p>';
            const dbRef = (category === 'home') ? ref(db, 'posts') : ref(db, 'posts/' + category);
            
            onValue(dbRef, (snapshot) => {
                container.innerHTML = '';
                const data = snapshot.val();
                if (!data) { container.innerHTML = '<p>कोई पोस्ट नहीं है।</p>'; return; }

                if (category === 'home') {
                    Object.values(data).forEach(catData => Object.values(catData).forEach(p => render(p)));
                } else {
                    Object.values(data).forEach(p => render(p));
                }
            });
        };

        function render(p) {
            document.getElementById('post-container').innerHTML += `
                <div class="youtube-card" style="margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-radius: 15px; overflow: hidden; background: white;">
                    <a href="${p.postLink || '#'}" target="_blank" style="text-decoration:none; color:black;">
                        <img src="${p.imageUrl || 'https://via.placeholder.com/400'}" style="width:100%; height:200px; object-fit:cover;">
                        <div style="padding: 15px;"><h3>${p.title || 'शीर्षक'}</h3></div>
                    </a>
                </div>
            `;
        }
        window.loadPosts('home');
    </script>
    <script src="menu.js"></script>
<footer id="footer-links" style="text-align: center; padding: 20px; margin-top: 50px;"></footer>
<script src="menu.js"></script>

    <p>new article </p>
    <button onclick="window.location.reload()">यहाँ देखें</button>
    <button onclick="document.getElementById('new-article-popup').style.display='none'">बंद करें</button>
</div>
</body>
</body>
</html>
