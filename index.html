<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Website</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3019468976412219"
     crossorigin="anonymous"></script>
</head>
<body>

    <header class="yt-header">
        <div class="header-left">
            <span class="brand-logo">AI Website <span style="font-size: 14px; color: #666; font-weight: normal;">| Feed</span></span>
        </div>
        <div class="header-right">
            <button class="three-dots-btn" id="menuBtn">⋮</button>
        </div>
    </header>

    <main class="posts-container" id="posts-container">
        <div class="loading">पोस्ट लोड हो रही हैं...</div>
    </main>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <div class="modal-header">
                <h3>वेबसाइट मेनू और नीतियां</h3>
                <button class="close-modal-btn" id="closeBtn">&times;</button>
            </div>
            <div class="modal-body">
                <ul class="policy-links-list">
                    <li><a href="about.html">ℹ️ हमारे बारे में (About Us)</a></li>
                    <li><a href="contact.html">📞 हमसे संपर्क करें (Contact Us)</a></li>
                    <li><a href="privacy.html">🔒 प्राइवेसी पॉलिसी (Privacy Policy)</a></li>
                    <li><a href="terms.html">📜 नियम और शर्तें (Terms & Conditions)</a></li>
                    <li><a href="disclaimer.html">⚠️ डिस्क्लेमर (Disclaimer)</a></li>
                    <li><a href="cookies.html">🍪 कुकीज़ पॉलिसी (Cookies Policy)</a></li>
                </ul>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
    
    <script>
        const menuBtn = document.getElementById('menuBtn');
        const modalOverlay = document.getElementById('modalOverlay');
        const closeBtn = document.getElementById('closeBtn');

        menuBtn.addEventListener('click', () => {
            modalOverlay.classList.add('active');
        });

        closeBtn.addEventListener('click', () => {
            modalOverlay.classList.remove('active');
        });

        modalOverlay.addEventListener('click', (e) => {
            if(e.target === modalOverlay) {
                modalOverlay.classList.remove('active');
            }
        });
    </script>
</body>
</html>
