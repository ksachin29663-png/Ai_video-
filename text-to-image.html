<script>
    let selectedStyle = '';
    document.querySelectorAll('.style-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedStyle = btn.dataset.style;
        });
    });

    function generateImage() {
        const prompt = document.getElementById('promptInput').value.trim();
        if (!prompt) { alert('कृपया प्रॉम्प्ट लिखें!'); return; }
        const sizeVal = document.getElementById('sizeSelect').value;
        const [w, h] = sizeVal.split('x');
        const fullPrompt = selectedStyle ? `${prompt}, ${selectedStyle}` : prompt;
        const seed = Math.floor(Math.random() * 999999);
        const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(fullPrompt)}?width=${w}&height=${h}&nologo=true&seed=${seed}`;

        const spinner = document.getElementById('spinner');
        const img = document.getElementById('outputImg');
        const placeholder = document.getElementById('placeholder');
        const actionRow = document.getElementById('actionRow');
        const genBtn = document.getElementById('genBtn');

        spinner.classList.add('show');
        img.style.display = 'none';
        placeholder.style.display = 'none';
        genBtn.disabled = true;

        const tempImg = new Image();
        tempImg.crossOrigin = 'anonymous';
        tempImg.onload = function() {
            img.src = url;
            img.style.display = 'block';
            spinner.classList.remove('show');
            actionRow.style.display = 'flex';
            document.getElementById('downloadBtn').href = url;
            genBtn.disabled = false;
        };
        tempImg.onerror = function() {
            spinner.classList.remove('show');
            placeholder.style.display = 'block';
            placeholder.querySelector('p').textContent = 'सर्वर व्यस्त है, दोबारा कोशिश करें।';
            genBtn.disabled = false;
        };
        tempImg.src = url;
    }
</script>
