<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Photo Generator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif}
body{background:#0a0a0f;color:#e1e7f0;min-height:100vh;display:flex;flex-direction:column}
header{background:#0d1117;border-bottom:1px solid rgba(0,255,150,.15);padding:12px 16px;display:flex;align-items:center;gap:12px}
.back{color:#00ff96;text-decoration:none;font-size:1.2rem}
.ht{font-size:.95rem;font-weight:700;color:#00ff96}
.hs{font-size:.68rem;color:#555;margin-top:1px}
main{flex:1;padding:16px 14px 50px;display:flex;flex-direction:column;align-items:center;gap:14px}
.imgbox{width:100%;max-width:500px;aspect-ratio:1;background:#0d1117;border:2px dashed rgba(0,255,150,.15);border-radius:16px;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.imgbox img{width:100%;height:100%;object-fit:contain;display:none}
.ph{text-align:center;padding:20px}
.ph-ico{font-size:2.5rem;opacity:.2;display:block;margin-bottom:8px}
.ph-t{color:#444;font-size:.8rem}
.spin{display:none;position:absolute;inset:0;background:rgba(0,0,0,.95);flex-direction:column;align-items:center;justify-content:center;gap:14px}
.spin.on{display:flex}
.ring{width:50px;height:50px;border:3px solid rgba(0,255,150,.1);border-top-color:#00ff96;border-radius:50%;animation:rot .9s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
.s1{color:#00ff96;font-size:.9rem;font-weight:600;text-align:center;padding:0 16px}
.s2{color:#555;font-size:.72rem;text-align:center;padding:0 16px;line-height:1.5}
.pbar{width:180px;height:3px;background:rgba(0,255,150,.1);border-radius:2px}
.pfill{height:100%;background:#00ff96;border-radius:2px;width:0;transition:width .8s}
.box{width:100%;max-width:500px;background:#0d1117;border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:16px}
.lbl{font-size:.7rem;font-weight:700;color:#00ff96;text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px}
textarea{width:100%;background:#080810;border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:12px;color:#e1e7f0;font-size:.9rem;resize:none;font-family:inherit;line-height:1.5;height:80px}
textarea:focus{outline:none;border-color:rgba(0,255,150,.3)}
textarea::placeholder{color:#333}
.ideas{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.idea{padding:5px 11px;border-radius:20px;background:#111;border:1px solid rgba(255,255,255,.06);color:#555;font-size:.7rem;cursor:pointer;font-family:inherit;transition:all .15s}
.idea:hover{border-color:rgba(0,255,150,.3);color:#00ff96}
.row{display:flex;gap:8px;margin-top:10px}
.rbtn{flex:1;padding:9px;background:#111;border:1px solid rgba(0,255,150,.15);border-radius:9px;color:#00ff96;font-size:.78rem;cursor:pointer;font-family:inherit}
.gbtn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#00ff96,#00cc77);color:#000;font-size:.95rem;font-weight:700;cursor:pointer;margin-top:12px;font-family:inherit;transition:opacity .2s}
.gbtn:disabled{opacity:.4;cursor:not-allowed}
.acts{display:none;gap:8px;margin-top:10px}
.abtn{flex:1;padding:9px;border-radius:9px;border:1px solid rgba(0,255,150,.2);background:transparent;color:#00ff96;font-size:.78rem;cursor:pointer;font-family:inherit}
.err{display:none;background:rgba(255,100,100,.07);border:1px solid rgba(255,100,100,.2);border-radius:10px;padding:10px 12px;color:#fca5a5;font-size:.78rem;margin-top:10px;line-height:1.5}
.api-tag{font-size:.62rem;color:#222;text-align:center;margin-top:6px}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a2e;color:#e1e7f0;padding:10px 20px;border-radius:10px;font-size:.8rem;opacity:0;transition:all .3s;z-index:999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3019468976412219" crossorigin="anonymous"></script>
</head>
<body>
<header>
  <a href="/" class="back">←</a>
  <div>
    <div class="ht">✨ AI Photo Generator</div>
    <div class="hs">Text लिखो → AI Photo बनाएं — 100% Free</div>
  </div>
</header>
<main>

<div class="imgbox" id="imgbox">
  <img id="img" alt="AI Photo">
  <div class="ph" id="ph"><span class="ph-ico">🎨</span><div class="ph-t">AI Photo यहाँ दिखेगी</div></div>
  <div class="spin" id="spin">
    <div class="ring"></div>
    <div class="s1" id="s1">Photo बन रही है...</div>
    <div class="s2" id="s2">कृपया wait करें</div>
    <div class="pbar"><div class="pfill" id="pfill"></div></div>
  </div>
</div>
<div class="acts" id="acts">
  <button class="abtn" onclick="dlImg()">💾 Download</button>
  <button class="abtn" onclick="gen()">🔄 फिर बनाएं</button>
</div>
<div class="err" id="err"></div>

<div class="box">
  <div class="lbl">💡 Quick Ideas</div>
  <div class="ideas" id="ideas"></div>
  <div class="lbl">✍️ Prompt — Hindi या English</div>
  <textarea id="pi" placeholder="जो Photo चाहिए वो लिखें...&#10;जैसे: Beautiful cat, sunset, mountain, Indian girl"></textarea>
  <div class="row">
    <button class="rbtn" onclick="rnd()">🎲 Random</button>
    <button class="rbtn" id="enhbtn" onclick="toggleEnh()">✨ Enhance: ON</button>
  </div>
  <button class="gbtn" id="gbtn" onclick="gen()">✨ Photo बनाएं</button>
  <div class="api-tag" id="atag">Free AI Image Generation</div>
</div>

</main>
<div id="toast"></div>
<script>
const IDEAS=['Beautiful Indian girl red saree temple','Cute cat golden crown studio','Lion sunset wildlife 4K','Futuristic city neon lights rain','Dragon flying mountains epic','Underwater ocean colorful fish','Indian bride floral jewelry bokeh','Galaxy space nebula colorful','Tiger jungle wildlife photography','Baby elephant flowers magical','Anime girl sakura trees Japan','Old man portrait black white film'];

let busy=false, imgUrl=null, enh=true;

const ideasEl=document.getElementById('ideas');
IDEAS.forEach(t=>{const b=document.createElement('button');b.className='idea';b.textContent=t.split(' ').slice(0,2).join(' ');b.onclick=()=>{document.getElementById('pi').value=t;};ideasEl.appendChild(b);});

function toggleEnh(){enh=!enh;document.getElementById('enhbtn').textContent='✨ Enhance: '+(enh?'ON':'OFF');}
function rnd(){document.getElementById('pi').value=IDEAS[Math.floor(Math.random()*IDEAS.length)];}

function mkPrompt(raw){
  let p=raw;
  if(enh){
    const isHuman=/girl|boy|man|woman|person|face|bride|dancer|model|indian/i.test(raw);
    p+=isHuman?', photorealistic, sharp, beautiful lighting, 4K':', ultra detailed, sharp, 4K, masterpiece';
  }
  return p;
}

function setPfill(n){document.getElementById('pfill').style.width=n+'%';}
function setStatus(a,b){document.getElementById('s1').textContent=a;document.getElementById('s2').textContent=b;}

// ─── All free Image APIs ───────────────────────────────────────────
// 1. Pollinations.ai  (works from phone/laptop, fast ~10s)
// 2. Stable Horde    (community AI, always works, ~2-5 min)
// 3. Craiyon         (DALL·E mini, ~30s, basic quality)

async function tryPollinations(prompt, timeoutMs=90000){
  setStatus('⚡ Photo बन रही है...','Pollinations AI · 10-30 सेकंड');
  document.getElementById('atag').textContent='Powered by Pollinations AI';
  setPfill(10);
  const seed=Math.floor(Math.random()*999999);
  // Try 3 different Pollinations endpoints
  const urls=[
    `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?nologo=true&seed=${seed}`,
    `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?nologo=true&seed=${seed+1}&enhance=false`,
    `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?nologo=true&seed=${seed+2}`,
  ];
  for(const url of urls){
    try{
      const ok=await waitImg(url,timeoutMs);
      if(ok){setPfill(100);return url;}
    }catch{}
    await sleep(500);
  }
  return null;
}

async function tryCraiyon(prompt){
  setStatus('🎨 Photo बन रही है...','Craiyon AI · 30-60 सेकंड');
  document.getElementById('atag').textContent='Powered by Craiyon AI';
  setPfill(10);
  try{
    const r=await fetch('https://backend.craiyon.com/generate',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prompt}),signal:AbortSignal.timeout(70000)
    });
    const d=await r.json();
    if(d.images&&d.images[0]){
      // Craiyon returns base64 JPEGs
      const b64=d.images[0];
      const dataUrl='data:image/jpeg;base64,'+b64;
      setPfill(100);
      return dataUrl;
    }
  }catch{}
  return null;
}

async function tryStableHorde(prompt){
  setStatus('🎨 AI Photo बन रही है...','Community AI · 1-5 मिनट');
  document.getElementById('atag').textContent='Powered by Stable Horde (Free)';
  setPfill(5);
  const API='https://stablehorde.net/api/v2';
  const KEY='0000000000';
  try{
    const sub=await fetch(`${API}/generate/async`,{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':KEY},
      body:JSON.stringify({prompt,params:{width:512,height:512,steps:12,n:1,sampler_name:'k_euler_a'},slow_workers:false,r2:false,shared:false})
    });
    const s=await sub.json();
    if(!s.id)throw new Error('no id');
    for(let i=0;i<100;i++){
      await sleep(4000);
      setPfill(Math.min(90,10+i*1.2));
      const chk=await fetch(`${API}/generate/check/${s.id}`,{headers:{'apikey':KEY}});
      const c=await chk.json();
      if(c.wait_time>0)setStatus('🎨 Queue में है...','⏳ ~'+c.wait_time+' सेकंड बाकी');
      else if(c.processing)setStatus('⚡ Almost done!','Photo बन रही है...');
      if(c.done){
        const stat=await fetch(`${API}/generate/status/${s.id}`,{headers:{'apikey':KEY}});
        const st=await stat.json();
        const g=st.generations?.[0];
        if(g?.img){setPfill(100);return g.img;}
        throw new Error('no img');
      }
      if(c.faulted)throw new Error('faulted');
    }
  }catch{}
  return null;
}

async function gen(){
  const raw=document.getElementById('pi').value.trim();
  if(!raw){toast('⚠️ कुछ तो लिखें!');return;}
  if(busy){toast('⏳ पहले वाली photo बन रही है...');return;}
  busy=true; imgUrl=null;

  const btn=document.getElementById('gbtn');
  btn.disabled=true; btn.textContent='⏳ बन रहा है...';
  document.getElementById('err').style.display='none';
  document.getElementById('acts').style.display='none';
  document.getElementById('img').style.display='none';
  document.getElementById('ph').style.display='block';
  document.getElementById('spin').classList.add('on');

  const p=mkPrompt(raw);
  let result=null;

  // Try API 1: Pollinations (fast)
  result=await tryPollinations(p,90000);
  
  // Try API 2: Craiyon (if Pollinations failed)
  if(!result){
    result=await tryCraiyon(p);
  }

  // Try API 3: Stable Horde (always works)
  if(!result){
    result=await tryStableHorde(p);
  }

  document.getElementById('spin').classList.remove('on');

  if(result){
    imgUrl=result;
    const img=document.getElementById('img');
    img.src=result; img.style.display='block';
    document.getElementById('ph').style.display='none';
    document.getElementById('acts').style.display='flex';
    toast('✅ Photo बन गई!');
  }else{
    document.getElementById('ph').style.display='block';
    const e=document.getElementById('err');
    e.textContent='⚠️ सभी AI servers busy हैं। Internet connection check करें और 2 मिनट बाद दोबारा try करें।';
    e.style.display='block';
  }

  busy=false; btn.disabled=false; btn.textContent='✨ Photo बनाएं';
}

async function dlImg(){
  if(!imgUrl){toast('⚠️ पहले photo बनाएं');return;}
  const a=document.createElement('a');
  a.href=imgUrl; a.download='ai-photo.png'; a.target='_blank'; a.click();
  toast('💾 Download हो रही है!');
}

function waitImg(url,ms){
  return new Promise((ok,fail)=>{
    const img=new Image(); let done=false;
    const t=setTimeout(()=>{if(done)return;done=true;img.src='';fail();},ms);
    img.onload=()=>{if(done)return;done=true;clearTimeout(t);ok(url);};
    img.onerror=()=>{if(done)return;done=true;clearTimeout(t);fail();};
    img.src=url;
  });
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
</script>
</body>
</html>
