<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Photo Generator - सचिन एआई</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif}
        body{background:#05080f;color:#e1e7f0;min-height:100vh;display:flex;flex-direction:column}
        header{background:linear-gradient(135deg,#0a0e1a,#0d1b2e);border-bottom:1px solid rgba(0,255,204,0.15);padding:13px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
        .back{color:#00ffcc;text-decoration:none;font-size:1.2rem;padding:4px}
        .ht{font-size:1rem;font-weight:700;color:#00ffcc}
        .hs{font-size:.7rem;color:#64748b;margin-top:2px}
        main{flex:1;display:flex;flex-direction:column;align-items:center;padding:16px 14px 60px;gap:14px}
        .card{width:100%;max-width:580px;background:rgba(255,255,255,.04);border:1px solid rgba(0,255,204,.15);border-radius:18px;padding:18px}
        /* Image box */
        .imgbox{width:100%;aspect-ratio:1;background:#080c18;border:2px dashed rgba(0,255,204,.12);border-radius:14px;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;transition:aspect-ratio .3s}
        .imgbox img{width:100%;height:100%;object-fit:contain;display:none}
        .ph{text-align:center;padding:20px}
        .ph-ico{font-size:3rem;opacity:.15;display:block;margin-bottom:8px}
        .ph-t{color:#334155;font-size:.82rem}
        /* Spinner */
        .spin{display:none;position:absolute;inset:0;background:rgba(5,8,15,.96);flex-direction:column;align-items:center;justify-content:center;gap:12px}
        .spin.on{display:flex}
        .ring{width:52px;height:52px;border:3px solid rgba(0,255,204,.08);border-top-color:#00ffcc;border-radius:50%;animation:rot .8s linear infinite}
        @keyframes rot{to{transform:rotate(360deg)}}
        .slbl{color:#00ffcc;font-size:.9rem;font-weight:600;text-align:center;padding:0 16px}
        .ssub{color:#64748b;font-size:.72rem;text-align:center;padding:0 20px;line-height:1.6}
        .pbar{width:200px;height:4px;background:rgba(0,255,204,.08);border-radius:2px;overflow:hidden;margin-top:4px}
        .pfill{height:100%;background:#00ffcc;border-radius:2px;width:0;transition:width .5s ease}
        /* Error */
        .err{display:none;background:rgba(251,191,36,.07);border:1px solid rgba(251,191,36,.2);border-radius:10px;padding:12px;color:#fbbf24;font-size:.78rem;margin-top:10px;line-height:1.6}
        /* Actions */
        .acts{display:none;gap:8px;margin-top:12px}
        .abtn{flex:1;padding:10px;border-radius:10px;border:1px solid rgba(0,255,204,.2);background:rgba(0,255,204,.05);color:#00ffcc;font-size:.8rem;cursor:pointer;font-family:inherit}
        /* Labels */
        .lbl{font-size:.72rem;font-weight:700;color:#00ffcc;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
        /* Style chips */
        .chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
        .chip{padding:6px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.03);color:#64748b;font-size:.72rem;cursor:pointer;font-family:inherit;transition:all .2s}
        .chip.on,.chip:hover{border-color:#00ffcc;background:rgba(0,255,204,.08);color:#00ffcc}
        /* Size */
        .szrow{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
        .szbtn{padding:6px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.03);color:#64748b;font-size:.72rem;cursor:pointer;font-family:inherit;transition:all .2s}
        .szbtn.on,.szbtn:hover{border-color:#00ffcc;background:rgba(0,255,204,.08);color:#00ffcc}
        /* Ideas */
        .ideas{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}
        .ideas::-webkit-scrollbar{display:none}
        .idea{flex-shrink:0;padding:6px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02);color:#475569;font-size:.72rem;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .2s}
        .idea:hover{border-color:rgba(0,255,204,.3);color:#00ffcc}
        /* Textarea */
        textarea{width:100%;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:12px;color:#e1e7f0;font-size:.92rem;resize:vertical;font-family:inherit;line-height:1.6;min-height:80px}
        textarea:focus{outline:none;border-color:rgba(0,255,204,.3)}
        textarea::placeholder{color:#334155}
        .row{display:flex;gap:8px;margin-top:8px}
        .rbtn{flex:1;padding:9px;background:rgba(0,255,204,.05);border:1px solid rgba(0,255,204,.15);border-radius:9px;color:#00ffcc;font-size:.78rem;cursor:pointer;font-family:inherit}
        .gbtn{width:100%;padding:15px;border-radius:14px;border:none;background:linear-gradient(135deg,#00ffcc,#00a896);color:#0a0e1a;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;margin-top:14px;transition:opacity .2s}
        .gbtn:disabled{opacity:.4;cursor:not-allowed}
        .api-note{font-size:.65rem;color:#1e2d3d;text-align:center;margin-top:6px}
        /* Toast */
        #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e293b;border:1px solid rgba(255,255,255,.08);color:#e1e7f0;padding:10px 20px;border-radius:10px;font-size:.82rem;opacity:0;transition:all .3s;z-index:999;white-space:nowrap}
        #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    </style>
</head>
<body>
<header>
    <a href="/" class="back">←</a>
    <div>
        <div class="ht">✨ AI Photo Generator</div>
        <div class="hs">Text लिखो → AI से Photo बनाएं — Free</div>
    </div>
</header>
<main>
    <!-- Preview card -->
    <div class="card" style="padding:14px">
        <div class="imgbox" id="imgbox">
            <img id="genimg" alt="AI Generated">
            <div class="ph" id="ph">
                <span class="ph-ico">🎨</span>
                <div class="ph-t">यहाँ आपकी AI Photo दिखेगी</div>
            </div>
            <div class="spin" id="spin">
                <div class="ring"></div>
                <div class="slbl" id="slbl">✨ Photo बन रही है...</div>
                <div class="ssub" id="ssub">AI process कर रहा है</div>
                <div class="pbar"><div class="pfill" id="pfill"></div></div>
            </div>
        </div>
        <div class="acts" id="acts">
            <button class="abtn" onclick="dlImg()">💾 Download</button>
            <button class="abtn" onclick="generate()">🔄 फिर बनाएं</button>
        </div>
        <div class="err" id="err"></div>
    </div>

    <!-- Controls card -->
    <div class="card">
        <div class="lbl">📸 Photo Style</div>
        <div class="chips">
            <button class="chip on" onclick="setStyle(this,'')">Auto</button>
            <button class="chip" onclick="setStyle(this,'ultra photorealistic, DSLR photograph, 8K resolution, sharp focus')">📷 Realistic</button>
            <button class="chip" onclick="setStyle(this,'cinematic movie still, dramatic lighting, film grain, 4K')">🎬 Cinematic</button>
            <button class="chip" onclick="setStyle(this,'anime style, vibrant colors, studio ghibli, beautiful art')">🎌 Anime</button>
            <button class="chip" onclick="setStyle(this,'oil painting, impressionist, thick brushstrokes, museum quality')">🎨 Painting</button>
            <button class="chip" onclick="setStyle(this,'3D CGI render, octane render, subsurface scattering, 4K')">🧊 3D CGI</button>
            <button class="chip" onclick="setStyle(this,'pencil sketch, graphite, cross-hatching, black and white')">✏️ Sketch</button>
            <button class="chip" onclick="setStyle(this,'watercolor painting, soft edges, delicate, artistic')">💧 Watercolor</button>
        </div>

        <div class="lbl">📐 Size</div>
        <div class="szrow">
            <button class="szbtn on" data-w="512" data-h="512" onclick="setSize(this)">■ Square 1:1</button>
            <button class="szbtn" data-w="768" data-h="512" onclick="setSize(this)">▬ Landscape</button>
            <button class="szbtn" data-w="512" data-h="768" onclick="setSize(this)">▮ Portrait</button>
        </div>

        <div class="lbl">💡 Quick Ideas</div>
        <div class="ideas" id="ideas"></div>

        <div class="lbl">✍️ Prompt — Hindi या English</div>
        <textarea id="pi" rows="3" placeholder="जो Photo चाहिए वो लिखें...&#10;Example: Beautiful Indian girl in red saree, temple, golden hour"></textarea>
        <div class="row">
            <button class="rbtn" onclick="rnd()">🎲 Random</button>
            <button class="rbtn" id="enhbtn" onclick="toggleEnh()">✨ Enhance: ON</button>
        </div>
        <button class="gbtn" id="gbtn" onclick="generate()">✨ Photo बनाएं</button>
        <div class="api-note" id="apinote">Free AI — Powered by Pollinations AI</div>
    </div>
</main>
<div id="toast"></div>

<script>
const IDEAS = [
    'Beautiful Indian girl in red saree, golden jewelry, temple',
    'Handsome man in royal Mughal outfit, palace, cinematic',
    'Baby elephant in sunflower field, golden hour, magical',
    'Lion on savanna at sunset, wildlife photography, 8K',
    'Futuristic Mumbai skyline 2050, neon lights, rain',
    'Indian Bharatanatyam dancer, colorful stage lights',
    'Dragon over Himalayan peaks, epic fantasy, wide shot',
    'Underwater coral reef, colorful fish, nature photo',
    'Indian street food market night, bokeh, vibrant colors',
    'Snow leopard in snowy Himalayas, wildlife, 4K',
    'Magical glowing forest, fireflies, fantasy art',
    'Cute cat wearing royal gold crown, studio portrait',
    'Indian bride close-up, floral jewelry, warm bokeh',
    'Colorful galaxy and nebula, deep space, NASA style',
    'Old man portrait, deep wrinkles, black and white film',
    'Superhero flying over city, cinematic, storm clouds',
    'Peacock full display, macro photography, vibrant',
    'Mountain lake reflection, sunrise, landscape 8K',
    'Tiger in jungle, intense gaze, wildlife photography',
    'Indian farmer in mustard field, golden hour portrait',
];

// Pollinations API — works from user's browser (phone/laptop IPs)
// Stable Horde API — fallback, completely free community AI
const HORDE_API = 'https://stablehorde.net/api/v2';
const ANON_KEY = '0000000000';

let selStyle = '', selW = 512, selH = 512, enhance = true;
let _busy = false, _imgUrl = null;

// Populate ideas
const ideasEl = document.getElementById('ideas');
IDEAS.forEach(t => {
    const b = document.createElement('button');
    b.className = 'idea'; b.textContent = t.split(',')[0].trim();
    b.onclick = () => { document.getElementById('pi').value = t; };
    ideasEl.appendChild(b);
});

function setStyle(el, s) {
    document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
    el.classList.add('on'); selStyle = s;
}
function setSize(el) {
    document.querySelectorAll('.szbtn').forEach(b=>b.classList.remove('on'));
    el.classList.add('on');
    selW = +el.dataset.w; selH = +el.dataset.h;
    const ar = selW===768&&selH===512?'16/9':selH===768&&selW===512?'9/16':'1';
    document.getElementById('imgbox').style.aspectRatio = ar;
}
function toggleEnh() {
    enhance = !enhance;
    const b = document.getElementById('enhbtn');
    b.textContent = '✨ Enhance: '+(enhance?'ON':'OFF');
    b.style.opacity = enhance ? '1' : '0.6';
}
function rnd() { document.getElementById('pi').value = IDEAS[Math.floor(Math.random()*IDEAS.length)]; }

function buildPrompt(raw) {
    const parts = [raw];
    if(selStyle) parts.push(selStyle);
    if(enhance) {
        const human = /\b(man|woman|girl|boy|person|people|face|portrait|bride|dancer|warrior|princess|king|queen|model|indian|farmer)\b/i.test(raw);
        parts.push(human
            ? 'ultra photorealistic, perfect skin, sharp focus, 8K DSLR, beautiful lighting'
            : 'ultra HD, sharp focus, highly detailed, 8K, masterpiece');
    }
    return parts.join(', ');
}

function setPfill(pct) { document.getElementById('pfill').style.width = pct+'%'; }

async function generate() {
    const raw = document.getElementById('pi').value.trim();
    if(!raw) { toast('⚠️ कुछ तो लिखें!'); return; }
    if(_busy) { toast('⏳ पहले वाली photo बन रही है...'); return; }
    _busy = true; _imgUrl = null;

    const btn = document.getElementById('gbtn');
    btn.disabled = true; btn.textContent = '⏳ बन रहा है...';
    document.getElementById('err').style.display = 'none';
    document.getElementById('acts').style.display = 'none';
    document.getElementById('genimg').style.display = 'none';
    document.getElementById('ph').style.display = 'block';
    document.getElementById('spin').classList.add('on');

    const prompt = buildPrompt(raw);

    // Step 1: Try Pollinations.ai (fast, 5-15 seconds from user IPs)
    const pollSuccess = await tryPollinations(prompt);
    if(pollSuccess) {
        btn.disabled = false; btn.textContent = '✨ Photo बनाएं'; _busy = false;
        return;
    }

    // Step 2: Fallback to Stable Horde (always works, 1-3 minutes)
    document.getElementById('apinote').textContent = 'Powered by Stable Horde Community AI';
    await tryStableHorde(prompt);

    btn.disabled = false; btn.textContent = '✨ Photo बनाएं'; _busy = false;
}

async function tryPollinations(prompt) {
    document.getElementById('slbl').textContent = '⚡ Fast AI से Photo बन रही है...';
    document.getElementById('ssub').textContent = 'Pollinations AI · 5-15 सेकंड';
    document.getElementById('apinote').textContent = 'Powered by Pollinations AI';
    setPfill(10);

    const seed = Math.floor(Math.random() * 999999);
    // Try multiple Pollinations endpoints
    const urls = [
        `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=${selW}&height=${selH}&nologo=true&seed=${seed}`,
        `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=${selW}&height=${selH}&nologo=true&seed=${seed+1}`,
    ];

    for(const url of urls) {
        try {
            const imgOk = await testImg(url, 30000);
            if(imgOk) {
                setPfill(100);
                showResult(url);
                toast('✅ Photo बन गई!');
                return true;
            }
        } catch { /* try next */ }
        await sleep(500);
    }
    return false;
}

async function tryStableHorde(prompt) {
    document.getElementById('slbl').textContent = '🎨 AI Photo बन रही है...';
    document.getElementById('ssub').textContent = 'Community AI · 1-3 मिनट लग सकते हैं';
    setPfill(5);

    try {
        const submitRes = await fetch(`${HORDE_API}/generate/async`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'apikey': ANON_KEY },
            body: JSON.stringify({
                prompt,
                params: { width: selW, height: selH, steps: 12, cfg_scale: 7, sampler_name: 'k_euler_a', n: 1 },
                models: ['stable_diffusion'],
                slow_workers: false,
                r2: false, shared: false
            })
        });
        const sub = await submitRes.json();
        if(!sub.id) throw new Error(sub.message || 'Submit failed');

        const jobId = sub.id;
        setPfill(15);

        for(let i = 0; i < 80; i++) {
            await sleep(4000);
            const chk = await fetch(`${HORDE_API}/generate/check/${jobId}`, { headers: { 'apikey': ANON_KEY } });
            const c = await chk.json();

            const prog = Math.min(90, 15 + i*1.5);
            setPfill(prog);

            if(c.wait_time > 0) {
                document.getElementById('ssub').textContent = `⏳ Queue में है — ~${c.wait_time} सेकंड बाकी`;
            } else if(c.processing) {
                document.getElementById('ssub').textContent = '⚡ लगभग तैयार है...';
            }

            if(c.done) {
                const stat = await fetch(`${HORDE_API}/generate/status/${jobId}`, { headers: { 'apikey': ANON_KEY } });
                const s = await stat.json();
                const gen = s.generations?.[0];
                if(gen?.img) {
                    setPfill(100);
                    showResult(gen.img);
                    toast('✅ Photo बन गई!');
                    return;
                }
                throw new Error('Image data नहीं मिली');
            }
            if(c.faulted) throw new Error('Server error');
        }
        throw new Error('Timeout — फिर try करें');

    } catch(e) {
        document.getElementById('spin').classList.remove('on');
        document.getElementById('ph').style.display = 'block';
        const err = document.getElementById('err');
        err.textContent = '⚠️ ' + (e.message||'Error आई') + '\n\nInternet connection check करें और दोबारा try करें।';
        err.style.display = 'block';
    }
}

function testImg(url, timeoutMs) {
    return new Promise((res, rej) => {
        const img = new Image();
        let done = false;
        const t = setTimeout(() => { if(done)return; done=true; img.src=''; rej(new Error('timeout')); }, timeoutMs);
        img.onload = () => { if(done)return; done=true; clearTimeout(t); res(url); };
        img.onerror = () => { if(done)return; done=true; clearTimeout(t); rej(new Error('load error')); };
        img.src = url;
    });
}

function showResult(url) {
    _imgUrl = url;
    document.getElementById('spin').classList.remove('on');
    const img = document.getElementById('genimg');
    img.src = url; img.style.display = 'block';
    document.getElementById('ph').style.display = 'none';
    document.getElementById('acts').style.display = 'flex';
}

async function dlImg() {
    if(!_imgUrl) { toast('⚠️ पहले photo बनाएं'); return; }
    toast('💾 Download हो रही है...');
    try {
        const a = document.createElement('a');
        a.href = _imgUrl; a.download = 'sachin-ai-photo.png'; a.target = '_blank';
        a.click();
    } catch { window.open(_imgUrl, '_blank'); }
}

function sleep(ms) { return new Promise(r=>setTimeout(r,ms)); }

function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 2800);
}
</script>
</body>
</html>
