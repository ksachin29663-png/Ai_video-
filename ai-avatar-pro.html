<main>
    <div class="card">
        <div class="steps">
            <div class="step-pill"><div class="step-num">1</div><div class="step-txt">फोटो & विवरण</div></div>
            <div class="step-pill"><div class="step-num">2</div><div class="step-txt">Style चुनें</div></div>
            <div class="step-pill"><div class="step-num">3</div><div class="step-txt">Avatar Generate</div></div>
        </div>

        <div class="card-title">Step 1 — सेल्फी अपलोड करें</div>
        <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">🤳</div>
            <div class="upload-text"><b>अपनी सेल्फी अपलोड करें</b></div>
            <input type="file" id="fileInput" accept="image/*" onchange="loadSelfie(event)">
        </div>
        <img id="selfiePreview" class="selfie-preview" alt="Selfie">
        <textarea class="desc" id="descInput" placeholder="अपना विवरण लिखें — जैसे: Indian young man, short black hair, warm smile, sharp jawline, brown eyes..."></textarea>

        <div class="card-title" style="margin-top:18px;">Step 2 — Avatar Category & Style</div>
        <div class="category-tabs">
            <button class="cat-tab active" data-cat="cartoon" onclick="switchCat(this)">🎭 Cartoon</button>
            <button class="cat-tab" data-cat="sketch" onclick="switchCat(this)">✏️ Sketch</button>
            <button class="cat-tab" data-cat="scifi" onclick="switchCat(this)">🚀 Sci-Fi</button>
            <button class="cat-tab" data-cat="fantasy" onclick="switchCat(this)">🧙 Fantasy</button>
            <button class="cat-tab" data-cat="pro" onclick="switchCat(this)">💼 Pro</button>
            <button class="cat-tab" data-cat="art" onclick="switchCat(this)">🎨 Fine Art</button>
        </div>

        <div class="style-gallery" id="styleGallery"></div>

        <div class="card-title">Step 3 — Quality चुनें</div>
        <div class="quality-row">
            <button class="qual-btn" data-q="512x512" onclick="selectQual(this)">🔸 Standard<br><small>512×512</small></button>
            <button class="qual-btn active" data-q="768x768" onclick="selectQual(this)">⭐ HD<br><small>768×768</small></button>
            <button class="qual-btn" data-q="1024x1024" onclick="selectQual(this)">💎 Ultra<br><small>1024×1024</small></button>
        </div>

        <button class="gen-btn" id="genBtn" onclick="generateAvatars()" disabled>🌟 2 Avatar Variations बनाएं</button>
    </div>

    <div class="card" id="resultCard" style="display:none">
        <div class="card-title">✅ आपके Avatars तैयार हैं!</div>
        <div class="spinner-box" id="spinnerBox">
            <div class="spin-ring"></div>
            <div class="spin-txt">⏳ Avatar बन रहे हैं...</div>
        </div>
        <div class="result-gallery" id="resultGallery"></div>
        <button class="gen-btn" style="margin-top:16px;background:rgba(167,139,250,0.12);color:#a78bfa;border:1px solid rgba(167,139,250,0.3);" onclick="generateAvatars()">🔄 नए Avatars बनाएं</button>

<script>
    const CATEGORIES = {
        cartoon: [
            { icon:'🎭', name:'3D Pixar', desc:'Pixar movie style', prompt:'3D Pixar cartoon portrait, colorful, studio lighting, high quality render' },
            { icon:'🎨', name:'Disney', desc:'Disney animation', prompt:'Disney animation character portrait, soft lighting, expressive, vibrant' },
            { icon:'💥', name:'Comic', desc:'Marvel/DC Style', prompt:'comic book superhero portrait, bold lines, dynamic, detailed inking' },
        ],
        sketch: [
            { icon:'✏️', name:'Pencil', desc:'Hand-drawn sketch', prompt:'detailed pencil sketch portrait, cross-hatching, realistic drawing, fine art' },
            { icon:'🖋️', name:'Charcoal', desc:'Charcoal drawing', prompt:'charcoal drawing portrait, dramatic shadows, black and white, artist quality' },
            { icon:'🖌️', name:'Ink Art', desc:'Ink illustration', prompt:'pen and ink portrait illustration, fine lines, artistic, detailed' },
        ],
        scifi: [
            { icon:'🌃', name:'Cyberpunk', desc:'Neon future', prompt:'cyberpunk portrait, neon lights, futuristic city backdrop, dramatic, cinematic' },
            { icon:'🤖', name:'Android', desc:'Robot fusion', prompt:'cyborg android portrait, metallic skin parts, sci-fi, glowing eyes, detailed' },
            { icon:'🚀', name:'Space Hero', desc:'Space explorer', prompt:'space explorer astronaut portrait, futuristic suit, nebula backdrop, epic' },
        ],
        fantasy: [
            { icon:'🧙', name:'Wizard', desc:'Magic wielder', prompt:'fantasy wizard portrait, magical robes, glowing staff, mystical, epic lighting' },
            { icon:'⚔️', name:'Warrior', desc:'Epic fighter', prompt:'fantasy warrior portrait, armor, battle-ready, cinematic, powerful' },
            { icon:'🧚', name:'Ethereal', desc:'Magical being', prompt:'ethereal fantasy being, glowing, soft light, dreamlike, magical portrait' },
        ],
        pro: [
            { icon:'💼', name:'LinkedIn', desc:'Professional photo', prompt:'professional LinkedIn profile photo, business attire, clean background, confident' },
            { icon:'📸', name:'Studio', desc:'Studio portrait', prompt:'professional studio portrait, soft box lighting, clean white background, sharp' },
            { icon:'🎯', name:'CEO Look', desc:'Corporate style', prompt:'executive CEO portrait, power suit, confident expression, professional setting' },
        ],
        art: [
            { icon:'🖼️', name:'Oil Paint', desc:'Classic art', prompt:'oil painting portrait, impressionist style, thick brushstrokes, museum quality' },
            { icon:'🎨', name:'Watercolor', desc:'Soft painting', prompt:'watercolor portrait painting, soft washes, artistic, dreamy, fine art' },
            { icon:'✨', name:'Gold Art', desc:'Luxury style', prompt:'ornate golden portrait, Art Nouveau style, intricate patterns, luxurious' },
        ],
    };

    let selectedStyle = CATEGORIES.cartoon[0];
    let selectedQuality = '768x768';
    let avatarUrls = [];

    function switchCat(el) {
        document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        renderStyleGallery(CATEGORIES[el.dataset.cat]);
    }

    function renderStyleGallery(styles) {
        const gallery = document.getElementById('styleGallery');
        gallery.innerHTML = styles.map((s, i) => `
            <div class="style-card ${i === 0 ? 'selected' : ''}" onclick="selectStyleCard(this, '${s.prompt}', '${s.name}')">
                <div class="s-icon">${s.icon}</div>
                <div class="s-name">${s.name}</div>
                <div class="s-desc">${s.desc}</div>
            </div>`).join('');
        selectedStyle = styles[0];
    }

    function selectStyleCard(el, prompt, name) {
        document.querySelectorAll('.style-card').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        selectedStyle = { prompt, name };
    }

    function selectQual(el) {
        document.querySelectorAll('.qual-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        selectedQuality = el.dataset.q;
    }

    function loadSelfie(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            document.getElementById('selfiePreview').src = e.target.result;
            document.getElementById('selfiePreview').style.display = 'block';
            document.getElementById('genBtn').disabled = false;
        };
        reader.readAsDataURL(file);
    }

    function generateAvatars() {
        const desc = document.getElementById('descInput').value.trim();
        if (!desc) { alert('कृपया अपना विवरण लिखें!'); return; }
        const [w, h] = selectedQuality.split('x');
        document.getElementById('genBtn').disabled = true;
        document.getElementById('resultCard').style.display = 'block';
        document.getElementById('spinnerBox').style.display = 'block';
        document.getElementById('resultGallery').innerHTML = '';
        document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth' });

        avatarUrls = [];
        let done = 0;
        [0, 1].forEach(i => {
            const seed = Math.floor(Math.random() * 999999);
            const tweak = i === 1 ? ', slightly different angle, alternate color palette' : '';
            const fullPrompt = `Portrait of ${desc}, ${selectedStyle.prompt}${tweak}, highly detailed, ${w === '1024' ? 'ultra HD' : 'high quality'}, masterpiece`;
            const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(fullPrompt)}?width=${w}&height=${h}&nologo=true&seed=${seed}`;
            avatarUrls.push(url);

            const tempImg = new Image();
            tempImg.crossOrigin = 'anonymous';
            tempImg.onload = function() {
                done++;
                addResultCard(url, i + 1, selectedStyle.name);
                if (done === 2) finishGeneration();
            };
            tempImg.onerror = function() {
                done++;
                if (done === 2) finishGeneration();
            };
            tempImg.src = url;
        });
    }

    function addResultCard(url, num, styleName) {
        const gallery = document.getElementById('resultGallery');
        const card = document.createElement('div');
        card.className = 'result-card';
        card.innerHTML = `
            <img src="${url}" class="result-img" alt="Avatar ${num}">
            <div class="result-actions">
                <button class="r-btn r-dl-btn" onclick="dlAvatar('${url}',${num})">📥 Save</button>
                <button class="r-btn r-regen-btn" onclick="generateAvatars()">🔄</button>
            </div>`;
        gallery.appendChild(card);
    }

    function finishGeneration() {
        document.getElementById('spinnerBox').style.display = 'none';
        document.getElementById('genBtn').disabled = false;
    }

    function dlAvatar(url, num) {
        const a = document.createElement('a');
        a.download = `sachin-ai-avatar-pro-${num}.png`;
        a.href = url;
        a.target = '_blank';
        a.click();
    }

    // Initialize default gallery
    renderStyleGallery(CATEGORIES.cartoon);
</script>
