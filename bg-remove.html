function canvasRemoveBg(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = img.width; canvas.height = img.height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        const data = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const d = data.data;
        // Sample corner colors as background
        const corners = [[0,0],[canvas.width-1,0],[0,canvas.height-1],[canvas.width-1,canvas.height-1]];
        let bgR=0,bgG=0,bgB=0;
        corners.forEach(([x,y])=>{const i=(y*canvas.width+x)*4;bgR+=d[i];bgG+=d[i+1];bgB+=d[i+2];});
        bgR=Math.round(bgR/4);bgG=Math.round(bgG/4);bgB=Math.round(bgB/4);
        const thresh = 55;
        for(let i=0;i<d.length;i+=4){
          const dr=Math.abs(d[i]-bgR),dg=Math.abs(d[i+1]-bgG),db=Math.abs(d[i+2]-bgB);
          if(dr<thresh&&dg<thresh&&db<thresh) d[i+3]=0;
        }
        ctx.putImageData(data,0,0);
        resolve(canvas.toDataURL('image/png'));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}
</script>

    <script>
        document.getElementById('remove-btn').addEventListener('click', async function() {
            const fileInput = document.getElementById('image-file');
            const resBox = document.getElementById('res-box');
            const outputImg = document.getElementById('output-img');
            const statusText = document.getElementById('status-text');
            const downloadLink = document.getElementById('download-link');

            if (!fileInput.files[0]) {
                alert("कृपया पहले अपनी गैलरी से एक फोटो सेलेक्ट करें!");
                return;
            }

            statusText.style.display = "block";
            resBox.style.display = "none";

            const file = fileInput.files[0];

            try {
                const dataUrl = await canvasRemoveBg(file);
                outputImg.src = dataUrl;
                downloadLink.href = dataUrl;
                statusText.style.display = "none";
                resBox.style.display = "block";
            } catch (error) {
                statusText.textContent = '❌ Error: ' + error.message;
            }
        });
    </script>
