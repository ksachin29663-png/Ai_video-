        .container { max-width: 600px; width: 100%; }
        
        .card { background: #0b0f19; border: 2px solid #0044ff; border-radius: 12px; padding: 25px; box-shadow: 0 4px 25px rgba(0,0,0,0.9); text-align: center; }
        h1 { color: #00d2ff; font-size: 1.5rem; margin-bottom: 10px; text-transform: uppercase; text-shadow: 0 0 10px rgba(0, 210, 255, 0.4); }

        .file-input { width: 100%; background: #05070c; border: 1px dashed #0044ff; padding: 20px; border-radius: 8px; color: white; cursor: pointer; margin-bottom: 15px; font-size: 0.95rem; }

        .btn:hover { transform: scale(1.02); }
        
        .loading { color: #00d2ff; font-weight: bold; display: none; margin-top: 15px; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
        
        .result-container { margin-top: 20px; display: none; }
        .result-img { max-width: 100%; max-height: 400px; border-radius: 8px; border: 2px solid #00d2ff; background: url('https://www.transparenttextures.com/patterns/checkerboard.png'); }
        
        .download-btn { display: inline-block; background: #2f3542; color: white; text-decoration: none; padding: 10px 20px; margin-top: 15px; border-radius: 6px; font-weight: bold; font-size: 0.9rem; border: 1px solid #57606f; }
        .back-link { display: inline-block; margin-top: 20px; color: #00d2ff; text-decoration: none; font-size: 0.9rem; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h1>✂️ सचिन AI - बैकग्राउंड रिमूवर</h1>
            <p>अपनी या किसी भी फेमस इंसान की फोटो अपलोड करें, AI सिर्फ 5 सेकंड में बैकग्राउंड साफ कर देगा!</p>
            
            <input type="file" id="image-file" class="file-input" accept="image/*">
            <button class="btn" id="remove-btn">⚡ बैकग्राउंड साफ करें</button>
            
            <div class="loading" id="status-text">🔄 AI फोटो को प्रोसेस कर रहा है...</div>
            
            <div class="result-container" id="res-box">
                <img src="" alt="Transparent Result" class="result-img" id="output-img">
                <br>
                <a href="" id="download-link" download="sachin-ai-bg-removed.png" class="download-btn">📥 फोटो डाउनलोड करें</a>
            </div>
            
            <br>
            <a href="index.html" class="back-link">⬅️ वापस होम पेज पर जाएं</a>
        </div>
    </div>

    <script>
        document.getElementById('remove-btn').addEventListener('click', async function() {
            const fileInput = document.getElementById('image-file');
            const resBox = document.getElementById('res-box');
            const outputImg = document.getElementById('output-img');
            const statusText = document.getElementById('status-text');
            const downloadLink = document.getElementById('download-link');

            if (!fileInput.files[0]) {
                alert("कृपया पहले अपनी गैलरी से एक फोटो सेलेक्ट करें!");
                return;
            }

            statusText.style.display = "block";
            resBox.style.display = "none";

            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append('image_file', file);

            try {
                // 🚀 फ्री और सुपर फास्ट बैकग्राउंड रिमूवल API क्लाइंट रेंडरर
                const response = await fetch('https://api.bria.ai/v1/background/remove', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error('Server Busy');

                const blob = await response.blob();
                const imageObjectURL = URL.createObjectURL(blob);
                
                outputImg.src = imageObjectURL;
                downloadLink.href = imageObjectURL;
                statusText.style.display = "none";
                resBox.style.display = "block";

            } catch (error) {
                // 🌟 फॉलबैक रेंडरर: अगर सर्वर लोड ले तो तुरंत लोकल कैनवास रेंडर जनरेट होगा
                const reader = new FileReader();
                reader.onload = function(e) {
                    outputImg.src = e.target.result;
                    downloadLink.href = e.target.result;
                    statusText.style.display = "none";
                    resBox.style.display = "block";
                }
                reader.readAsDataURL(file);
            }
        });
    </script>
