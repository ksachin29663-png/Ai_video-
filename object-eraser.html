<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>मैजिक इरेज़र - सचिन एआई</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #080c16; color: #e1e7f0; min-height: 100vh; display: flex; flex-direction: column; }
        header { background: linear-gradient(135deg,#0a0e1a,#1a0808); border-bottom: 1px solid rgba(239,68,68,0.3); padding: 14px 20px; display: flex; align-items: center; gap: 14px; }
        .back-btn { color: #ef4444; text-decoration: none; font-size: 1.3rem; }
        .page-title { font-size: 1.1rem; font-weight: 700; color: #ef4444; }
        .page-sub { font-size: 0.75rem; color: #64748b; }
        main { flex: 1; padding: 20px 16px; display: flex; flex-direction: column; align-items: center; gap: 16px; }
        .card { width: 100%; max-width: 640px; background: rgba(255,255,255,0.04); border: 1px solid rgba(239,68,68,0.2); border-radius: 20px; padding: 20px; }
        .upload-zone { border: 2px dashed rgba(239,68,68,0.3); border-radius: 14px; padding: 28px; text-align: center; cursor: pointer; transition: all 0.3s; }
        .upload-zone:hover { border-color: #ef4444; background: rgba(239,68,68,0.04); }
        .upload-zone input { display: none; }
        .upload-icon { font-size: 2.5rem; margin-bottom: 8px; }
        .upload-text { color: #64748b; font-size: 0.85rem; }
        .upload-text b { color: #ef4444; }
        .canvas-wrap { position: relative; border-radius: 14px; overflow: hidden; background: #000; margin: 14px 0; display: none; touch-action: none; }
        canvas#drawCanvas { display: block; width: 100%; cursor: crosshair; }
        .tool-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
        .tool-label { font-size: 0.8rem; color: #94a3b8; }
        input[type=range].brush { accent-color: #ef4444; width: 120px; }
        .brush-preview { width: 30px; height: 30px; border-radius: 50%; background: rgba(239,68,68,0.6); border: 2px solid #ef4444; display: inline-flex; align-items: center; justify-content: center; font-size: 0.6rem; color: #fff; }
        .erase-btn { padding: 12px 20px; font-size: 0.9rem; font-weight: 700; border: none; border-radius: 12px; cursor: pointer; background: linear-gradient(135deg,#ef4444,#b91c1c); color: #fff; font-family: inherit; transition: all 0.3s; flex: 1; }
        .erase-btn:hover { box-shadow: 0 0 18px rgba(239,68,68,0.4); }
        .erase-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .clear-btn { padding: 12px 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); color: #e1e7f0; font-size: 0.85rem; cursor: pointer; font-family: inherit; }
        .clear-btn:hover { background: rgba(255,255,255,0.1); }
        .dl-btn { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); color: #e1e7f0; font-size: 0.85rem; cursor: pointer; font-family: inherit; margin-top: 10px; }
        .dl-btn:hover { background: rgba(255,255,255,0.1); }
        .result-box { display: none; margin-top: 14px; border-radius: 12px; overflow: hidden; }
        .result-box img { width: 100%; border-radius: 12px; border: 1px solid rgba(239,68,68,0.3); }
        .hint { font-size: 0.78rem; color: #64748b; text-align: center; padding: 8px; background: rgba(239,68,68,0.06); border-radius: 8px; margin-bottom: 12px; }
    </style>
</head>
<body>
<header>
    <a href="index.html" class="back-btn">←</a>
    <div>
        <div class="page-title">🧹 मैजिक ऑब्जेक्ट इरेज़र</div>
        <div class="page-sub">जो न चाहिए उसे मिटाओ — AI भर देगा</div>
    </div>
</header>
<main>
    <div class="card">
        <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">📸</div>
            <div class="upload-text"><b>फोटो अपलोड करें</b> — जिसमें कुछ मिटाना हो</div>
            <input type="file" id="fileInput" accept="image/*" onchange="loadImg(event)">
        </div>

        <div id="editorSection" style="display:none">
            <div class="hint">👆 जिसे मिटाना हो उस पर उंगली से रंग करें (लाल ब्रश से)</div>
            <div class="tool-row">
                <span class="tool-label">ब्रश साइज़:</span>
                <input type="range" class="brush" id="brushSize" min="5" max="60" value="20">
                <div class="brush-preview" id="brushPreview">20</div>
            </div>
            <div class="canvas-wrap" id="canvasWrap">
                <canvas id="drawCanvas"></canvas>
            </div>
            <div style="display:flex;gap:10px;margin-top:8px;">
                <button class="erase-btn" id="eraseBtn" onclick="eraseObject()">🧹 AI से मिटाएं</button>
                <button class="clear-btn" onclick="clearMask()">↩ साफ करें</button>
            </div>
        </div>
    </div>

    <div class="card" id="resultCard" style="display:none">
        <div style="font-size:0.9rem;font-weight:700;color:#ef4444;margin-bottom:12px;">✅ ऑब्जेक्ट मिटाया गया!</div>
        <div class="result-box" id="resultBox">
            <img id="resultImg" alt="Erased Result">
        </div>
        <button class="dl-btn" onclick="downloadResult()">📥 फोटो डाउनलोड करें</button>
    </div>
</main>

<script>
    let originalImg = null;
    let isDrawing = false;
    let resultDataUrl = null;
    const canvas = document.getElementById('drawCanvas');
    const ctx = canvas.getContext('2d');

    document.getElementById('brushSize').addEventListener('input', function() {
        document.getElementById('brushPreview').textContent = this.value;
    });

    function loadImg(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            originalImg = new Image();
            originalImg.onload = () => {
                const maxW = Math.min(originalImg.width, 900);
                const scale = maxW / originalImg.width;
                canvas.width = originalImg.width * scale;
                canvas.height = originalImg.height * scale;
                ctx.drawImage(originalImg, 0, 0, canvas.width, canvas.height);
                document.getElementById('canvasWrap').style.display = 'block';
                document.getElementById('editorSection').style.display = 'block';
            };
            originalImg.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
    }

    function draw(e) {
        if (!isDrawing) return;
        e.preventDefault();
        const pos = getPos(e);
        const size = parseInt(document.getElementById('brushSize').value);
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, size, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(239,68,68,0.7)';
        ctx.fill();
    }

    canvas.addEventListener('mousedown', e => { isDrawing = true; draw(e); });
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', () => isDrawing = false);
    canvas.addEventListener('touchstart', e => { isDrawing = true; draw(e); }, { passive: false });
    canvas.addEventListener('touchmove', draw, { passive: false });
    canvas.addEventListener('touchend', () => isDrawing = false);

    function clearMask() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(originalImg, 0, 0, canvas.width, canvas.height);
    }

    function eraseObject() {
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const d = imageData.data;
        
        // Find masked regions (red pixels) and inpaint with surrounding content
        const maskPx = [];
        for (let i = 0; i < d.length; i += 4) {
            const r = d[i], g = d[i+1], b = d[i+2];
            if (r > 150 && g < 80 && b < 80) maskPx.push(i);
        }

        // Simple inpainting: replace with average of non-masked neighbors
        for (let pass = 0; pass < 3; pass++) {
            for (const idx of maskPx) {
                const px = idx / 4;
                const x = px % canvas.width;
                const y = Math.floor(px / canvas.width);
                let rSum = 0, gSum = 0, bSum = 0, count = 0;
                for (let dy = -8; dy <= 8; dy += 2) {
                    for (let dx = -8; dx <= 8; dx += 2) {
                        const nx = x + dx, ny = y + dy;
                        if (nx < 0 || nx >= canvas.width || ny < 0 || ny >= canvas.height) continue;
                        const ni = (ny * canvas.width + nx) * 4;
                        const nr = d[ni], ng = d[ni+1], nb = d[ni+2];
                        if (nr > 150 && ng < 80 && nb < 80) continue;
                        rSum += nr; gSum += ng; bSum += nb; count++;
                    }
                }
                if (count > 0) { d[idx] = rSum/count; d[idx+1] = gSum/count; d[idx+2] = bSum/count; }
            }
        }
        ctx.putImageData(imageData, 0, 0);

        resultDataUrl = canvas.toDataURL('image/jpeg', 0.95);
        document.getElementById('resultImg').src = resultDataUrl;
        document.getElementById('resultBox').style.display = 'block';
        document.getElementById('resultCard').style.display = 'block';
        document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth' });
    }

    function downloadResult() {
        if (!resultDataUrl) return;
        const a = document.createElement('a');
        a.download = 'sachin-ai-erased.jpg';
        a.href = resultDataUrl;
        a.click();
    }
</script>
<script src="/ads.js"></script>
</body>
</html>
