<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sachin AI - Chat & Photo Studio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: #060913; color: #e1e7f0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: linear-gradient(135deg, #0044ff, #001133); padding: 12px; text-align: center; border-bottom: 2px solid #00d2ff; box-shadow: 0 4px 15px rgba(0,68,255,0.3); display: flex; align-items: center; gap: 12px; justify-content: center; }
        .back-btn { color: #00d2ff; text-decoration: none; font-size: 1.3rem; position: absolute; left: 16px; }
        header h1 { color: #00d2ff; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px; }
        .main-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; background: #060913; padding-bottom: 20px; }
        .chat-container { display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 12px; font-size: 0.95rem; line-height: 1.5; word-wrap: break-word; }
        .user-msg { background: #0044ff; color: white; align-self: flex-end; border-bottom-right-radius: 2px; box-shadow: 0 4px 10px rgba(0,68,255,0.2); }
        .ai-msg { background: #111827; color: #e1e7f0; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #1e293b; }
        .photo-generator { background: #0b0f19; padding: 15px; border-radius: 12px; border: 1px solid #0044ff; box-shadow: 0 0 15px rgba(0,68,255,0.1); margin-top: 10px; }
        .photo-generator h3 { color: #00d2ff; font-size: 1.1rem; margin-bottom: 10px; text-align: center; }
        .gen-input { width: 100%; background: #05070c; border: 1px solid #0044ff; padding: 12px; border-radius: 8px; color: white; font-size: 0.95rem; outline: none; margin-bottom: 10px; }
        .gen-btn { width: 100%; background: linear-gradient(90deg, #00d2ff, #0044ff); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.95rem; transition: 0.2s; text-transform: uppercase; }
        .gen-btn:active { transform: scale(0.98); }
        .gen-btn:disabled { background: #2a334d; color: #8b949e; cursor: not-allowed; }
        .image-preview { width: 100%; min-height: 200px; margin-top: 15px; background: #05070c; border-radius: 8px; display: flex; justify-content: center; align-items: center; overflow: hidden; border: 1px dashed #1e293b; }
        .image-preview img { max-width: 100%; max-height: 100%; border-radius: 8px; display: none; }
        .bottom-section { background: #0b0f19; border-top: 1px solid #1e293b; display: flex; flex-direction: column; width: 100%; position: relative; box-shadow: 0 -4px 15px rgba(0,0,0,0.5); padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        .input-area { padding: 10px; display: flex; gap: 8px; align-items: center; }
        .chat-input { flex: 1; background: #05070c; border: 1px solid #0044ff; padding: 12px; border-radius: 8px; color: white; font-size: 0.95rem; outline: none; }
        .chat-input:focus { border-color: #00d2ff; box-shadow: 0 0 8px rgba(0,210,255,0.3); }
        .send-btn { background: linear-gradient(90deg, #0044ff, #00d2ff); color: white; border: none; padding: 12px 22px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.95rem; transition: 0.2s; }
        .send-btn:active { transform: scale(0.95); }
        .typing { color: #00d2ff; font-size: 0.85rem; padding: 6px 12px; display: none; }
    </style>
</head>
<body>
<header>
    <a href="index.html" class="back-btn">←</a>
    <h1>🤖 SACHIN AI Studio</h1>
</header>

<div class="main-container" id="main-scroller">
    <div class="chat-container" id="chat-box">
        <div class="msg ai-msg">
            <strong>Sachin AI:</strong> नमस्कार! मैं आपका AI असिस्टेंट हूँ। आप मुझसे कुछ भी पूछ सकते हैं और नीचे दिए गए बॉक्स से AI फोटो भी बनवा सकते हैं! 😎
        </div>
    </div>
    <div class="typing" id="typingIndicator">⏳ AI सोच रहा है...</div>

    <div class="photo-generator">
        <h3>🖼️ फोटो जनरेटर लैब</h3>
        <input type="text" id="photo-prompt" class="gen-input" placeholder="जैसी फोटो चाहिए, यहाँ लिखें (उदा: 'सूर्यास्त का दृश्य')">
        <button id="generate-photo-btn" class="gen-btn">फोटो जनरेट करें</button>
        <div class="image-preview" id="image-frame">
            <img src="" alt="AI Generated Image" id="ai-photo">
        </div>
    </div>
</div>

<div class="bottom-section">
    <div class="input-area">
        <input type="text" id="user-input" class="chat-input" placeholder="यहाँ अपना सवाल लिखें...">
        <button class="send-btn" id="send-btn">भेजें</button>
    </div>
</div>

<script>
    const mainScroller = document.getElementById('main-scroller');
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const typingIndicator = document.getElementById('typingIndicator');

    function appendMessage(text, sender) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('msg', sender === 'user' ? 'user-msg' : 'ai-msg');
        msgDiv.innerHTML = sender === 'user'
            ? `<strong>आप:</strong> ${text}`
            : `<strong>AI:</strong> ${text.replace(/\n/g, '<br>')}`;
        chatBox.appendChild(msgDiv);
        mainScroller.scrollTop = mainScroller.scrollHeight;
    }

    async function fetchAIResponse(prompt) {
        typingIndicator.style.display = 'block';
        mainScroller.scrollTop = mainScroller.scrollHeight;
        try {
            const res = await fetch('/ai-chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: prompt })
            });
            const data = await res.json();
            appendMessage(data.reply || 'कोई जवाब नहीं मिला।', 'ai');
        } catch (error) {
            appendMessage('सर्वर से जुड़ने में दिक्कत हुई। फिर से कोशिश करें!', 'ai');
        } finally {
            typingIndicator.style.display = 'none';
        }
    }

    sendBtn.addEventListener('click', () => {
        const text = userInput.value.trim();
        if (!text) return;
        appendMessage(text, 'user');
        userInput.value = '';
        fetchAIResponse(text);
    });

    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendBtn.click();
    });

    const generatePhotoBtn = document.getElementById('generate-photo-btn');
    const photoPromptInput = document.getElementById('photo-prompt');
    const imageFrame = document.getElementById('image-frame');
    const aiPhotoImg = document.getElementById('ai-photo');

    generatePhotoBtn.addEventListener('click', () => {
        const promptText = photoPromptInput.value.trim();
        if (!promptText) { alert('कृपया पहले लिखें कि कैसी फोटो चाहिए!'); return; }
        generatePhotoBtn.disabled = true;
        generatePhotoBtn.textContent = '⏳ फोटो बन रही है...';
        aiPhotoImg.style.display = 'none';
        const seed = Math.floor(Math.random() * 99999);
        const imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(promptText)}?width=1024&height=1024&nologo=true&seed=${seed}`;
        aiPhotoImg.src = imageUrl;
        aiPhotoImg.onload = () => {
            generatePhotoBtn.disabled = false;
            generatePhotoBtn.textContent = 'फोटो जनरेट करें';
            aiPhotoImg.style.display = 'block';
            mainScroller.scrollTop = mainScroller.scrollHeight;
        };
        aiPhotoImg.onerror = () => {
            generatePhotoBtn.disabled = false;
            generatePhotoBtn.textContent = 'फोटो जनरेट करें';
            alert('फोटो नहीं बन सकी। दोबारा कोशिश करें!');
        };
    });
</script>
<script src="tracker.js"></script>
