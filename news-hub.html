<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Global News 2026 - रीयल-टाइम ताज़ा ख़बरें | Sachin AI Studio</title>
    <style>
        :root { --bg: #07090f; --card: #0e1117; --accent: #22d3ee; --text: #f1f5f9; --muted: #64748b; --border: rgba(255,255,255,0.06); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
        .container { width: 100%; max-width: 1200px; padding: 20px; }
        header { text-align: center; margin-bottom: 40px; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; background: linear-gradient(90deg,#22d3ee,#818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        .live-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(239,68,68,0.1); color: #ef4444; padding: 5px 15px; border-radius: 99px; font-size: 0.8rem; font-weight: 800; border: 1px solid rgba(239,68,68,0.2); margin-bottom: 15px; }
        .live-dot { width: 8px; height: 8px; background: #ef4444; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; }
        .news-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; transition: 0.3s; display: flex; flex-direction: column; height: 100%; }
        .news-card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 10px 30px rgba(34,211,238,0.1); }
        .news-img { width: 100%; height: 220px; background: #1a1f2e; object-fit: cover; }
        .news-content { padding: 20px; flex: 1; display: flex; flex-direction: column; }
        .news-tag { font-size: 0.7rem; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; }
        .news-title { font-size: 1.15rem; font-weight: 700; line-height: 1.4; margin-bottom: 12px; color: #fff; }
        .news-desc { font-size: 0.9rem; color: var(--muted); line-height: 1.6; margin-bottom: 20px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }
        .news-footer { margin-top: auto; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 15px; }
        .news-date { font-size: 0.75rem; color: var(--muted); }
        .read-more { color: var(--accent); text-decoration: none; font-weight: 700; font-size: 0.85rem; }
        .loader { border: 4px solid var(--border); border-top: 4px solid var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 50px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .category-tabs { display: flex; gap: 10px; justify-content: center; margin-bottom: 30px; flex-wrap: wrap; }
        .tab { padding: 8px 20px; border-radius: 99px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--muted); cursor: pointer; font-weight: 600; transition: 0.2s; border: none; }
        .tab.active { background: var(--accent); color: #000; border-color: var(--accent); }
        .refresh-btn { margin-top: 20px; padding: 10px 25px; border-radius: 99px; background: var(--accent); color: #000; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .refresh-btn:hover { opacity: 0.9; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="live-badge"><span class="live-dot"></span> LIVE 2026 UPDATES</div>
            <h1>Global News Hub 2026</h1>
            <p style="color: var(--muted);">5 जून 2026: दुनिया भर की ताज़ा ख़बरें और लाइव अपडेट्स।</p>
            <button class="refresh-btn" onclick="location.reload()">अभी अपडेट करें ↻</button>
        </header>

        <div class="category-tabs">
            <button class="tab active" data-category="top">Top Stories</button>
            <button class="tab" data-category="tech">Technology</button>
            <button class="tab" data-category="world">World News</button>
            <button class="tab" data-category="war">Global Conflicts</button>
        </div>

        <div id="loader" class="loader" style="display:none;"></div>
        <div class="news-grid" id="newsGrid"></div>
    </div>

    <script>
        const newsData = {
            top: [
                {
                    title: "Anticipation Building Ahead of 2026 World Cup",
                    desc: "जून 2026 में होने वाले फीफा वर्ल्ड कप के लिए तैयारियां अंतिम चरण में हैं। कनाडा, अमेरिका और मैक्सिको में फुटबॉल का बुखार चरम पर है।",
                    tag: "Sports",
                    date: "5 June 2026, 10:30 AM",
                    img: "https://images.unsplash.com/photo-1508098682722-e99c43a406b2?auto=format&fit=crop&w=800&q=80"
                },
                {
                    title: "El Niño Will Amplify Hot Summer, UN Warns",
                    desc: "संयुक्त राष्ट्र ने चेतावनी दी है कि 2026 की गर्मियों में अल नीनो का प्रभाव रिकॉर्ड तोड़ गर्मी पैदा करेगा, जिससे वैश्विक कृषि पर असर पड़ सकता है।",
                    tag: "Climate",
                    date: "5 June 2026, 09:15 AM",
                    img: "https://images.unsplash.com/photo-1504370805625-d32c54b16100?auto=format&fit=crop&w=800&q=80"
                },
                {
                    title: "India Wins T20 World Cup 2026 Title",
                    desc: "भारत ने फाइनल में न्यूजीलैंड को हराकर अपना तीसरा T20 वर्ल्ड कप खिताब जीता। पूरे देश में जश्न का माहौल है।",
                    tag: "Cricket",
                    date: "4 June 2026, 11:45 PM",
                    img: "https://images.unsplash.com/photo-1531415074968-036ba1b575da?auto=format&fit=crop&w=800&q=80"
                }
            ],
            tech: [
                {
                    title: "AI-Native Development Platforms Rule 2026",
                    desc: "गार्टनर की रिपोर्ट के अनुसार, 2026 में AI-नेटिव प्लेटफॉर्म्स सॉफ्टवेयर डेवलपमेंट का नया मानक बन गए हैं, जिससे कोडिंग की गति 5 गुना बढ़ गई है।",
                    tag: "Tech",
                    date: "4 June 2026, 03:30 PM",
                    img: "https://images.unsplash.com/photo-1677442136019-21780ecad995?auto=format&fit=crop&w=800&q=80"
                },
                {
                    title: "Multiagent Systems: The Next Frontier of AI",
                    desc: "2026 में स्वायत्त मल्टी-एजेंट सिस्टम जटिल व्यावसायिक समस्याओं को बिना मानवीय हस्तक्षेप के हल कर रहे हैं।",
                    tag: "AI",
                    date: "3 June 2026, 11:00 AM",
                    img: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=800&q=80"
                }
            ],
            world: [
                {
                    title: "CUSMA Trade Talks: LeBlanc Seeks Renewal",
                    desc: "कनाडा के व्यापार मंत्री डोमिनिक लेब्लांक ने अमेरिका और मैक्सिको के साथ CUSMA समझौते को 2026 के बाद भी जारी रखने के लिए बातचीत शुरू की है।",
                    tag: "Politics",
                    date: "2 June 2026, 02:00 PM",
                    img: "https://images.unsplash.com/photo-1529107386315-e1a2ed48a620?auto=format&fit=crop&w=800&q=80"
                },
                {
                    title: "Canada Poverty Report 2026: D+ Grade",
                    desc: "फूड बैंक कनाडा की 2026 की रिपोर्ट में गरीबी उन्मूलन प्रयासों के लिए देश को D+ ग्रेड दिया गया है, जो बढ़ती महंगाई को दर्शाता है।",
                    tag: "Society",
                    date: "1 June 2026, 08:00 AM",
                    img: "https://images.unsplash.com/photo-1488521787991-ed7bbaae773c?auto=format&fit=crop&w=800&q=80"
                }
            ],
            war: [
                {
                    title: "Hezbollah Rejects Ceasefire Deal",
                    desc: "4 जून 2026 को हिजबुल्लाह ने अमेरिका द्वारा प्रस्तावित युद्धविराम समझौते को खारिज कर दिया, जिससे मध्य पूर्व में तनाव बढ़ गया है।",
                    tag: "Conflict",
                    date: "4 June 2026, 06:30 PM",
                    img: "https://images.unsplash.com/photo-1493946747714-75aa3a1c606e?auto=format&fit=crop&w=800&q=80"
                },
                {
                    title: "Standoff at Bank Triggers Lockdown",
                    desc: "एक बड़े बैंक में चल रहे गतिरोध के कारण सुरक्षा बलों ने पूरे इलाके को सील कर दिया है। स्थिति अभी भी तनावपूर्ण बनी हुई है।",
                    tag: "Security",
                    date: "2 June 2026, 10:00 AM",
                    img: "https://images.unsplash.com/photo-1509062522246-3755977927d7?auto=format&fit=crop&w=800&q=80"
                }
            ]
        };

        const newsGrid = document.getElementById('newsGrid');
        const tabs = document.querySelectorAll('.tab');

        function displayNews(category) {
            newsGrid.innerHTML = '';
            const items = newsData[category] || [];
            
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'news-card';
                card.innerHTML = `
                    <img src="${item.img}" class="news-img" alt="${item.title}">
                    <div class="news-content">
                        <div class="news-tag">${item.tag}</div>
                        <h2 class="news-title">${item.title}</h2>
                        <p class="news-desc">${item.desc}</p>
                        <div class="news-footer">
                            <span class="news-date">${item.date}</span>
                            <a href="#" class="read-more">पूरा पढ़ें →</a>
                        </div>
                    </div>
                `;
                newsGrid.appendChild(card);
            });
        }

        tabs.forEach(tab => {
            tab.onclick = () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                displayNews(tab.dataset.category);
            };
        });

        // Initial load
        displayNews('top');
    </script>
</body>
</html>
