<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Global News & Story Hub - रीयल-टाइम ताज़ा ख़बरें | Sachin AI Studio</title>
    <style>
        :root { --bg: #07090f; --card: #0e1117; --accent: #22d3ee; --text: #f1f5f9; --muted: #64748b; --border: rgba(255,255,255,0.06); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 1200px; }
        header { text-align: center; margin-bottom: 40px; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; background: linear-gradient(90deg,#22d3ee,#818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        .live-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(239,68,68,0.1); color: #ef4444; padding: 5px 15px; border-radius: 99px; font-size: 0.8rem; font-weight: 800; border: 1px solid rgba(239,68,68,0.2); margin-bottom: 15px; }
        .live-dot { width: 8px; height: 8px; background: #ef4444; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; }
        .news-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; transition: 0.3s; display: flex; flex-direction: column; height: 100%; }
        .news-card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 10px 30px rgba(34,211,238,0.1); }
        .news-img { width: 100%; height: 220px; background: #1a1f2e; object-fit: cover; }
        .news-content { padding: 20px; flex: 1; display: flex; flex-direction: column; }
        .news-tag { font-size: 0.7rem; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; }
        .news-title { font-size: 1.15rem; font-weight: 700; line-height: 1.4; margin-bottom: 12px; color: #fff; }
        .news-desc { font-size: 0.9rem; color: var(--muted); line-height: 1.6; margin-bottom: 20px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }
        .news-footer { margin-top: auto; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 15px; }
        .news-date { font-size: 0.75rem; color: var(--muted); }
        .read-more { color: var(--accent); text-decoration: none; font-weight: 700; font-size: 0.85rem; }
        .loader { border: 4px solid var(--border); border-top: 4px solid var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 50px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .category-tabs { display: flex; gap: 10px; justify-content: center; margin-bottom: 30px; flex-wrap: wrap; }
        .tab { padding: 8px 20px; border-radius: 99px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--muted); cursor: pointer; font-weight: 600; transition: 0.2s; }
        .tab.active { background: var(--accent); color: #000; border-color: var(--accent); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="live-badge"><span class="live-dot"></span> LIVE UPDATES</div>
            <h1>Global News & Story Hub</h1>
            <p style="color: var(--muted);">दुनिया भर की ताज़ा ख़बरें और दिलचस्प कहानियाँ, अभी और इसी वक्त।</p>
        </header>

        <div class="category-tabs">
            <button class="tab active" data-rss="https://www.ndtv.com/rss/top-stories">Top Stories</button>
            <button class="tab" data-rss="https://www.ndtv.com/rss/technology">Technology</button>
            <button class="tab" data-rss="https://www.ndtv.com/rss/world">World News</button>
            <button class="tab" data-rss="https://www.ndtv.com/rss/trending">Trending</button>
        </div>

        <div id="loader" class="loader"></div>
        <div class="news-grid" id="newsGrid"></div>
    </div>

    <script>
        const newsGrid = document.getElementById('newsGrid');
        const loader = document.getElementById('loader');
        const tabs = document.querySelectorAll('.tab');

        // Using rss2json service to get real-time live data from RSS feeds
        async function fetchNews(rssUrl) {
            loader.style.display = 'block';
            newsGrid.innerHTML = '';
            
            try {
                const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}&api_key=00000000000000000000000000000000`); // Public key or dummy
                const data = await response.json();
                
                loader.style.display = 'none';
                if (data.status === 'ok') {
                    displayNews(data.items);
                } else {
                    throw new Error('Failed to fetch');
                }
            } catch (error) {
                loader.style.display = 'none';
                newsGrid.innerHTML = '<p style="text-align:center; grid-column: 1/-1;">खबरें लोड करने में समस्या हुई। कृपया बाद में प्रयास करें।</p>';
            }
        }

        function displayNews(items) {
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'news-card';
                
                // Extract image from description or use thumbnail
                let imgSrc = item.thumbnail || item.enclosure.link || '';
                if (!imgSrc && item.description) {
                    const imgMatch = item.description.match(/<img[^>]+src="([^">]+)"/);
                    if (imgMatch) imgSrc = imgMatch[1];
                }
                
                if (!imgSrc) imgSrc = 'https://images.unsplash.com/photo-1504711432869-efd597cdd042?auto=format&fit=crop&w=800&q=80';

                // Clean description from HTML tags
                const cleanDesc = item.description.replace(/<[^>]*>?/gm, '').substring(0, 150) + '...';

                card.innerHTML = `
                    <img src="${imgSrc}" class="news-img" alt="${item.title}" onerror="this.src='https://images.unsplash.com/photo-1504711432869-efd597cdd042?auto=format&fit=crop&w=800&q=80'">
                    <div class="news-content">
                        <div class="news-tag">${item.author || 'Live News'}</div>
                        <h2 class="news-title">${item.title}</h2>
                        <p class="news-desc">${cleanDesc}</p>
                        <div class="news-footer">
                            <span class="news-date">${new Date(item.pubDate).toLocaleString('hi-IN')}</span>
                            <a href="${item.link}" target="_blank" class="read-more">पूरा पढ़ें →</a>
                        </div>
                    </div>
                `;
                newsGrid.appendChild(card);
            });
        }

        tabs.forEach(tab => {
            tab.onclick = () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                fetchNews(tab.dataset.rss);
            };
        });

        // Initial fetch
        fetchNews('https://www.ndtv.com/rss/top-stories');
    </script>
</body>
</html>
