  <label>Cuisine Type</label>

    <div class="chip active" onclick="pick(this,'cuisine')" data-val="North Indian">🍛 North Indian</div>

    <div class="chip" onclick="pick(this,'cuisine')" data-val="Chinese">🥢 Chinese</div>
    <div class="chip" onclick="pick(this,'cuisine')" data-val="Street Food">🌮 Street Food</div>
    <div class="chip" onclick="pick(this,'cuisine')" data-val="Healthy/Diet">🥗 Healthy</div>

  </div>
  <label>Diet Type</label>

    <div class="chip active" onclick="pick(this,'diet')" data-val="Vegetarian">🌿 Veg</div>

  </div>
  <label>Cooking Time</label>

    <div class="chip" onclick="pick(this,'time')" data-val="Medium (30-60 mins)">🕐 Medium 1hr</div>
    <div class="chip" onclick="pick(this,'time')" data-val="Slow Cook">🐢 Slow Cook</div>
  </div>
  <label>Servings (कितने लोग)</label>
  <input id="servings" type="number" min="1" max="20" value="2" placeholder="2">
  <button class="btn" id="btn" onclick="generate()">🍳 Recipe बनाओ</button>
  <div class="err" id="err"></div>
</div>
<div class="card" id="resultCard" style="display:none">
  <div class="ct">👨‍🍳 AI Recipe</div>
  <div class="result-box" id="result"></div>
  <div class="row-btns">
    <button class="sm-btn" onclick="copyText()">📋 Copy करो</button>
    <button class="sm-btn" onclick="generate()">🔄 नई Recipe</button>

</div>

<script>
const state={cuisine:'North Indian',diet:'Vegetarian',time:'Quick (under 30 mins)'};
function pick(el,key){document.querySelectorAll('[onclick*="pick(this,\''+key+'\'"]').forEach(e=>e.classList.remove('active'));el.classList.add('active');state[key]=el.dataset.val;}
async function generate(){
  const btn=document.getElementById('btn');btn.disabled=true;btn.textContent='⏳ Recipe बन रही है...';
  document.getElementById('err').style.display='none';
  const prompt=`You are a professional Indian chef. Create a detailed recipe in Hindi for:
Ingredients/Dish: ${document.getElementById('ingredients').value||'Aloo Sabzi'}
Cuisine: ${state.cuisine} | Diet: ${state.diet} | Time: ${state.time} | Servings: ${document.getElementById('servings').value||2}

Include:
🥘 Recipe Name (creative name)
⏱️ Prep Time, Cook Time, Total Time
🛒 Ingredients List (with exact quantities)
👨‍🍳 Step-by-Step Instructions (numbered)
💡 Chef's Tips (pro tips)
🌟 Serving Suggestions
📊 Nutrition Info (approx per serving)

Write everything in clear Hindi. Use emojis. Make instructions very easy to follow.`;
  try{
    const r=await fetch('/generate-content',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt})});
    const d=await r.json();if(!r.ok)throw new Error(d.error||'Error');
    document.getElementById('result').textContent=d.result;
    document.getElementById('resultCard').style.display='block';
    document.getElementById('resultCard').scrollIntoView({behavior:'smooth'});
  }catch(e){const err=document.getElementById('err');err.textContent='❌ '+e.message;err.style.display='block';}
  finally{btn.disabled=false;btn.textContent='🍳 Recipe बनाओ';}
}
function copyText(){navigator.clipboard.writeText(document.getElementById('result').textContent).then(()=>alert('Copied! 📋'));}
</script>
