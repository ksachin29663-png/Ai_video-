<style>*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif}body{background:#060810;color:#e1e7f0;min-height:100vh;display:flex;flex-direction:column}header{background:linear-gradient(135deg,#0a0e1a,#0a0f1a);border-bottom:1px solid rgba(148,163,184,.3);padding:14px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100}.back{color:#94a3b8;text-decoration:none;font-size:1.3rem}.pt{font-size:1.05rem;font-weight:700;color:#94a3b8}.ps{font-size:.75rem;color:#64748b}main{flex:1;padding:20px 16px;display:flex;flex-direction:column;align-items:center;gap:14px}

label{font-size:.8rem;color:#94a3b8;font-weight:600;display:block;margin-bottom:5px;margin-top:10px}textarea,input{width:100%;padding:11px;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#fff;font-size:.87rem;font-family:inherit;outline:none}textarea{resize:vertical;min-height:100px}textarea:focus,input:focus{border-color:#94a3b8}

.result-box{background:rgba(0,0,0,.4);border:1px solid rgba(148,163,184,.15);border-radius:12px;padding:18px;font-size:.88rem;line-height:1.8;white-space:pre-wrap;word-break:break-word;max-height:500px;overflow-y:auto}

<header><a href="index.html" class="back">←</a><div><div class="pt">📰 AI News Analyzer</div><div class="ps">News paste करो — AI Summary, Facts & Analysis देगा</div></div></header>
<main>
<div class="card">
  <div class="ct">News Content</div>
  <label>News Article paste करो या Topic लिखो</label>
  <textarea id="news" placeholder="यहाँ news article paste करो... या सिर्फ topic लिखो जैसे: 'India-Pakistan Relations 2025', 'Budget 2025'..."></textarea>
  <label>Analysis Type</label>
  <div class="chips">
    <div class="chip active" onclick="pick(this,'atype')" data-val="Summary">📋 Summary</div>
    <div class="chip" onclick="pick(this,'atype')" data-val="Fact Check">✅ Fact Check</div>
    <div class="chip" onclick="pick(this,'atype')" data-val="Deep Analysis">🔍 Deep Analysis</div>
    <div class="chip" onclick="pick(this,'atype')" data-val="Impact Analysis">⚡ Impact</div>
    <div class="chip" onclick="pick(this,'atype')" data-val="Both Sides">⚖️ Both Sides</div>
    <div class="chip" onclick="pick(this,'atype')" data-val="Simple Explanation">👶 Simple Explain</div>
  </div>
  <label>Language</label>
  <div class="chips">
    <div class="chip active" onclick="pick(this,'lang')" data-val="Hindi">🇮🇳 Hindi</div>
    <div class="chip" onclick="pick(this,'lang')" data-val="English">🇬🇧 English</div>
    <div class="chip" onclick="pick(this,'lang')" data-val="Hinglish">🔄 Hinglish</div>
  </div>
  <button class="btn" id="btn" onclick="generate()">📰 Analyze करो</button>
  <div class="err" id="err"></div>
</div>
<div class="card" id="resultCard" style="display:none">
  <div class="ct">📊 AI Analysis</div>
  <div class="result-box" id="result"></div>
  <div class="row-btns">
    <button class="sm-btn" onclick="copyText()">📋 Copy करो</button>
    <button class="sm-btn" onclick="generate()">🔄 दोबारा करो</button>
  </div>
</div>

<script>
const state={atype:'Summary',lang:'Hindi'};
function pick(el,key){document.querySelectorAll('[onclick*="pick(this,\''+key+'\'"]').forEach(e=>e.classList.remove('active'));el.classList.add('active');state[key]=el.dataset.val;}
async function generate(){
  const btn=document.getElementById('btn');btn.disabled=true;btn.textContent='⏳ Analyze हो रहा है...';
  document.getElementById('err').style.display='none';
  const news=document.getElementById('news').value.trim()||'Current Indian news';
  const prompt=`You are an expert journalist and news analyst. Provide ${state.atype} in ${state.lang} for:
Content: ${news}

${state.atype==='Summary'?'Provide: Headline, Key Points (5-7 bullets), Who/What/When/Where/Why, Conclusion':''}
${state.atype==='Fact Check'?'Check all claims. Mark each as: ✅ True, ❌ False, ⚠️ Misleading, or ❓ Unverified. Provide sources/reasoning.':''}
${state.atype==='Deep Analysis'?'Provide: Background, Key Players, Political/Economic/Social impact, Historical context, Future implications':''}
${state.atype==='Impact Analysis'?'Analyze impact on: Common people, Economy, Politics, International relations, Future outlook':''}
${state.atype==='Both Sides'?'Present: Arguments FOR and AGAINST. Show different perspectives fairly without bias.':''}
${state.atype==='Simple Explanation'?'Explain in very simple language (like explaining to a 10-year-old). Use simple words and analogies.':''}

Be objective, factual, and balanced. Use emojis for readability.`;
  try{
    const r=await fetch('/generate-content',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt})});
    const d=await r.json();if(!r.ok)throw new Error(d.error||'Error');
    document.getElementById('result').textContent=d.result;
    document.getElementById('resultCard').style.display='block';
    document.getElementById('resultCard').scrollIntoView({behavior:'smooth'});
  }catch(e){const err=document.getElementById('err');err.textContent='❌ '+e.message;err.style.display='block';}
  finally{btn.disabled=false;btn.textContent='📰 Analyze करो';}
}
function copyText(){navigator.clipboard.writeText(document.getElementById('result').textContent).then(()=>alert('Copied! 📋'));}
</script>
