<script>

async function callAI(prompt) {
  const seed = Math.floor(Math.random() * 99999);
  const encodedPrompt = encodeURIComponent(prompt);
  const url = 'https://text.pollinations.ai/' + encodedPrompt + '?model=openai&seed=' + seed;
  const res = await fetch(url);
  if (!res.ok) if(res.status===429)throw new Error('rate_limit'); throw new Error('API error: '+res.status);
  const text = await res.text();
  if (!text || text.trim().length < 5) throw new Error('Response खाली है, दोबारा try करो');
  return text.trim();
}




const state={style:'Natural'};
function pick(el,key){document.querySelectorAll('[onclick*="pick(this,\''+key+'\'"]').forEach(e=>e.classList.remove('active'));el.classList.add('active');state[key]=el.dataset.val;}
function swapLangs(){const f=document.getElementById('fromLang'),t=document.getElementById('toLang');const tv=f.value;const fv=t.value;f.value=fv;t.value=tv;const inp=document.getElementById('inputText');const res=document.getElementById('result');if(res.textContent&&res.textContent.trim()){inp.value=res.textContent;document.getElementById('resultCard').style.display='none';}}
async function translate(){
  const text=document.getElementById('inputText').value.trim();
  if(!text){alert('कुछ तो लिखो!');return;}
  const btn=document.getElementById('btn');btn.disabled=true;btn.textContent='⏳ Translate हो रहा है...';
  document.getElementById('err').style.display='none';
  const from=document.getElementById('fromLang').value;
  const to=document.getElementById('toLang').value;
  const prompt=`Translate the following text from ${from} to ${to} in a ${state.style} style.
Rules:
- Provide ONLY the translated text, nothing else
- Preserve the meaning and tone
- ${state.style==='Simple'?'Use very simple, easy-to-understand words':''}
- ${state.style==='Formal'?'Use formal, professional language':''}
- ${state.style==='Casual'?'Use casual, conversational tone':''}

Text to translate:
${text}`;
  try{
    const _aiResult = await callAI(prompt);
    document.getElementById('result').textContent=_aiResult;
    document.getElementById('resultCard').style.display='block';
    document.getElementById('resultCard').scrollIntoView({behavior:'smooth'});
  }catch(e){const err=document.getElementById('err');err.textContent='❌ '+e.message;err.style.display='block';}
  finally{btn.disabled=false;btn.textContent='🌐 Translate करो';}
}
function swapAndTranslate(){swapLangs();translate();}
function copyText(){navigator.clipboard.writeText(document.getElementById('result').textContent).then(()=>alert('Copied! 📋'));}
</script>
