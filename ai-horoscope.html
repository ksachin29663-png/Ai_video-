<script>
const state={rtype:'numerology'};
function pick(el,key){document.querySelectorAll('[onclick*="pick(this,\''+key+'\'"]').forEach(e=>e.classList.remove('active'));el.classList.add('active');state[key]=el.dataset.val;}
async function generate(){
  const btn=document.getElementById('btn');btn.disabled=true;btn.textContent='⏳ देख रहे हैं...';
  document.getElementById('err').style.display='none';
  const name=document.getElementById('name').value.trim()||'Unknown';
  const dob=document.getElementById('dob').value;
  const time=document.getElementById('time').value;
  const place=document.getElementById('place').value.trim();
  const prompt=`You are a Vedic astrologer and numerologist. Provide a detailed ${state.rtype} report in Hindi for:
Name: ${name}
Date of Birth: ${dob||'Unknown'}
${time?'Birth Time: '+time:''}
${place?'Birth Place: '+place:''}

For Numerology include: Life Path Number, Expression Number, Soul Urge Number, Lucky Numbers, Lucky Colors, Lucky Days, Lucky Gemstone, Personality Analysis.
For Horoscope: Daily/Weekly predictions for Love, Career, Health, Finance.
For Love Match: Compatibility based on numerology and zodiac.
For Career: Best career paths, skills to develop, timing for opportunities.

Write everything in clear Hindi. Use ✨ emojis. Make it personal and specific. Add practical tips and remedies.`;
  try{
    const r=await fetch('/generate-content',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt})});
    const d=await r.json();if(!r.ok)throw new Error(d.error||'Error');
    document.getElementById('result').textContent=d.result;
    document.getElementById('resultCard').style.display='block';
    document.getElementById('resultCard').scrollIntoView({behavior:'smooth'});
  }catch(e){const err=document.getElementById('err');err.textContent='❌ '+e.message;err.style.display='block';}
  finally{btn.disabled=false;btn.textContent='🔮 Report देखो';}
}
function copyText(){navigator.clipboard.writeText(document.getElementById('result').textContent).then(()=>alert('Copied! 📋'));}
</script>
