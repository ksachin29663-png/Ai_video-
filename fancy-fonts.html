<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fancy Fonts & Bio Stylist - Sachin AI</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #8b5cf6;
            --accent-glow: rgba(139, 92, 246, 0.4);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 12px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 650px;
            padding: 20px 0;
            text-align: center;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
        }

        .logo { font-size: 1.5rem; font-weight: 800; color: var(--accent); letter-spacing: -0.5px; }
        .tagline { font-size: 0.85rem; color: var(--text-dim); margin-top: 4px; }

        .container {
            width: 100%;
            max-width: 650px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.5);
        }

        input {
            width: 100%;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px;
            color: white;
            font-size: 1.1rem;
            margin-bottom: 24px;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }

        .font-list { display: grid; gap: 12px; }

        .font-item {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }

        .font-item:hover { border-color: var(--accent); background: rgba(139, 92, 246, 0.05); }

        .font-text { font-size: 1.1rem; overflow-x: auto; white-space: nowrap; margin-right: 10px; }

        .copy-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.8rem;
            flex-shrink: 0;
        }

        .copy-btn:active { transform: scale(0.95); }

        .toast {
            position: fixed;
            bottom: 20px;
            background: #22c55e;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            display: none;
            animation: slideUp 0.3s;
        }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <div class="logo">Sachin AI Studio</div>
    <div class="tagline">Fancy Fonts & Biography Stylist</div>
</header>

<div class="container">
    <input type="text" id="fontInput" placeholder="Type your text here..." value="Sachin AI Studio">
    <div class="font-list" id="fontList"></div>
</div>

<div class="toast" id="toast">Copied to clipboard!</div>

<script>
    const input = document.getElementById('fontInput');
    const list = document.getElementById('fontList');
    const toast = document.getElementById('toast');

    const styles = [
        { name: "Bold", map: (t) => t.split('').map(c => boldMap[c] || c).join('') },
        { name: "Italic", map: (t) => t.split('').map(c => italicMap[c] || c).join('') },
        { name: "Script", map: (t) => t.split('').map(c => scriptMap[c] || c).join('') },
        { name: "Bubble", map: (t) => t.split('').map(c => bubbleMap[c] || c).join('') },
        { name: "Square", map: (t) => t.split('').map(c => squareMap[c] || c).join('') },
        { name: "Mirror", map: (t) => t.split('').reverse().join('') }
    ];

    // Character Maps (Simplified for demo, real ones would be larger)
    const boldMap = {'a':'­Юљџ','b':'­ЮљЏ','c':'­Юљю','d':'­ЮљЮ','e':'­Юљъ','f':'­ЮљЪ','g':'­Юља','h':'­ЮљА','i':'­Юљб','j':'­ЮљБ','k':'­Юљц','l':'­ЮљЦ','m':'­Юљд','n':'­ЮљД','o':'­Юље','p':'­ЮљЕ','q':'­Юљф','r':'­ЮљФ','s':'­Юљг','t':'­ЮљГ','u':'­Юљ«','v':'­Юљ»','w':'­Юљ░','x':'­Юљ▒','y':'­Юљ▓','z':'­Юљ│'};
    const italicMap = {'a':'­Юўб','b':'­ЮўБ','c':'­Юўц','d':'­ЮўЦ','e':'­Юўд','f':'­ЮўД','g':'­Юўе','h':'­ЮўЕ','i':'­Юўф','j':'­ЮўФ','k':'­Юўг','l':'­ЮўГ','m':'­Юў«','n':'­Юў»','o':'­Юў░','p':'­Юў▒','q':'­Юў▓','r':'­Юў│','s':'­Юў┤','t':'­Юўх','u':'­ЮўХ','v':'­Юўи','w':'­ЮўИ','x':'­Юў╣','y':'­Юў║','z':'­Юў╗'};
    const bubbleMap = {'a':'РЊљ','b':'РЊЉ','c':'РЊњ','d':'РЊЊ','e':'РЊћ','f':'РЊЋ','g':'РЊќ','h':'РЊЌ','i':'РЊў','j':'РЊЎ','k':'РЊџ','l':'РЊЏ','m':'РЊю','n':'РЊЮ','o':'РЊъ','p':'РЊЪ','q':'РЊа','r':'РЊА','s':'РЊб','t':'РЊБ','u':'РЊц','v':'РЊЦ','w':'РЊд','x':'РЊД','y':'РЊе','z':'РЊЕ'};
    const squareMap = {'a':'­Ъё░','b':'­Ъё▒','c':'­Ъё▓','d':'­Ъё│','e':'­Ъё┤','f':'­Ъёх','g':'­Ъё┐','h':'­Ъёи','i':'­ЪёИ','j':'­Ъё╣','k':'­Ъё║','l':'­Ъё╗','m':'­Ъё╝','n':'­Ъёй','o':'­ЪёЙ','p':'­Ъё┐','q':'­ЪЁђ','r':'­ЪЁЂ','s':'­ЪЁѓ','t':'­ЪЁЃ','u':'­ЪЁё','v':'­ЪЁЁ','w':'­ЪЁє','x':'­ЪЁЄ','y':'­ЪЁѕ','z':'­ЪЁЅ'};
    const scriptMap = {'a':'­ЮњХ','b':'­Юњи','c':'­ЮњИ','d':'­Юњ╣','e':'­ЮЉњ','f':'­Юњ╗','g':'­ЮЉћ','h':'­Юњй','i':'­ЮњЙ','j':'­Юњ┐','k':'­ЮЊђ','l':'­ЮЊЂ','m':'­ЮЊѓ','n':'­ЮЊЃ','o':'­ЮЉю','p':'­ЮЊЁ','q':'­ЮЊє','r':'­ЮЊЄ','s':'­ЮЊѕ','t':'­ЮЊЅ','u':'­ЮЊі','v':'­ЮЊІ','w':'­ЮЊї','x':'­ЮЊЇ','y':'­ЮЊј','z':'­ЮЊЈ'};

    function render() {
        const text = input.value.toLowerCase();
        list.innerHTML = styles.map(s => `
            <div class="font-item">
                <div class="font-text">${s.map(text)}</div>
                <button class="copy-btn" onclick="copy('${s.map(text)}')">Copy</button>
            </div>
        `).join('');
    }

    function copy(text) {
        navigator.clipboard.writeText(text);
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 2000);
    }

    input.oninput = render;
    render();
</script>

</body>
</html>
