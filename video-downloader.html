<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Video Downloader - सचिन एआई</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif}
        body{background:#05080f;color:#e1e7f0;min-height:100vh;display:flex;flex-direction:column}
        header{background:linear-gradient(135deg,#0a0e1a,#0d1b2e);border-bottom:1px solid rgba(0,200,255,0.15);padding:13px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
        .back-btn{color:#00c8ff;text-decoration:none;font-size:1.2rem}
        .htitle{font-size:1rem;font-weight:700;color:#00c8ff}
        .hsub{font-size:0.7rem;color:#64748b;margin-top:2px}
        main{flex:1;display:flex;flex-direction:column;align-items:center;padding:20px 14px 60px;gap:16px}
        .card{width:100%;max-width:600px;background:rgba(255,255,255,0.04);border:1px solid rgba(0,200,255,0.15);border-radius:18px;padding:20px}
        .badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;justify-content:center}
        .badge{padding:5px 12px;border-radius:20px;font-size:.72rem;font-weight:600;border:1px solid}
        .badge.yt{background:rgba(255,0,0,0.1);border-color:rgba(255,0,0,0.3);color:#ff6b6b}
        .badge.ig{background:rgba(200,60,200,0.1);border-color:rgba(200,60,200,0.3);color:#e879f9}
        .badge.tt{background:rgba(0,0,0,0.2);border-color:rgba(255,255,255,0.15);color:#e1e7f0}
        .badge.tw{background:rgba(29,155,240,0.1);border-color:rgba(29,155,240,0.3);color:#38bdf8}
        .input-wrap{display:flex;gap:8px;align-items:stretch}
        .url-input{flex:1;background:rgba(0,0,0,0.35);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 16px;color:#e1e7f0;font-size:.92rem;font-family:inherit;outline:none;transition:border-color .2s}
        .url-input:focus{border-color:rgba(0,200,255,0.4)}
        .url-input::placeholder{color:#334155}
        .fetch-btn{padding:14px 20px;border-radius:12px;border:none;background:linear-gradient(135deg,#00c8ff,#0080ff);color:#fff;font-size:.9rem;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;transition:opacity .2s}
        .fetch-btn:disabled{opacity:.5;cursor:not-allowed}
        .paste-btn{width:100%;margin-top:10px;padding:10px;border-radius:10px;border:1px dashed rgba(0,200,255,0.25);background:transparent;color:#475569;font-size:.78rem;cursor:pointer;font-family:inherit;transition:all .2s}
        .paste-btn:hover{border-color:rgba(0,200,255,0.5);color:#00c8ff}
        .spin-wrap{display:none;flex-direction:column;align-items:center;gap:10px;padding:20px}
        .spin-wrap.on{display:flex}
        .ring{width:44px;height:44px;border:3px solid rgba(0,200,255,0.1);border-top-color:#00c8ff;border-radius:50%;animation:spin .8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .spin-lbl{color:#00c8ff;font-size:.85rem;text-align:center}
        .vinfo{display:none;margin-top:16px}
        .vinfo.on{display:block}
        .thumb-wrap{width:100%;border-radius:12px;overflow:hidden;margin-bottom:14px;background:#080c18;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center}
        .thumb-wrap img{width:100%;height:100%;object-fit:cover}
        .vtitle{font-size:.95rem;font-weight:700;color:#e1e7f0;line-height:1.4;margin-bottom:4px}
        .vauthor{font-size:.75rem;color:#64748b;margin-bottom:14px}
        .flabel{font-size:.72rem;font-weight:700;color:#00c8ff;text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px}
        .flist{display:flex;flex-direction:column;gap:8px}
        .fitem{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:12px 14px;gap:10px}
        .fqual{font-size:.88rem;font-weight:600;color:#e1e7f0}
        .fmeta{font-size:.72rem;color:#64748b;margin-top:2px}
        .dl-btn{padding:8px 16px;border-radius:9px;border:none;background:linear-gradient(135deg,#00c8ff,#0080ff);color:#fff;font-size:.78rem;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;transition:opacity .2s;text-decoration:none;display:inline-block}
        .dl-btn:hover{opacity:.85}
        .err-box{background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.25);border-radius:12px;padding:14px 16px;color:#fbbf24;font-size:.82rem;display:none;margin-top:12px;line-height:1.6}
        .err-box.on{display:block}
        .how{width:100%;max-width:600px}
        .how-title{font-size:.8rem;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;text-align:center}
        .steps{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
        .step{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:12px 14px;text-align:center;flex:1;min-width:120px;max-width:160px}
        .step-num{font-size:1.3rem;margin-bottom:6px}
        .step-txt{font-size:.72rem;color:#64748b;line-height:1.4}
        #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e293b;color:#e1e7f0;padding:10px 20px;border-radius:10px;font-size:.82rem;opacity:0;transition:all .3s;z-index:999;white-space:nowrap;border:1px solid rgba(255,255,255,0.08)}
        #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    </style>
</head>
<body>
<header>
    <a href="/" class="back-btn">←</a>
    <div>
        <div class="htitle">📥 Free Video Downloader</div>
        <div class="hsub">YouTube, Instagram, TikTok — कोई भी link डालो</div>
    </div>
</header>
<main>
    <div class="card">
        <div class="badges">
            <span class="badge yt">▶ YouTube</span>
            <span class="badge ig">📸 Instagram</span>
            <span class="badge tt">🎵 TikTok</span>
            <span class="badge tw">🐦 Twitter</span>
        </div>
        <div class="input-wrap">
            <input class="url-input" id="urlInput" type="url" placeholder="https://youtube.com/watch?v=... यहाँ paste करें">
            <button class="fetch-btn" id="fetchBtn" onclick="fetchInfo()">🔍 खोजो</button>
        </div>
        <button class="paste-btn" onclick="pasteUrl()">📋 Clipboard से Paste करें</button>
        <div class="spin-wrap" id="spinner">
            <div class="ring"></div>
            <div class="spin-lbl" id="spinLbl">Video ढूंढ रहा है...</div>
        </div>
        <div class="err-box" id="errBox"></div>
        <div class="vinfo" id="vinfo">
            <div class="thumb-wrap"><img id="vthumb" src="" alt="thumbnail"></div>
            <div class="vtitle" id="vtitle"></div>
            <div class="vauthor" id="vauthor"></div>
            <div class="flabel">📥 Quality चुनें और Download करें</div>
            <div class="flist" id="flist"></div>
        </div>
    </div>
    <div class="how">
        <div class="how-title">कैसे use करें?</div>
        <div class="steps">
            <div class="step"><div class="step-num">🔗</div><div class="step-txt">Video का link copy करें</div></div>
            <div class="step"><div class="step-num">📋</div><div class="step-txt">यहाँ paste करके खोजें</div></div>
            <div class="step"><div class="step-num">📥</div><div class="step-txt">Quality चुनें और download करें</div></div>
        </div>
    </div>
</main>
<div id="toast"></div>
<script>
let currentUrl = '';

async function pasteUrl() {
    try {
        const text = await navigator.clipboard.readText();
        if (text && text.startsWith('http')) {
            document.getElementById('urlInput').value = text;
            toast('✅ Paste हो गया!');
        } else toast('⚠️ Clipboard में कोई link नहीं मिली');
    } catch { toast('⚠️ Input box में click करके Ctrl+V दबाएं'); }
}

async function fetchInfo() {
    const url = document.getElementById('urlInput').value.trim();
    if (!url || !url.startsWith('http')) { toast('⚠️ सही link paste करें'); return; }
    currentUrl = url;

    const btn = document.getElementById('fetchBtn');
    btn.disabled = true;
    showSpinner('Video ढूंढ रहा है...');
    hideError();
    document.getElementById('vinfo').classList.remove('on');

    try {
        // Try cobalt.tools API (supports YouTube, Instagram, TikTok, Twitter etc.)
        const res = await fetch('https://api.cobalt.tools/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
            body: JSON.stringify({ url })
        });
        const data = await res.json();

        if (data.status === 'redirect' || data.status === 'tunnel' || data.url) {
            showDirectDownload(data);
        } else if (data.status === 'picker' && data.picker) {
            showPicker(data.picker);
        } else if (data.status === 'error') {
            throw new Error(data.error?.code || 'Video नहीं मिली');
        } else {
            throw new Error('Unexpected response');
        }
    } catch (e) {
        // Fallback: Try YouTube oEmbed for info + direct redirect links
        if (url.includes('youtube.com') || url.includes('youtu.be')) {
            await tryYoutubeFallback(url);
        } else {
            showError('⚠️ यह link काम नहीं की। YouTube, Instagram या TikTok का link try करें।\n\nError: ' + e.message);
        }
    } finally {
        hideSpinner();
        btn.disabled = false;
    }
}

function showDirectDownload(data) {
    const flist = document.getElementById('flist');
    flist.innerHTML = '';

    // Show thumbnail if available
    if (data.thumb) {
        document.getElementById('vthumb').src = data.thumb;
    }
    document.getElementById('vtitle').textContent = data.filename || 'Video';
    document.getElementById('vauthor').textContent = '';

    const qualities = [
        { label: '🎬 Best Quality (Auto)', url: data.url || data.tunnel, ext: 'mp4' },
    ];
    if (data.audio) qualities.push({ label: '🎵 Audio Only', url: data.audio, ext: 'mp3' });

    qualities.forEach(q => {
        if (!q.url) return;
        const item = document.createElement('div');
        item.className = 'fitem';
        item.innerHTML = `
            <div><div class="fqual">${q.label}</div><div class="fmeta">Free Download</div></div>
            <a class="dl-btn" href="${q.url}" download target="_blank">💾 Download</a>
        `;
        flist.appendChild(item);
    });

    document.getElementById('vinfo').classList.add('on');
}

function showPicker(items) {
    const flist = document.getElementById('flist');
    flist.innerHTML = '';
    document.getElementById('vtitle').textContent = 'Videos मिले — एक चुनें';
    document.getElementById('vauthor').textContent = '';

    if (items[0]?.thumb) document.getElementById('vthumb').src = items[0].thumb;

    items.slice(0, 10).forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'fitem';
        div.innerHTML = `
            <div><div class="fqual">📹 Video ${i+1}</div><div class="fmeta">Free Download</div></div>
            <a class="dl-btn" href="${item.url}" download target="_blank">💾 Download</a>
        `;
        flist.appendChild(div);
    });

    document.getElementById('vinfo').classList.add('on');
}

async function tryYoutubeFallback(url) {
    try {
        // Get video info via oEmbed
        const vid = extractYTId(url);
        if (!vid) throw new Error('Invalid YouTube URL');

        const oembedUrl = `https://www.youtube.com/oembed?url=https://youtube.com/watch?v=${vid}&format=json`;
        const r = await fetch(oembedUrl);
        const info = await r.json();

        document.getElementById('vthumb').src = `https://img.youtube.com/vi/${vid}/hqdefault.jpg`;
        document.getElementById('vtitle').textContent = info.title || 'YouTube Video';
        document.getElementById('vauthor').textContent = '📺 ' + (info.author_name || '');

        const flist = document.getElementById('flist');
        flist.innerHTML = '';

        // Provide download links via multiple free services
        const services = [
            { name: '⬇️ Download via SaveFrom', url: `https://en.savefrom.net/#url=https://youtube.com/watch?v=${vid}` },
            { name: '⬇️ Download via Y2Mate', url: `https://www.y2mate.com/youtube/${vid}` },
            { name: '⬇️ Download via SSYouTube', url: `https://ssyoutube.com/watch?v=${vid}` },
        ];

        services.forEach(s => {
            const item = document.createElement('div');
            item.className = 'fitem';
            item.innerHTML = `
                <div><div class="fqual">${s.name}</div><div class="fmeta">New tab में खुलेगा → Download करें</div></div>
                <a class="dl-btn" href="${s.url}" target="_blank" rel="noopener">खोलें →</a>
            `;
            flist.appendChild(item);
        });

        document.getElementById('vinfo').classList.add('on');
    } catch(e) {
        showError('⚠️ YouTube video info नहीं मिली। URL check करें।');
    }
}

function extractYTId(url) {
    const m = url.match(/(?:v=|youtu\.be\/|embed\/|shorts\/)([a-zA-Z0-9_-]{11})/);
    return m ? m[1] : null;
}

function showSpinner(msg) {
    document.getElementById('spinLbl').textContent = msg;
    document.getElementById('spinner').classList.add('on');
}
function hideSpinner() { document.getElementById('spinner').classList.remove('on'); }
function showError(msg) { const b = document.getElementById('errBox'); b.textContent = msg; b.classList.add('on'); }
function hideError() { document.getElementById('errBox').classList.remove('on'); }

document.getElementById('urlInput').addEventListener('keydown', e => { if (e.key === 'Enter') fetchInfo(); });

function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
