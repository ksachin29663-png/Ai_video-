<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Video Downloader - सचिन एआई</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif}
        body{background:#05080f;color:#e1e7f0;min-height:100vh;display:flex;flex-direction:column}
        header{background:linear-gradient(135deg,#0a0e1a,#0d1b2e);border-bottom:1px solid rgba(0,200,255,0.15);padding:13px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
        .back{color:#00c8ff;text-decoration:none;font-size:1.2rem;padding:4px}
        .ht{font-size:1rem;font-weight:700;color:#00c8ff}
        .hs{font-size:.7rem;color:#64748b;margin-top:2px}
        main{flex:1;display:flex;flex-direction:column;align-items:center;padding:18px 14px 60px;gap:14px}
        .card{width:100%;max-width:600px;background:rgba(255,255,255,.04);border:1px solid rgba(0,200,255,.15);border-radius:18px;padding:18px}
        .tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
        .tab{padding:7px 16px;border-radius:20px;font-size:.75rem;font-weight:600;border:1px solid;cursor:pointer;font-family:inherit;transition:all .2s}
        .tab-yt{border-color:rgba(255,70,70,.4);color:#ff6b6b;background:rgba(255,0,0,.08)}
        .tab-yt.on,.tab-yt:hover{background:rgba(255,0,0,.2)}
        .tab-other{border-color:rgba(255,255,255,.12);color:#94a3b8;background:rgba(255,255,255,.04)}
        .tab-other.on,.tab-other:hover{border-color:rgba(0,200,255,.3);color:#00c8ff;background:rgba(0,200,255,.06)}
        .inrow{display:flex;gap:8px}
        .urlin{flex:1;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:13px 16px;color:#e1e7f0;font-size:.9rem;font-family:inherit;outline:none;transition:border-color .2s}
        .urlin:focus{border-color:rgba(0,200,255,.4)}
        .urlin::placeholder{color:#334155}
        .sbtn{padding:13px 18px;border-radius:12px;border:none;background:linear-gradient(135deg,#00c8ff,#0080ff);color:#fff;font-size:.9rem;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit;transition:opacity .2s}
        .sbtn:disabled{opacity:.4;cursor:not-allowed}
        .pastebtn{width:100%;margin-top:10px;padding:11px;border-radius:10px;border:1px dashed rgba(0,200,255,.2);background:transparent;color:#475569;font-size:.78rem;cursor:pointer;font-family:inherit;transition:all .2s}
        .pastebtn:hover{border-color:rgba(0,200,255,.5);color:#00c8ff}
        /* Spinner */
        .loading{display:none;flex-direction:column;align-items:center;gap:10px;padding:24px 0}
        .loading.on{display:flex}
        .ring{width:44px;height:44px;border:3px solid rgba(0,200,255,.08);border-top-color:#00c8ff;border-radius:50%;animation:rot .8s linear infinite}
        @keyframes rot{to{transform:rotate(360deg)}}
        .llbl{color:#00c8ff;font-size:.85rem}
        /* Error */
        .errbox{display:none;background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);border-radius:12px;padding:13px 16px;color:#fca5a5;font-size:.8rem;margin-top:12px;line-height:1.6}
        .errbox.on{display:block}
        /* Result panel */
        .res{display:none;margin-top:16px}
        .res.on{display:block}
        .vthumb{width:100%;border-radius:12px;overflow:hidden;aspect-ratio:16/9;background:#080c18;margin-bottom:12px}
        .vthumb img{width:100%;height:100%;object-fit:cover}
        .vtitle{font-size:.95rem;font-weight:700;color:#e1e7f0;line-height:1.4;margin-bottom:3px}
        .vdur{font-size:.72rem;color:#64748b;margin-bottom:14px}
        .flbl{font-size:.72rem;font-weight:700;color:#00c8ff;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
        .flist{display:flex;flex-direction:column;gap:8px}
        .fitem{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:12px 14px;gap:10px}
        .fq{font-size:.9rem;font-weight:600;color:#e1e7f0}
        .fm{font-size:.7rem;color:#64748b;margin-top:2px}
        .dlbtn{padding:9px 20px;border-radius:9px;border:none;background:linear-gradient(135deg,#00c8ff,#0080ff);color:#fff;font-size:.8rem;font-weight:700;cursor:pointer;white-space:nowrap;text-decoration:none;display:inline-block;font-family:inherit;flex-shrink:0}
        .dlbtn:active{opacity:.8}
        /* Other platforms section */
        .othersec{display:none}
        .othersec.on{display:block}
        .plat-grid{display:flex;flex-direction:column;gap:8px;margin-top:12px}
        .plat-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
        .plat-info .pname{font-size:.9rem;font-weight:600;color:#e1e7f0}
        .plat-info .psub{font-size:.7rem;color:#64748b;margin-top:2px;line-height:1.4}
        .plat-link{padding:8px 16px;border-radius:9px;border:1px solid rgba(0,200,255,.3);background:rgba(0,200,255,.06);color:#00c8ff;font-size:.78rem;font-weight:600;text-decoration:none;white-space:nowrap;flex-shrink:0}
        /* Toast */
        #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e293b;border:1px solid rgba(255,255,255,.08);color:#e1e7f0;padding:10px 20px;border-radius:10px;font-size:.82rem;opacity:0;transition:all .3s;z-index:999;white-space:nowrap}
        #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
        /* How to */
        .how{width:100%;max-width:600px}
        .how-t{font-size:.72rem;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.5px;text-align:center;margin-bottom:8px}
        .steps{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
        .step{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);border-radius:12px;padding:12px;text-align:center;flex:1;min-width:100px;max-width:140px}
        .s-ico{font-size:1.3rem;margin-bottom:5px}
        .s-t{font-size:.68rem;color:#64748b;line-height:1.4}
    </style>
</head>
<body>
<header>
    <a href="/" class="back">←</a>
    <div>
        <div class="ht">📥 Free Video Downloader</div>
        <div class="hs">YouTube download करें — HD Quality, बिल्कुल Free</div>
    </div>
</header>
<main>
    <div class="card">
        <div class="tabs">
            <button class="tab tab-yt on" id="tab-yt" onclick="switchTab('yt')">▶ YouTube</button>
            <button class="tab tab-other" id="tab-ig" onclick="switchTab('ig')">📸 Instagram</button>
            <button class="tab tab-other" id="tab-tt" onclick="switchTab('tt')">♪ TikTok</button>
            <button class="tab tab-other" id="tab-tw" onclick="switchTab('tw')">𝕏 Twitter</button>
            <button class="tab tab-other" id="tab-fb" onclick="switchTab('fb')">f Facebook</button>
        </div>

        <!-- YouTube section -->
        <div id="yt-section">
            <div class="inrow">
                <input class="urlin" id="yturl" type="url" placeholder="YouTube link paste करें... youtube.com/watch?v=...">
                <button class="sbtn" id="sbtn" onclick="ytSearch()">🔍 खोजो</button>
            </div>
            <button class="pastebtn" onclick="pasteUrl()">📋 Clipboard से Paste करें</button>
            <div class="loading" id="loading">
                <div class="ring"></div>
                <div class="llbl" id="llbl">Video ढूंढ रहा है...</div>
            </div>
            <div class="errbox" id="errbox"></div>
            <div class="res" id="res">
                <div class="vthumb"><img id="vthumb" alt="thumbnail"></div>
                <div class="vtitle" id="vtitle"></div>
                <div class="vdur" id="vdur"></div>
                <div class="flbl">📥 Quality चुनें और Download करें</div>
                <div class="flist" id="flist"></div>
            </div>
        </div>

        <!-- Other platforms section -->
        <div class="othersec" id="other-section">
            <div class="plat-grid" id="plat-grid"></div>
        </div>
    </div>

    <div class="how">
        <div class="how-t">YouTube download — कैसे करें?</div>
        <div class="steps">
            <div class="step"><div class="s-ico">🔗</div><div class="s-t">YouTube video का link copy करें</div></div>
            <div class="step"><div class="s-ico">📋</div><div class="s-t">यहाँ paste करके खोजो</div></div>
            <div class="step"><div class="s-ico">🎬</div><div class="s-t">Quality चुनें — Download होगा</div></div>
        </div>
    </div>
</main>
<div id="toast"></div>

<script>
// ⚠️ API Base URL — हमारा Replit backend
const API = 'https://20eebfd7-634c-4390-9d27-1920e1de20b7-00-36jxl8lt2fntb.pike.replit.dev';

let currentTab = 'yt';
let currentUrl = '';

function switchTab(tab) {
    currentTab = tab;
    ['yt','ig','tt','tw','fb'].forEach(t => {
        document.getElementById('tab-'+t).classList.remove('on');
    });
    document.getElementById('tab-'+tab).classList.add('on');
    document.getElementById('yt-section').style.display = tab==='yt' ? 'block' : 'none';
    const otherSec = document.getElementById('other-section');
    if(tab !== 'yt') {
        otherSec.classList.add('on');
        showOtherPlatform(tab);
    } else {
        otherSec.classList.remove('on');
    }
    hideError(); hideResult();
}

const PLATFORMS = {
    ig: { name:'📸 Instagram', items:[
        { label:'⬇️ SnapInsta', sub:'Reels, Posts, Stories — Fast', url:'https://snapinsta.app/' },
        { label:'⬇️ SaveIG', sub:'HD Quality Instagram download', url:'https://saveig.app/' },
        { label:'⬇️ Instafinsta', sub:'Photos & Videos without login', url:'https://instafinsta.com/' },
    ]},
    tt: { name:'♪ TikTok', items:[
        { label:'⬇️ SSSTik', sub:'TikTok No Watermark — Best', url:'https://ssstik.io/' },
        { label:'⬇️ TikMate', sub:'Fast HD Quality Download', url:'https://tikmate.online/' },
        { label:'⬇️ MusicalDown', sub:'Music + Video download', url:'https://musicaldown.com/' },
    ]},
    tw: { name:'𝕏 Twitter / X', items:[
        { label:'⬇️ TwitterVid', sub:'Twitter & X.com Videos', url:'https://twittervid.com/' },
        { label:'⬇️ TwDown', sub:'Fast Twitter Video downloader', url:'https://twdown.net/' },
        { label:'⬇️ SaveTwitter', sub:'High Quality Videos', url:'https://savetwitter.net/' },
    ]},
    fb: { name:'f Facebook', items:[
        { label:'⬇️ FBDown.net', sub:'HD & SD Facebook Videos', url:'https://fbdown.net/' },
        { label:'⬇️ FDownloader', sub:'Facebook Reels & Videos', url:'https://fdownloader.net/' },
        { label:'⬇️ SaveFrom.net', sub:'Universal — सबके लिए', url:'https://en.savefrom.net/' },
    ]},
};

function showOtherPlatform(tab) {
    const p = PLATFORMS[tab];
    if(!p) return;
    const grid = document.getElementById('plat-grid');
    grid.innerHTML = `<div style="font-size:.82rem;color:#64748b;margin-bottom:4px">${p.name} download करने के लिए नीचे दी गई site पर जाएं और वहाँ अपना link paste करें:</div>`;
    p.items.forEach(item => {
        const el = document.createElement('div');
        el.className = 'plat-card';
        el.innerHTML = `<div class="plat-info"><div class="pname">${item.label}</div><div class="psub">${item.sub}</div></div><a class="plat-link" href="${item.url}" target="_blank" rel="noopener">खोलें →</a>`;
        grid.appendChild(el);
    });
}

async function pasteUrl() {
    try {
        const t = await navigator.clipboard.readText();
        if(t && t.startsWith('http')){ document.getElementById('yturl').value=t; toast('✅ Paste हो गया!'); }
        else toast('⚠️ Clipboard में link नहीं मिली');
    } catch { toast('⚠️ Input box में tap करके paste करें'); }
}

function fmtSecs(s) {
    const m=Math.floor(s/60), sec=s%60;
    return m+':'+(sec<10?'0':'')+sec;
}

async function ytSearch() {
    const url = document.getElementById('yturl').value.trim();
    if(!url || !url.startsWith('http')){ toast('⚠️ YouTube link paste करें'); return; }
    currentUrl = url;

    document.getElementById('sbtn').disabled = true;
    hideResult(); hideError();
    document.getElementById('loading').classList.add('on');
    document.getElementById('llbl').textContent = '🔍 Video ढूंढ रहा है...';

    try {
        const res = await fetch(`${API}/api/video-info?url=${encodeURIComponent(url)}`, {
            signal: AbortSignal.timeout(25000)
        });
        const data = await res.json();

        if(!res.ok || data.error) {
            throw new Error(data.error || 'Video नहीं मिली');
        }

        // Show video info
        document.getElementById('vthumb').src = data.thumbnail || '';
        document.getElementById('vtitle').textContent = data.title || 'Video';
        document.getElementById('vdur').textContent = (data.author ? '📺 '+data.author : '') + (data.duration ? ' · ⏱ '+fmtSecs(+data.duration) : '');

        // Build format list
        const flist = document.getElementById('flist');
        flist.innerHTML = '';

        if(!data.formats || data.formats.length === 0) {
            throw new Error('Download formats नहीं मिले');
        }

        data.formats.forEach(f => {
            const dlUrl = `${API}/api/video-download?url=${encodeURIComponent(url)}&itag=${f.itag}&title=${encodeURIComponent(data.title||'video')}`;
            const el = document.createElement('div');
            el.className = 'fitem';
            el.innerHTML = `
                <div>
                    <div class="fq">${f.quality.includes('Audio')? '🎵 '+f.quality : '🎬 '+f.quality}</div>
                    <div class="fm">${f.container.toUpperCase()} · ${f.size}</div>
                </div>
                <a class="dlbtn" href="${dlUrl}" download target="_blank">💾 Download</a>
            `;
            flist.appendChild(el);
        });

        document.getElementById('loading').classList.remove('on');
        document.getElementById('res').classList.add('on');
        toast('✅ Video मिल गई! Quality चुनें');

    } catch(e) {
        document.getElementById('loading').classList.remove('on');
        const msg = e.message || 'Error';
        if(msg.includes('timeout') || msg.includes('fetch')) {
            showError('⚠️ Server से connect नहीं हो पाया। Internet connection check करें और दोबारा try करें।');
        } else {
            showError('⚠️ ' + msg + '\n\nYouTube link सही है? Example: https://youtube.com/watch?v=VIDEO_ID');
        }
    } finally {
        document.getElementById('sbtn').disabled = false;
    }
}

function showError(msg) { const b=document.getElementById('errbox'); b.textContent=msg; b.classList.add('on'); }
function hideError() { document.getElementById('errbox').classList.remove('on'); }
function hideResult() { document.getElementById('res').classList.remove('on'); }

document.getElementById('yturl').addEventListener('keydown', e=>{ if(e.key==='Enter') ytSearch(); });

function toast(msg) {
    const t=document.getElementById('toast');
    t.textContent=msg; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),2800);
}
</script>
</body>
</html>
