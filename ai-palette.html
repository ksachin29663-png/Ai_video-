<script>

async function analyzeWithAI(base64, mime, instruction) {
  const seed = Math.floor(Math.random() * 99999);
  const res = await fetch('https://text.pollinations.ai/', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      messages: [{
        role: 'user',
        content: [
          { type: 'text', text: instruction },
          { type: 'image_url', image_url: { url: 'data:' + mime + ';base64,' + base64 } }
        ]
      }],
      model: 'openai',
      seed: seed
    })
  });
  if (!res.ok) throw new Error('AI Error: ' + res.status);
  const text = await res.text();
  return text.trim();
}

    let imageBase64 = null, imageMime = 'image/jpeg';
    let extractedColors = [];

    function loadImg(event) {
        const file = event.target.files[0];
        if (!file) return;
        imageMime = file.type || 'image/jpeg';
        const reader = new FileReader();
        reader.onload = e => {
            imageBase64 = e.target.result.split(',')[1];
            document.getElementById('imgPreview').src = e.target.result;
            document.getElementById('imgPreview').style.display = 'block';
            document.getElementById('genBtn').disabled = false;
        };
        reader.readAsDataURL(file);
    }

    async function extractPalette() {
        if (!imageBase64) return;
        document.getElementById('genBtn').disabled = true;
        document.getElementById('resultCard').style.display = 'block';
        document.getElementById('spinnerBox').style.display = 'block';
        document.getElementById('resultSection').style.display = 'none';
        document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth' });

        const instruction = `Analyze this image and extract exactly 6 dominant colors. For each color provide:
1. The exact HEX code (e.g., #FF5733)
2. A descriptive color name (e.g., "Sunset Orange")
3. The mood or feeling it evokes

Also provide:
- Overall palette mood/theme (1 sentence)
- Best use cases for this palette (e.g., "Perfect for fashion brands, lifestyle blogs")
- Suggested complementary color (HEX + name)
- Font color recommendation (dark or light) for each color

Format EXACTLY as JSON:
{
  "colors": [
    {"hex": "#XXXXXX", "name": "Color Name", "mood": "feeling"},
    ... (6 total)
  ],
  "theme": "Overall palette description",
  "useCases": "Best suited for...",
  "complementary": {"hex": "#XXXXXX", "name": "Name"},
  "fontRec": ["dark","light","dark","dark","light","dark"]
}`;

        try {
            const raw = await analyzeWithAI(imageBase64, imageMime, instruction);
            const jsonMatch = raw.match(/\{[\s\S]*\}/);
            if (!jsonMatch) throw new Error('JSON parse failed');
            const parsed = JSON.parse(jsonMatch[0]);
            renderPalette(parsed);
        } catch (e) {
            extractFromCanvas();
        }
        document.getElementById('spinnerBox').style.display = 'none';
        document.getElementById('resultSection').style.display = 'block';
        document.getElementById('genBtn').disabled = false;
    }

    function renderPalette(data) {
        extractedColors = data.colors || [];
        const row = document.getElementById('paletteRow');
        row.innerHTML = extractedColors.map((c, i) => `
            <div class="color-swatch" onclick="navigator.clipboard.writeText('${c.hex}')">
                <div class="swatch-color" style="background:${c.hex}"></div>
                <div class="swatch-info">
                    <div class="swatch-hex">${c.hex}</div>
                    <div class="swatch-name">${c.name || ''}</div>
                </div>
            </div>`).join('');
        document.getElementById('paletteDesc').textContent = data.theme || '';
        const usageGrid = document.getElementById('usageGrid');
        usageGrid.innerHTML = `
            <div class="usage-item"><div class="usage-label">Best For</div><div class="usage-val">${data.useCases || 'Various designs'}</div></div>
            <div class="usage-item"><div class="usage-label">Complementary</div><div class="usage-val" style="display:flex;align-items:center;gap:6px;"><span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:${data.complementary?.hex || '#fff'}"></span>${data.complementary?.name || ''}</div></div>`;
    }

    function extractFromCanvas() {
        const img = new Image();
        img.onload = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 50; canvas.height = 50;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, 50, 50);
            const pixels = ctx.getImageData(0, 0, 50, 50).data;
            const colorMap = {};
            for (let i = 0; i < pixels.length; i += 16) {
                const r = Math.round(pixels[i]/32)*32;
                const g = Math.round(pixels[i+1]/32)*32;
                const b = Math.round(pixels[i+2]/32)*32;
                const hex = '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
                colorMap[hex] = (colorMap[hex] || 0) + 1;
            }
            extractedColors = Object.entries(colorMap).sort((a,b) => b[1]-a[1]).slice(0,6).map(([hex]) => ({hex, name: 'Color', mood: ''}));
            const row = document.getElementById('paletteRow');
            row.innerHTML = extractedColors.map(c => `
                <div class="color-swatch" onclick="navigator.clipboard.writeText('${c.hex}')">
                    <div class="swatch-color" style="background:${c.hex}"></div>
                    <div class="swatch-info"><div class="swatch-hex">${c.hex}</div></div>
                </div>`).join('');
            document.getElementById('paletteDesc').textContent = 'Image से Colors Extract किए गए। Tap करके HEX Copy करें।';
        };
        img.src = 'data:' + imageMime + ';base64,' + imageBase64;
    }

    function copyAllHex() {
        const hexCodes = extractedColors.map(c => c.hex).join(', ');
        navigator.clipboard.writeText(hexCodes).then(() => {
            const btn = document.querySelector('.copy-all-btn');
            btn.textContent = '✅ Copied!';
            setTimeout(() => btn.textContent = '📋 सभी HEX Codes Copy करें', 2000);
        });
    }
</script>
