<main>
<div class="card" id="setupCard">
  <div class="ct">Category चुनें</div>
  <div class="chips">
    <div class="chip active" onclick="pick(this,'cat')" data-val="Indian History">🏛️ Indian History</div>
    <div class="chip" onclick="pick(this,'cat')" data-val="Indian Geography">🗺️ Geography</div>
    <div class="chip" onclick="pick(this,'cat')" data-val="Science & Technology">🔬 Science</div>
    <div class="chip" onclick="pick(this,'cat')" data-val="Current Affairs India 2024-25">📰 Current Affairs</div>
    <div class="chip" onclick="pick(this,'cat')" data-val="Indian Constitution & Politics">⚖️ Constitution</div>
    <div class="chip" onclick="pick(this,'cat')" data-val="Sports & Games">🏏 Sports</div>
    <div class="chip" onclick="pick(this,'cat')" data-val="Bollywood & Entertainment">🎬 Bollywood</div>
    <div class="chip" onclick="pick(this,'cat')" data-val="General Knowledge Mixed">🌍 Mixed GK</div>
    <div class="chip" onclick="pick(this,'cat')" data-val="Math & Reasoning">🔢 Math & Reasoning</div>
  </div>
  <div class="ct" style="margin-top:14px">Difficulty</div>
  <div class="chips">
    <div class="chip active" onclick="pick(this,'diff')" data-val="Easy">😊 Easy</div>
    <div class="chip" onclick="pick(this,'diff')" data-val="Medium">🤔 Medium</div>
    <div class="chip" onclick="pick(this,'diff')" data-val="Hard">🔥 Hard</div>
    <div class="chip" onclick="pick(this,'diff')" data-val="Mixed">🎲 Mixed</div>
  </div>
  <label>Questions (5-15)</label>

  </div>
  <div id="quizContainer"></div>
  <div class="result-summary" id="resultSummary">

<script>
const state={cat:'Indian History',diff:'Easy'};
let quizData=[],score=0,answered=0,total=0;
function pick(el,key){document.querySelectorAll('[onclick*="pick(this,\''+key+'\'"]').forEach(e=>e.classList.remove('active'));el.classList.add('active');state[key]=el.dataset.val;}
async function startQuiz(){
  const btn=document.getElementById('btn');btn.disabled=true;btn.textContent='⏳ Quiz बन रही है...';
  document.getElementById('err').style.display='none';
  total=parseInt(document.getElementById('qcount').value)||10;
  const prompt=`Create a GK quiz in Hindi with EXACTLY ${total} questions for category: "${state.cat}", difficulty: "${state.diff}".

Format EXACTLY like this JSON (no other text):
[
{"q":"Question text in Hindi","opts":["Option A","Option B","Option C","Option D"],"ans":0,"exp":"Brief explanation in Hindi"},
...
]

Rules:
- Questions in Hindi, clear and unambiguous
- Exactly 4 options per question  
- "ans" is the index (0,1,2,3) of correct option
- "exp" is a short explanation of the correct answer
- Questions should be factually accurate
- ${state.diff==='Easy'?'Basic level, widely known facts':''}
- ${state.diff==='Hard'?'Challenging, specific facts':''}

Return ONLY the JSON array, nothing else.`;
  try{
    const r=await fetch('/generate-content',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt})});
    const d=await r.json();if(!r.ok)throw new Error(d.error||'Error');
    let text=d.result.trim();
    const start=text.indexOf('[');const end=text.lastIndexOf(']');
    if(start===-1||end===-1)throw new Error('Quiz data invalid');
    quizData=JSON.parse(text.slice(start,end+1));
    score=0;answered=0;total=quizData.length;
    document.getElementById('setupCard').style.display='none';
    document.getElementById('quizWrap').style.display='block';
    renderQuiz();
    document.getElementById('quizWrap').scrollIntoView({behavior:'smooth'});
  }catch(e){const err=document.getElementById('err');err.textContent='❌ '+e.message+'. दोबारा try करो।';err.style.display='block';}
  finally{btn.disabled=false;btn.textContent='🧠 Quiz शुरू करो!';}
}
function renderQuiz(){
  const c=document.getElementById('quizContainer');c.innerHTML='';
  document.getElementById('scoreVal').textContent=`${score} / ${answered}`;
  document.getElementById('qProgress').textContent=`Q ${answered}/${total}`;
  quizData.forEach((q,i)=>{
    const card=document.createElement('div');card.className='q-card';card.id='qcard'+i;
    card.innerHTML=`<div class="q-num">प्रश्न ${i+1}</div><div class="q-text">${q.q}</div><div class="options">${q.opts.map((o,j)=>`<button class="opt" onclick="answer(${i},${j})">${String.fromCharCode(65+j)}. ${o}</button>`).join('')}</div><div class="explanation" id="exp${i}">${q.exp||''}</div>`;
    c.appendChild(card);
  });
}
function answer(qi,optIdx){
  const card=document.getElementById('qcard'+qi);
  const opts=card.querySelectorAll('.opt');
  opts.forEach(o=>o.disabled=true);
  opts[quizData[qi].ans].classList.add('correct');
  if(optIdx===quizData[qi].ans)score++;
  else opts[optIdx].classList.add('wrong');
  document.getElementById('exp'+qi).style.display='block';
  answered++;
  document.getElementById('scoreVal').textContent=`${score} / ${answered}`;
  document.getElementById('qProgress').textContent=`Q ${answered}/${total}`;
  if(answered===total){
    setTimeout(()=>{
      const pct=Math.round(score/total*100);
      document.getElementById('finalScore').textContent=`${score}/${total}`;
      document.getElementById('remark').textContent=pct>=80?'🏆 शानदार! आप Expert हैं!':pct>=60?'👏 बढ़िया! Well Done!':pct>=40?'📚 ठीक है, और पढ़ो':'💪 मेहनत करो, फिर आओ!';
      document.getElementById('resultSummary').style.display='block';
      document.getElementById('resultSummary').scrollIntoView({behavior:'smooth'});
    },500);
  }
}
function shareScore(){const txt=`मैंने AI GK Quiz में ${score}/${total} score किया! 🧠🎯\nCategory: ${state.cat}\n\nतुम try करो: ${window.location.href}`;navigator.share?navigator.share({text:txt}):navigator.clipboard.writeText(txt).then(()=>alert('Score copied! Share करो 📲'));}
function restartQuiz(){document.getElementById('setupCard').style.display='block';document.getElementById('quizWrap').style.display='none';document.getElementById('quizContainer').innerHTML='';document.getElementById('resultSummary').style.display='none';}
</script>
