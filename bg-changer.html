<script>
    let originalFile = null;
    let removedDataUrl = null;
    let selectedBgPrompt = '';

    document.querySelectorAll('.bg-preset').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.bg-preset').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedBgPrompt = btn.dataset.bg;
            document.getElementById('bgPrompt').value = '';
        });
    });

    function loadImage(event) {
        originalFile = event.target.files[0];
        if (!originalFile) return;
        const reader = new FileReader();
        reader.onload = e => {
            document.getElementById('origImg').src = e.target.result;
            document.getElementById('removedImg').src = '';
            document.getElementById('previewRow').style.display = 'grid';
            document.getElementById('removeBtn').disabled = false;
        };
        reader.readAsDataURL(originalFile);
    }

    async function removeBackground() {
        const status = document.getElementById('status1');
        const btn = document.getElementById('removeBtn');
        status.style.display = 'block';
        btn.disabled = true;
        btn.textContent = '⏳ हो रहा है...';

        const formData = new FormData();
        formData.append('image_file', originalFile);

        try {
            const res = await fetch('/remove-background', { method: 'POST', body: formData });
            if (res.ok) {
                const blob = await res.blob();
                removedDataUrl = URL.createObjectURL(blob);
                document.getElementById('removedImg').src = removedDataUrl;
            } else { throw new Error('API failed'); }
        } catch (e) {
            // Client-side fallback: show image with edge mask simulation
            removedDataUrl = await clientSideRemove(originalFile);
            document.getElementById('removedImg').src = removedDataUrl;
        }

        status.style.display = 'none';
        btn.disabled = false;
        btn.textContent = '✂️ बैकग्राउंड हटाएं';
        document.getElementById('bgCard').style.display = 'block';
        document.getElementById('bgCard').scrollIntoView({ behavior: 'smooth' });
    }

    function clientSideRemove(file) {
        return new Promise(resolve => {
            const reader = new FileReader();
            reader.onload = e => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.getElementById('workCanvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    const data = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const d = data.data;
                    // Simple color-based BG removal (works for plain BGs)
                    const topColor = [d[0], d[1], d[2]];
                    for (let i = 0; i < d.length; i += 4) {
                        const dr = Math.abs(d[i] - topColor[0]);
                        const dg = Math.abs(d[i+1] - topColor[1]);
                        const db = Math.abs(d[i+2] - topColor[2]);
                        if (dr + dg + db < 80) d[i+3] = 0;
                    }
                    ctx.putImageData(data, 0, 0);
                    resolve(canvas.toDataURL('image/png'));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }

    async function changeBg() {
        const customPrompt = document.getElementById('bgPrompt').value.trim();
        const bgPrompt = customPrompt || selectedBgPrompt;
        if (!bgPrompt) {
            downloadFinalTransparent();
            return;
        }

        const status = document.getElementById('status2');
        status.style.display = 'block';

        const seed = Math.floor(Math.random() * 999999);
        const bgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(bgPrompt + ', wide angle, no people, background only')}?width=1024&height=1024&nologo=true&seed=${seed}`;

        const bgImg = new Image();
        bgImg.crossOrigin = 'anonymous';
        bgImg.onload = () => {
            const fgImg = new Image();
            fgImg.onload = () => {
                const canvas = document.getElementById('finalCanvas');
                canvas.width = 1024; canvas.height = 1024;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(bgImg, 0, 0, 1024, 1024);
                const scale = Math.min(1024 / fgImg.width, 1024 / fgImg.height);
                const x = (1024 - fgImg.width * scale) / 2;
                const y = (1024 - fgImg.height * scale) / 2;
                ctx.drawImage(fgImg, x, y, fgImg.width * scale, fgImg.height * scale);
                document.getElementById('finalPreview').style.display = 'block';
                status.style.display = 'none';
            };
            fgImg.src = removedDataUrl;
        };
        bgImg.onerror = () => { status.textContent = '❌ बैकग्राउंड लोड नहीं हुआ, दोबारा कोशिश करें।'; };
        bgImg.src = bgUrl;
    }

    function downloadFinal() {
        const canvas = document.getElementById('finalCanvas');
        const a = document.createElement('a');
        a.download = 'sachin-ai-bg-changed.png';
        a.href = canvas.toDataURL('image/png');
        a.click();
    }

    function downloadFinalTransparent() {
        const a = document.createElement('a');
        a.download = 'sachin-ai-bg-removed.png';
        a.href = removedDataUrl;
        a.click();
    }
</script>
