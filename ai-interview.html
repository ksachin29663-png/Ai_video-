<script>

async function callAI(prompt) {
  const seed = Math.floor(Math.random() * 99999);
  const encodedPrompt = encodeURIComponent(prompt);
  const url = 'https://text.pollinations.ai/' + encodedPrompt + '?model=openai&seed=' + seed;
  const res = await fetch(url);
  if (!res.ok) if(res.status===429)throw new Error('rate_limit'); throw new Error('API error: '+res.status);
  const text = await res.text();
  if (!text || text.trim().length < 5) throw new Error('Response खाली है, दोबारा try करो');
  return text.trim();
}




const state={round:'HR Round',exp:'Fresher (0-1 year)'};
function pick(el,key){document.querySelectorAll('[onclick*="pick(this,\''+key+'\'"]').forEach(e=>e.classList.remove('active'));el.classList.add('active');state[key]=el.dataset.val;}
async function generate(){
  const btn=document.getElementById('btn');btn.disabled=true;btn.textContent='⏳ तैयार हो रहा है...';
  document.getElementById('err').style.display='none';
  const role=document.getElementById('role').value.trim()||'General Job';
  const prompt=`You are an expert interview coach. Create 12 important ${state.round} interview questions with detailed answers for:
Role: ${role}
Company: ${document.getElementById('company').value||'General'}
Experience: ${state.exp}
${document.getElementById('weak').value?'Focus on: '+document.getElementById('weak').value:''}

Format EXACTLY like this (I will parse it):
Q1: [Question]
A1: [Detailed answer in Hindi, 3-5 lines, practical tips included]

Q2: [Question]
A2: [Answer]

...and so on for Q1 to Q12.

Include: Tell me about yourself, Strengths/Weaknesses, Why this company, Salary negotiation, Situational questions. Give practical, honest answers. Write in Hindi.`;
  try{
    const _aiResult = await callAI(prompt);
    renderQA(_aiResult);
    document.getElementById('resultCard').style.display='block';
    document.getElementById('resultCard').scrollIntoView({behavior:'smooth'});
  }catch(e){const err=document.getElementById('err');err.textContent='❌ '+e.message;err.style.display='block';}
  finally{btn.disabled=false;btn.textContent='🎯 Interview Prep करो';}
}
function renderQA(text){
  const container=document.getElementById('qaContainer');container.innerHTML='';
  const lines=text.split('\n');let q='',a='',num=0;
  for(let line of lines){
    const qm=line.match(/^Q(\d+):\s*(.+)/i);
    const am=line.match(/^A(\d+):\s*(.+)/i);
    if(qm){if(q&&a){addQA(++num,q,a);}q=qm[2];a='';}
    else if(am){a=am[2];}
    else if(a&&line.trim()){a+='\n'+line;}
  }
  if(q&&a)addQA(++num,q,a);
  if(container.children.length===0){const div=document.createElement('div');div.style.whiteSpace='pre-wrap';div.style.padding='14px';div.style.fontSize='.88rem';div.style.lineHeight='1.8';div.textContent=text;container.appendChild(div);}
}
function addQA(n,q,a){
  const container=document.getElementById('qaContainer');
  const item=document.createElement('div');item.className='qa-item';
  item.innerHTML=`<div class="qa-q" onclick="toggleQA(this)"><span>Q${n}: ${q}</span><span class="qa-icon">▼</span></div><div class="qa-a">${a}</div>`;
  container.appendChild(item);
}
function toggleQA(el){const ans=el.nextElementSibling;const icon=el.querySelector('.qa-icon');const open=ans.style.display==='block';ans.style.display=open?'none':'block';icon.textContent=open?'▼':'▲';}
function expandAll(){document.querySelectorAll('.qa-a').forEach(a=>a.style.display='block');document.querySelectorAll('.qa-icon').forEach(i=>i.textContent='▲');}
</script>
