<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline Code Playground - Sachin AI</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #3b82f6;
            --text: #f8fafc;
            --border: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Fira Code', monospace; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 10px 20px;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-weight: 800; color: var(--accent); }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .editor-container {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1px;
            background: var(--border);
        }

        .editor-box {
            display: flex;
            flex-direction: column;
            background: var(--bg);
        }

        .label {
            padding: 5px 15px;
            font-size: 0.7rem;
            background: #1e293b;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: 700;
        }

        textarea {
            flex: 1;
            width: 100%;
            background: transparent;
            border: none;
            color: #cbd5e1;
            padding: 15px;
            font-size: 0.9rem;
            resize: none;
            outline: none;
        }

        .preview-container {
            flex: 1;
            background: white;
            border-top: 4px solid var(--accent);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 768px) {
            .editor-container { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">Code Playground</div>
    <div style="font-size: 0.8rem; color: #94a3b8;">Real-time Preview</div>
</header>

<div class="main">
    <div class="editor-container">
        <div class="editor-box">
            <div class="label">HTML</div>
            <textarea id="html" placeholder="<h1>Hello World</h1>"></textarea>
        </div>
        <div class="editor-box">
            <div class="label">CSS</div>
            <textarea id="css" placeholder="h1 { color: red; }"></textarea>
        </div>
        <div class="editor-box">
            <div class="label">JS</div>
            <textarea id="js" placeholder="console.log('Hi');"></textarea>
        </div>
    </div>
    <div class="preview-container">
        <iframe id="preview"></iframe>
    </div>
</div>

<script>
    const htmlEl = document.getElementById('html');
    const cssEl = document.getElementById('css');
    const jsEl = document.getElementById('js');
    const preview = document.getElementById('preview');

    function update() {
        const content = `
            <html>
                <head><style>${cssEl.value}</style></head>
                <body>
                    ${htmlEl.value}
                    <script>${jsEl.value}<\/script>
                </body>
            </html>
        `;
        const doc = preview.contentDocument || preview.contentWindow.document;
        doc.open();
        doc.write(content);
        doc.close();
    }

    [htmlEl, cssEl, jsEl].forEach(el => el.addEventListener('input', update));
    
    // Initial content
    htmlEl.value = '<div class="card">\n  <h1>Sachin AI</h1>\n  <p>Start coding now!</p>\n</div>';
    cssEl.value = 'body { background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }\n.card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }\nh1 { color: #3b82f6; margin-bottom: 10px; }';
    update();
</script>

</body>
</html>
