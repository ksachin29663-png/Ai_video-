<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>VIP एडमिन पैनल - सचिन भाई</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; padding: 20px; text-align: center; }
        .box { background: #1e293b; padding: 25px; border-radius: 15px; max-width: 450px; margin: auto; border: 2px solid #38bdf8; }
        input, select, button { width: 100%; padding: 14px; margin: 10px 0; border-radius: 8px; border: none; }
        button { background: #38bdf8; color: #000; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #fff; }
    </style>
</head>
<body>

<div id="login-section" class="box">
    <h2>🔒 सिक्योरिटी चेक</h2>
    <input type="email" id="email-input" placeholder="अपनी ईमेल बताएं...">
    <button onclick="checkLogin()">एंट्री लें</button>
</div>

<div id="admin-section" class="box" style="display:none;">
    <h2 id="welcome-msg"></h2>
    <select id="category">
        <option value="business">बिजनेस</option>
        <option value="youtube">YouTube</option>
        <option value="shayari">शायरी</option>
    </select>
    <input type="text" id="title" placeholder="टाइटल यहाँ लिखें">
    <input type="text" id="imageUrl" placeholder="फोटो का लिंक (Thumbnail)">
    <input type="text" id="postLink" placeholder="यहाँ वेबसाइट/वीडियो का असली लिंक डालें">
    <button onclick="postData()">🚀 पोस्ट पब्लिश करें</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCglO0vHutINDOWaIWMsv4N9_54dpbPvIo",
        databaseURL: "https://project-8621d575-e2f7-45a2-963-default-rtdb.firebaseio.com",
        projectId: "project-8621d575-e2f7-45a2-963"
    };
    const db = getDatabase(initializeApp(firebaseConfig));

    window.checkLogin = function() {
        if (document.getElementById('email-input').value === "sachinrajput9852@gmail.com") {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('admin-section').style.display = 'block';
            document.getElementById('welcome-msg').innerText = "स्वागत है, सचिन भाई! 🔥";
        } else { alert("गलत ईमेल! तुम मालिक नहीं हो!"); }
    };

    window.postData = function() {
        push(ref(db, 'posts/' + document.getElementById('category').value), {
            title: document.getElementById('title').value,
            imageUrl: document.getElementById('imageUrl').value,
            postLink: document.getElementById('postLink').value
        }).then(() => alert("पोस्ट धमाके के साथ पब्लिश हो गई!"));
    };
</script>
</body>
</html>
