<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>एडमिन पैनल - AI Website 36</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; background: #f8fafc; padding: 20px; }
        .box { max-width: 500px; margin: 50px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; }
        button { background: #38bdf8; color: white; font-weight: bold; cursor: pointer; border: none; }
    </style>
</head>
<body>

<div id="login-box" class="box">
    <h2>🔒 सुरक्षित एक्सेस</h2>
    <input type="email" id="email-input" placeholder="अपनी ईमेल यहाँ डालें...">
    <button onclick="verifyEmail()">एक्सेस करें</button>
</div>

<div id="admin-box" class="box" style="display:none;">
    <h2>नमस्ते सचिन भाई!</h2>
    <input type="text" id="title" placeholder="टाइटल लिखें...">
    <input type="file" id="file-input">
    <div id="editor" style="height:150px; margin-bottom:15px;"></div>
    <button onclick="uploadPost()">🚀 पोस्ट लाइव करें</button>
</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    const db = getDatabase(initializeApp({ databaseURL: "https://project-8621d575-e2f7-45a2-963-default-rtdb.firebaseio.com" }));
    const storage = getStorage(initializeApp({ projectId: "project-8621d575-e2f7-45a2-963" }));
    const quill = new Quill('#editor', { theme: 'snow' });

    // यहाँ आपकी फिक्स ईमेल है
    window.verifyEmail = function() {
        const email = document.getElementById('email-input').value;
        if (email === "ksachin20663@gmail.com") {
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('admin-box').style.display = 'block';
        } else {
            alert("गलत ईमेल! यह केवल सचिन भाई के लिए है।");
        }
    };

    window.uploadPost = async function() {
        const file = document.getElementById('file-input').files[0];
        const title = document.getElementById('title').value;
        if(!file || !title) { alert("प्लीज फोटो और टाइटल भरें!"); return; }

        const storageRef = sRef(storage, 'posts/' + file.name);
        await uploadBytes(storageRef, file);
        const url = await getDownloadURL(storageRef);

        await push(ref(db, 'posts/'), { title, content: quill.root.innerHTML, imageUrl: url });
        alert("पोस्ट सफलतापूर्वक लाइव हो गई!");
        location.reload();
    };
</script>
</body>
    </html>
