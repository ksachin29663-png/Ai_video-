<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>एडमिन पैनल - सचिन भाई</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; text-align: center; }
        .box { background: white; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; }
        button { background: #27ae60; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-section" class="box">
    <h2>लॉगिन करें</h2>
    <input type="email" id="email-input" placeholder="अपनी ईमेल डालें">
    <button onclick="checkLogin()">लॉगिन</button>
</div>

<div id="admin-section" class="box" style="display:none;">
    <h2 id="welcome-msg"></h2>
    <select id="category"><option value="business">बिजनेस</option><option value="youtube">YouTube</option><option value="shayari">शायरी</option></select>
    <input type="text" id="title" placeholder="टाइटल">
    <input type="text" id="imageUrl" placeholder="फोटो का लिंक">
    <button onclick="postData()">पोस्ट पब्लिश करें</button>
    <p><small>एडिटिंग के लिए आप Firebase Console का इस्तेमाल करें, वहाँ डेटा तुरंत अपडेट हो जाता है।</small></p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCglO0vHutINDOWaIWMsv4N9_54dpbPvIo",
        authDomain: "project-8621d575-e2f7-45a2-963.firebaseapp.com",
        databaseURL: "https://project-8621d575-e2f7-45a2-963-default-rtdb.firebaseio.com",
        projectId: "project-8621d575-e2f7-45a2-963",
        storageBucket: "project-8621d575-e2f7-45a2-963.firebasestorage.app",
        messagingSenderId: "756626829965",
        appId: "1:756626829965:web:1a73e566660c489811a8c4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.checkLogin = function() {
        const email = document.getElementById('email-input').value;
        if (email === "sachinrajput9852@gmail.com") {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('admin-section').style.display = 'block';
            document.getElementById('welcome-msg').innerText = "सचिन भाई, स्वागत है! अपना भाई आ गया है, जलवा होगा!";
        } else {
            alert("तुम मेरे मालिक नहीं हो! गेट आउट!");
        }
    };

    window.postData = function() {
        const cat = document.getElementById('category').value;
        const title = document.getElementById('title').value;
        const img = document.getElementById('imageUrl').value;
        push(ref(db, 'posts/' + cat), { title, imageUrl: img }).then(() => alert("पोस्ट पब्लिश हो गई!"));
    };
</script>
</body>
      </html>
