<!DOCTYPE html>
<html>
<head>
    <title>Manage Posts - Admin</title>
</head>
<body>
    <div id="login-section">
        <h2>प्रशासन लॉगिन</h2>
        <button id="google-login">Sachinrajput29204@gmail.com से लॉगिन करें</button>
    </div>

    <div id="admin-panel" style="display:none;">
        <h2>पोस्ट जोड़ें/मैनेज करें</h2>
        <input type="text" id="title" placeholder="पोस्ट का टाइटल लिखें"><br><br>
        <input type="text" id="imgUrl" placeholder="फोटो का लिंक यहाँ डालें"><br><br>
        <textarea id="content" placeholder="पोस्ट का कंटेंट (लिखाई) यहाँ लिखें" rows="5" style="width:300px;"></textarea><br><br>
        
        <button onclick="addPost()">पोस्ट पब्लिश करें</button>
        <hr>
        <h3>सभी पोस्ट्स:</h3>
        <div id="post-list"></div>
    </div>

    <script type="module">
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-auth.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";
        
        const auth = getAuth();
        const db = getDatabase();
        const MASTER_EMAIL = "Sachinrajput29204@gmail.com"; 

        // लॉगिन सिस्टम
        document.getElementById('google-login').onclick = () => {
            signInWithPopup(auth, new GoogleAuthProvider()).then((result) => {
                if (result.user.email === MASTER_EMAIL) {
                    document.getElementById('login-section').style.display = 'none';
                    document.getElementById('admin-panel').style.display = 'block';
                    loadPosts();
                } else { alert("एक्सेस डिनाइड!"); auth.signOut(); }
            });
        };

        // 1. पोस्ट जोड़ने का काम
        window.addPost = () => {
            push(ref(db, 'posts/'), {
                title: document.getElementById('title').value,
                img: document.getElementById('imgUrl').value,
                body: document.getElementById('content').value
            });
            alert('पोस्ट पब्लिश हो गई!');
        };

        // 2. पोस्ट दिखाने और 3. डिलीट करने का काम
        function loadPosts() {
            onValue(ref(db, 'posts/'), (snapshot) => {
                const list = document.getElementById('post-list');
                list.innerHTML = "";
                snapshot.forEach((child) => {
                    const post = child.val();
                    const postId = child.key;
                    list.innerHTML += `
                        <div style="border:1px solid #ccc; padding:10px; margin-top:10px;">
                            <h4>${post.title}</h4>
                            <img src="${post.img}" style="width:100px;"><br>
                            <button onclick="deletePost('${postId}')">डिलीट करें</button>
                        </div>`;
                });
            });
        }

        window.deletePost = (id) => {
            if(confirm("पक्का डिलीट करना है?")) remove(ref(db, 'posts/' + id));
        };
    </script>
</body>
</html>
