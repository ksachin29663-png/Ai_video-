<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Manage Posts - सुरक्षित एडमिन</title>
</head>
<body>
    <div id="login-section">
        <h2>प्रशासन लॉगिन</h2>
        <p>आगे बढ़ने के लिए अपनी अधिकृत ईमेल से लॉगिन करें:</p>
        <button id="google-login">Google से लॉगिन करें</button>
    </div>

    <div id="admin-panel" style="display:none;">
        <h2>नमस्ते सचिन भाई, स्वागत है!</h2>
        <input type="text" id="title" placeholder="टाइटल"><br>
        <input type="text" id="imgUrl" placeholder="फोटो लिंक"><br>
        <textarea id="content" placeholder="कंटेंट"></textarea><br>
        <button onclick="addPost()">पोस्ट पब्लिश करें</button>
        <div id="post-list"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-auth.js";
        import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

        // अपना Firebase Config यहाँ डालें
        const firebaseConfig = { /* ... */ };
        initializeApp(firebaseConfig);

        const auth = getAuth();
        const db = getDatabase();
        const MASTER_EMAIL = "Sachinrajput29204@gmail.com"; 

        document.getElementById('google-login').onclick = () => {
            const provider = new GoogleAuthProvider();
            signInWithPopup(auth, provider).then((result) => {
                checkEmail(result.user.email);
            });
        };

        function checkEmail(email) {
            if (email === MASTER_EMAIL) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                loadPosts();
            } else {
                alert("एक्सेस डिनाइड: यह ईमेल ऑथोराइज्ड नहीं है!");
                auth.signOut();
            }
        }

        // पोस्ट पब्लिश
        window.addPost = () => {
            push(ref(db, 'posts/'), {
                title: document.getElementById('title').value,
                img: document.getElementById('imgUrl').value,
                body: document.getElementById('content').value
            });
        };

        // पोस्ट्स को एडिट और डिलीट करना
        function loadPosts() {
            onValue(ref(db, 'posts/'), (snapshot) => {
                const list = document.getElementById('post-list');
                list.innerHTML = "";
                snapshot.forEach((child) => {
                    const post = child.val();
                    list.innerHTML += `
                        <div style="border:1px solid #000; padding:10px; margin:5px;">
                            <h4>${post.title}</h4>
                            <button onclick="deletePost('${child.key}')">डिलीट करें</button>
                        </div>`;
                });
            });
        }

        window.deletePost = (id) => {
            if(confirm("क्या आप इसे हटाना चाहते हैं?")) remove(ref(db, 'posts/' + id));
        };
    </script>
</body>
</html>
