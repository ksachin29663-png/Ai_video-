<script>

async function callAI(prompt) {
  const seed = Math.floor(Math.random() * 99999);
  const encodedPrompt = encodeURIComponent(prompt);
  const url = 'https://text.pollinations.ai/' + encodedPrompt + '?model=openai&seed=' + seed;
  const res = await fetch(url);
  if (!res.ok) if(res.status===429)throw new Error('rate_limit'); throw new Error('API error: '+res.status);
  const text = await res.text();
  if (!text || text.trim().length < 5) throw new Error('Response खाली है, दोबारा try करो');
  return text.trim();
}




const state={budget:'Zero/Very Low (₹0-5000)',btype:'Online'};
function pick(el,key){document.querySelectorAll('[onclick*="pick(this,\''+key+'\'"]').forEach(e=>e.classList.remove('active'));el.classList.add('active');state[key]=el.dataset.val;}
async function generate(){
  const btn=document.getElementById('btn');btn.disabled=true;btn.textContent='⏳ Ideas बन रहे हैं...';
  document.getElementById('err').style.display='none';
  const prompt=`You are a business consultant. Give 3 detailed business ideas in Hindi for:
Skills/Interest: ${document.getElementById('interest').value||'General'}
Budget: ${state.budget}
Type: ${state.btype}
Location: ${document.getElementById('city').value||'India'}
Target Customers: ${document.getElementById('target').value||'General public'}

For each idea include:
1. Business Name & Description
2. How to Start (Step by step)
3. Investment Needed
4. Expected Monthly Income
5. Marketing Tips
6. Challenges & Solutions

Write everything in clear Hindi. Use emojis. Make it practical and actionable.`;
  try{
    const _aiResult = await callAI(prompt);
    document.getElementById('result').textContent=_aiResult;
    document.getElementById('resultCard').style.display='block';
    document.getElementById('resultCard').scrollIntoView({behavior:'smooth'});
  }catch(e){const err=document.getElementById('err');err.textContent='❌ '+e.message;err.style.display='block';}
  finally{btn.disabled=false;btn.textContent='💡 Business Ideas Generate करो';}
}
function copyText(){navigator.clipboard.writeText(document.getElementById('result').textContent).then(()=>alert('Copied! 📋'));}
</script>
