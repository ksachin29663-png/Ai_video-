<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>लाइव स्कोरकार्ड</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 5px;
            text-align: center;
        }
        /* छोटा और कॉम्पैक्ट स्कोरबोर्ड */
        .live-scoreboard {
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 8px;
        }
        .live-tag {
            background-color: #ef4444;
            color: white;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: bold;
            animation: blink 1.5s infinite;
            display: inline-block;
        }
        @keyframes blink { 50% { opacity: 0.5; } }
        .match-title { font-size: 12px; color: #cbd5e1; margin-top: 3px; font-weight: bold; }
        .score { font-size: 28px; font-weight: bold; margin: 5px 0; }
        .status { color: #f59e0b; font-weight: bold; font-size: 13px; }
        
        /* देशों के नाम */
        .teams-section {
            display: table;
            width: 100%;
            background-color: #1e293b;
            border-radius: 8px;
            padding: 8px;
            margin-bottom: 8px;
        }
        .team-cell {
            display: table-cell;
            width: 45%;
            vertical-align: middle;
            font-size: 15px;
            font-weight: bold;
        }
        
        /* नीचे जानकारी सेक्शन */
        .info-section {
            background-color: #1e293b;
            border-radius: 8px;
            padding: 10px;
            text-align: left;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="live-scoreboard">
        <span class="live-tag">● LIVE</span>
        <div class="match-title">IND vs AFG - T20 मुकाबला</div>
        <div class="score" id="score-display">0 / 0 <span style="font-size: 16px; font-weight: normal;">(0.0 Over)</span></div>
        <div class="status" id="status-display">लोड हो रहा है...</div>
    </div>

    <div class="teams-section">
        <div class="team-cell" style="color: #3b82f6; text-align: right; padding-right: 15px;">🇮🇳 भारत (IND)</div>
        <div class="team-cell" style="color: #f59e0b; width: 10%; text-align: center;">VS</div>
        <div class="team-cell" style="color: #ef4444; text-align: left; padding-left: 15px;">🇦🇫 अफगानिस्तान (AFG)</div>
    </div>

    <div class="info-section">
        <div id="commentary-display" style="color: #cbd5e1; line-height: 1.5;">
            कनेक्ट हो रहा है...
        </div>
    </div>

    <script>
        // आपकी शीट की फिक्स्ड आईडी
        const SHEET_ID = '1XAU85TH4lkw03uetVfDW-bv6t3qtdcBvdD6pzgpmcgo'; 
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

        async function fetchLiveScore() {
            try {
                const response = await fetch(SHEET_URL);
                const text = await response.text();
                
                const jsonData = JSON.parse(text.substr(47).slice(0, -2));
                const row = jsonData.table.rows[0].c; // Row 2 का डेटा

                const runs = row[0] ? row[0].v : '0';
                const wickets = row[1] ? row[1].v : '0';
                const overs = row[2] ? row[2].v : '0.0';
                const status = row[3] ? row[3].v : '';
                const commentary = row[4] ? row[4].v : '';

                // स्क्रीन अपडेट - सिर्फ वही दिखेगा जो आप शीट में भरेंगे
                document.getElementById('score-display').innerHTML = `${runs} / ${wickets} <span style="font-size: 16px; font-weight: normal;">(${overs} Over)</span>`;
                document.getElementById('status-display').innerText = status;
                document.getElementById('commentary-display').innerHTML = commentary.replace(/\n/g, '<br>');

            } catch (error) {
                console.error("डेटा एरर:", error);
            }
        }

        // हर 3 सेकंड में ऑटोमैटिक अपडेट
        setInterval(fetchLiveScore, 3000);
        fetchLiveScore();
    </script>
</body>
</html>
