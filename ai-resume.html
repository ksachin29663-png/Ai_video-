<script>

async function callAI(prompt) {
  const seed = Math.floor(Math.random() * 99999);
  const encodedPrompt = encodeURIComponent(prompt);
  const url = 'https://text.pollinations.ai/' + encodedPrompt + '?model=openai&seed=' + seed;
  const res = await fetch(url);
  if (!res.ok) throw new Error('API error: ' + res.status);
  const text = await res.text();
  if (!text || text.trim().length < 5) throw new Error('Response खाली है, दोबारा try करो');
  return text.trim();
}




async function generate(){
  const btn=document.getElementById('btn');btn.disabled=true;btn.textContent='⏳ बन रहा है...';
  document.getElementById('err').style.display='none';
  const name=document.getElementById('name').value.trim()||'Candidate';
  const phone=document.getElementById('phone').value.trim();
  const email=document.getElementById('email').value.trim();
  const loc=document.getElementById('loc').value.trim();
  const jobtitle=document.getElementById('jobtitle').value.trim()||'Professional';
  const edu=document.getElementById('edu').value.trim();
  const exp=document.getElementById('exp').value.trim();
  const skills=document.getElementById('skills').value.trim();
  const jobtype=document.getElementById('jobtype').value;
  const prompt=`Create a professional resume in plain text format for:
Name: ${name} | Phone: ${phone} | Email: ${email} | Location: ${loc}
Target Role: ${jobtitle} | Type: ${jobtype}
Education: ${edu||'Not provided'}
Experience: ${exp||'Not provided'}
Skills: ${skills||'Not provided'}

Format it as a clean, ATS-friendly resume with sections:
HEADER (Name, Contact)
OBJECTIVE (2-3 lines tailored to the role)
EDUCATION
EXPERIENCE (or PROJECTS for fresher)
SKILLS
Use proper formatting with separators. Keep it professional and concise.`;
  try{
    const _aiResult = await callAI(prompt);
    document.getElementById('result').textContent=_aiResult;
    document.getElementById('resultCard').style.display='block';
    document.getElementById('resultCard').scrollIntoView({behavior:'smooth'});
  }catch(e){const err=document.getElementById('err');err.textContent='❌ '+e.message;err.style.display='block';}
  finally{btn.disabled=false;btn.textContent='📄 Resume बनाओ';}
}
function copyText(){navigator.clipboard.writeText(document.getElementById('result').textContent).then(()=>alert('Copied! 📋'));}
function printResume(){const w=window.open('','_blank');w.document.write('<pre style="font-family:monospace;font-size:12px;padding:20px">'+document.getElementById('result').textContent+'</pre>');w.print();}
</script>
