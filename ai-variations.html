        .gen-btn:hover { box-shadow: 0 0 24px rgba(250,204,21,0.4); transform: translateY(-1px); }
        .gen-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        @keyframes spin { to { transform: rotate(360deg); } }
        .spin-txt { color: #facc15; font-size: 0.85rem; }

        .variation-img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; background: #111; }
        .variation-footer { padding: 10px 12px; display: flex; justify-content: space-between; align-items: center; }

    <a href="index.html" class="back-btn">←</a>
    <div>
        <div class="page-title">🎲 AI Image Variations Generator</div>
        <div class="page-sub">एक फोटो से 3 अलग Artistic Variations बनाओ</div>
    </div>
</header>
<main>
    <div class="card">
        <div class="card-title">Step 1 — फोटो अपलोड करें & विवरण दें</div>
        <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">🖼️</div>
            <div class="upload-text"><b>Reference फोटो अपलोड करें</b></div>
            <input type="file" id="fileInput" accept="image/*" onchange="loadImg(event)">
        </div>
        <img id="previewImg" class="preview-img" alt="Preview">
        <textarea class="desc" id="descInput" placeholder="फोटो का विवरण दें — जैसे: A young Indian woman in traditional dress, outdoor, golden light..."></textarea>

        <div class="variation-styles">
            <div class="vs-label">Step 2 — 3 Variations के Styles चुनें</div>
            <div class="vs-row">
                <div class="vs-set">
                    <div class="vs-set-title">Variation 1</div>
                    <button class="vs-option selected" data-slot="1" data-prompt="photorealistic, 8K, DSLR, cinematic lighting">Realistic</button>
                    <button class="vs-option" data-slot="1" data-prompt="anime style, vibrant, manga illustration">Anime</button>
                    <button class="vs-option" data-slot="1" data-prompt="oil painting, impressionist, artistic">Oil Paint</button>
                    <button class="vs-option" data-slot="1" data-prompt="cyberpunk, neon lights, futuristic">Cyberpunk</button>
                </div>
                <div class="vs-set">
                    <div class="vs-set-title">Variation 2</div>
                    <button class="vs-option selected" data-slot="2" data-prompt="3D render, Pixar cartoon, vibrant">3D Cartoon</button>
                    <button class="vs-option" data-slot="2" data-prompt="watercolor painting, soft, artistic">Watercolor</button>
                    <button class="vs-option" data-slot="2" data-prompt="pencil sketch, detailed, black and white">Sketch</button>
                    <button class="vs-option" data-slot="2" data-prompt="fantasy art, magical, ethereal glow">Fantasy</button>
                </div>
                <div class="vs-set">
                    <div class="vs-set-title">Variation 3</div>
                    <button class="vs-option selected" data-slot="3" data-prompt="pop art, bold colors, comic style">Pop Art</button>
                    <button class="vs-option" data-slot="3" data-prompt="minimal flat design, vector, clean">Minimal</button>
                    <button class="vs-option" data-slot="3" data-prompt="vintage film photo, grain, retro">Vintage</button>
                    <button class="vs-option" data-slot="3" data-prompt="surreal digital art, dreamlike, glowing">Surreal</button>
                </div>
            </div>
        </div>

        <button class="gen-btn" id="genBtn" onclick="generateVariations()" disabled>🎲 3 Variations बनाएं</button>
    </div>

    <div class="card" id="resultCard" style="display:none">
        <div class="card-title">✅ आपकी 3 Variations तैयार हैं!</div>
        <div class="spinner-box" id="spinnerBox">
            <div class="spin-ring"></div>
            <div class="spin-txt" id="spinTxt">⏳ Variations बन रही हैं... (1/3)</div>
        </div>
        <div class="variations-grid" id="variationsGrid"></div>
    </div><!-- Mid-Page Ad -->

<script>
    var selectedStyles = { 1: 'photorealistic, 8K, DSLR, cinematic lighting', 2: '3D render, Pixar cartoon, vibrant', 3: 'pop art, bold colors, comic style' };
    var variationUrls = {};

    document.querySelectorAll('.vs-option').forEach(btn => {
        btn.addEventListener('click', function() {
            const slot = this.dataset.slot;
            document.querySelectorAll(`.vs-option[data-slot="${slot}"]`).forEach(b => b.classList.remove('selected'));
            this.classList.add('selected');
            selectedStyles[slot] = this.dataset.prompt;
        });
    });

    function loadImg(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            document.getElementById('previewImg').src = e.target.result;
            document.getElementById('previewImg').style.display = 'block';
            document.getElementById('genBtn').disabled = false;
        };
        reader.readAsDataURL(file);
    }

    function generateVariations() {
        const desc = document.getElementById('descInput').value.trim();
        if (!desc) { alert('कृपया फोटो का विवरण लिखें!'); return; }
        document.getElementById('genBtn').disabled = true;
        document.getElementById('resultCard').style.display = 'block';
        document.getElementById('spinnerBox').style.display = 'block';
        document.getElementById('variationsGrid').innerHTML = '';
        document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth' });

        const slots = [1, 2, 3];
        const labels = ['Variation 1', 'Variation 2', 'Variation 3'];

        // Create loading placeholders
        slots.forEach((_, i) => {
            const lc = document.createElement('div');
            lc.className = 'loading-card';
            lc.id = 'loadCard' + (i + 1);
            lc.innerHTML = `<div class="mini-spin"></div><span>${labels[i]}</span>`;
            document.getElementById('variationsGrid').appendChild(lc);
        });

        let completed = 0;
        slots.forEach((slot, i) => {
            const style = selectedStyles[slot];
            const seed = Math.floor(Math.random() * 999999);
            const prompt = `${desc}, ${style}, high quality, detailed, 4K`;
            const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=768&height=768&nologo=true&seed=${seed}`;
            variationUrls[i + 1] = url;

            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = function() {
                completed++;
                document.getElementById('spinTxt').textContent = `⏳ Variations बन रही हैं... (${completed}/3)`;
                const lc = document.getElementById('loadCard' + (i + 1));
                if (lc) lc.remove();
                const vc = document.createElement('div');
                vc.className = 'variation-card';
                vc.innerHTML = `
                    <img src="${url}" class="variation-img" alt="${labels[i]}">
                    <div class="variation-footer">
                        <span class="variation-label">${labels[i]}</span>
                        <button class="var-dl-btn" onclick="downloadVar(${i+1}, '${url}')">📥 Save</button>
                    </div>`;
                document.getElementById('variationsGrid').appendChild(vc);
                if (completed === 3) {
                    document.getElementById('spinnerBox').style.display = 'none';
                    document.getElementById('genBtn').disabled = false;
                }
            };
            img.onerror = function() {
                completed++;
                const lc = document.getElementById('loadCard' + (i + 1));
                if (lc) lc.innerHTML = '<span style="color:#ef4444;font-size:0.75rem;padding:10px;">❌ फेल</span>';
                if (completed === 3) {
                    document.getElementById('spinnerBox').style.display = 'none';
                    document.getElementById('genBtn').disabled = false;
                }
            };
            img.src = url;
        });
    }

    function downloadVar(num, url) {
        const a = document.createElement('a');
        a.download = `sachin-ai-variation-${num}.png`;
        a.href = url;
        a.target = '_blank';
        a.click();
    }
</script>
