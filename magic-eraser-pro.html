<main>
    <div class="card">
        <div class="card-title">Step 1 — फोटो अपलोड करें</div>
        <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">📸</div>
            <div class="upload-text"><b>फोटो अपलोड करें</b> — जिसमें कुछ मिटाना हो</div>
            <input type="file" id="fileInput" accept="image/*" onchange="loadImg(event)">
        </div>

        <div id="editorSection" style="display:none;">
            <div class="hint-box" style="margin-top:12px;">
                <b>Instructions:</b> जो मिटाना हो उसे <b style="color:#fb7185">लाल ब्रश</b> से पेंट करें → फिर "Magic Erase" बटन दबाएं। Undo के लिए Ctrl+Z या ↩ button।
            </div>

            <div class="toolbar">
                <div class="tool-group">
                    <button class="tool-btn active" id="brushTool" onclick="setTool('brush')">🖊 Brush</button>
                    <button class="tool-btn" id="fillTool" onclick="setTool('fill')">🪣 Fill</button>
                    <button class="tool-btn" id="eraseTool" onclick="setTool('erasebrush')">⬜ Eraser</button>
                </div>
                <div class="tool-sep"></div>
                <div class="tool-group">
                    <span class="tool-btn" style="cursor:default;border:none;background:none;color:#94a3b8;padding-right:4px;">Size:</span>
                    <input type="range" class="brush-slider" id="brushSize" min="4" max="80" value="22">
                    <span class="brush-size-label" id="sizeLabel">22</span>
                </div>
                <div class="tool-sep"></div>
                <div class="tool-group">
                    <select class="opacity-select" id="brushOpacity">
                        <option value="1">100%</option>
                        <option value="0.8">80%</option>
                        <option value="0.6">60%</option>
                        <option value="0.4">40%</option>
                    </select>
                </div>
                <div class="tool-sep"></div>
                <div class="tool-group">
                    <button class="tool-btn" onclick="undoLast()">↩ Undo</button>
                    <button class="tool-btn" onclick="clearMask()">🗑 Clear</button>
                </div>
                <span class="mode-indicator" id="modeIndicator">✏ Brush Mode</span>
            </div>

            <div class="canvas-container" id="canvasContainer">
                <canvas id="mainCanvas"></canvas>
            </div>

            <div class="action-row">
                <button class="erase-btn" id="eraseBtn" onclick="magicErase()">🪄 Magic Erase</button>
                <button class="sec-btn" onclick="clearMask()">↩ Clear</button>
                <button class="sec-btn" onclick="document.getElementById('fileInput').click()">📷 New</button>
            </div>
        </div>
    </div>

    <div class="card" id="resultCard" style="display:none">
        <div class="card-title">✅ Object Removed!</div>
        <div class="result-section" id="resultSection">
            <img id="resultImg" class="result-img" alt="Result">
        </div>
        <button class="dl-btn" onclick="downloadResult()">📥 Result डाउनलोड करें</button>
        <button class="erase-btn" style="margin-top:10px;background:rgba(251,113,133,0.12);color:#fb7185;border:1px solid rgba(251,113,133,0.3);" onclick="continueEditing()">✏ और मिटाएं</button>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    let originalImg = null, isDrawing = false;
    let currentTool = 'brush';
    let history = [];
    let resultDataUrl = null;

    document.getElementById('brushSize').addEventListener('input', function() {
        document.getElementById('sizeLabel').textContent = this.value;
    });

    document.addEventListener('keydown', e => { if ((e.ctrlKey || e.metaKey) && e.key === 'z') undoLast(); });

    function setTool(t) {
        currentTool = t;
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(t === 'brush' ? 'brushTool' : t === 'fill' ? 'fillTool' : 'eraseTool').classList.add('active');
        canvas.style.cursor = t === 'erasebrush' ? 'cell' : t === 'fill' ? 'crosshair' : 'crosshair';
        const labels = { brush: '✏ Brush Mode', fill: '🪣 Fill Mode', erasebrush: '⬜ Eraser Mode' };
        document.getElementById('modeIndicator').textContent = labels[t];
    }

    function loadImg(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            originalImg = new Image();
            originalImg.onload = () => {
                const maxW = Math.min(originalImg.width, 800);
                const scale = maxW / originalImg.width;
                canvas.width = originalImg.width * scale;
                canvas.height = originalImg.height * scale;
                ctx.drawImage(originalImg, 0, 0, canvas.width, canvas.height);
                history = [ctx.getImageData(0, 0, canvas.width, canvas.height)];
                document.getElementById('canvasContainer').style.display = 'block';
                document.getElementById('editorSection').style.display = 'block';
                document.getElementById('resultCard').style.display = 'none';
            };
            originalImg.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function saveHistory() {
        if (history.length > 20) history.shift();
        history.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
    }

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const sx = canvas.width / rect.width;
        const sy = canvas.height / rect.height;
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: (cx - rect.left) * sx, y: (cy - rect.top) * sy };
    }

    function paint(e) {
        if (!isDrawing) return;
        e.preventDefault();
        const pos = getPos(e);
        const size = parseInt(document.getElementById('brushSize').value);
        const opacity = parseFloat(document.getElementById('brushOpacity').value);

        if (currentTool === 'erasebrush') {
            // Restore original pixels in brush area
            ctx.save();
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, size, 0, Math.PI * 2);
            ctx.clip();
            ctx.drawImage(originalImg, 0, 0, canvas.width, canvas.height);
            ctx.restore();
        } else {
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(251,113,133,${opacity})`;
            ctx.fill();
        }
    }

    function floodFill(x, y) {
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const d = imageData.data;
        const tx = Math.round(x), ty = Math.round(y);
        const ti = (ty * canvas.width + tx) * 4;
        const tr = d[ti], tg = d[ti+1], tb = d[ti+2];
        if (tr > 200 && tg < 100 && tb < 100) return; // already masked
        const stack = [[tx, ty]];
        const visited = new Uint8Array(canvas.width * canvas.height);
        while (stack.length) {
            const [cx, cy] = stack.pop();
            if (cx < 0 || cx >= canvas.width || cy < 0 || cy >= canvas.height) continue;
            const idx = cy * canvas.width + cx;
            if (visited[idx]) continue;
            visited[idx] = 1;
            const i = idx * 4;
            const dr = Math.abs(d[i] - tr), dg = Math.abs(d[i+1] - tg), db = Math.abs(d[i+2] - tb);
            if (dr + dg + db > 80) continue;
            d[i] = 251; d[i+1] = 113; d[i+2] = 133; d[i+3] = 200;
            stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
        }
        ctx.putImageData(imageData, 0, 0);
    }

    canvas.addEventListener('mousedown', e => {
        isDrawing = true;
        if (currentTool === 'fill') {
            saveHistory();
            floodFill(getPos(e).x, getPos(e).y);
            isDrawing = false;
        } else {
            saveHistory();
            paint(e);
        }
    });
    canvas.addEventListener('mousemove', paint);
    canvas.addEventListener('mouseup', () => isDrawing = false);
    canvas.addEventListener('mouseleave', () => isDrawing = false);
    canvas.addEventListener('touchstart', e => { isDrawing = true; saveHistory(); paint(e); }, { passive: false });
    canvas.addEventListener('touchmove', paint, { passive: false });
    canvas.addEventListener('touchend', () => isDrawing = false);

    function undoLast() {
        if (history.length > 1) {
            history.pop();
            ctx.putImageData(history[history.length - 1], 0, 0);
        }
    }

    function clearMask() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(originalImg, 0, 0, canvas.width, canvas.height);
        history = [ctx.getImageData(0, 0, canvas.width, canvas.height)];
    }

    function magicErase() {
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const d = imageData.data;
        const masked = [];
        for (let i = 0; i < d.length; i += 4) {
            if (d[i] > 200 && d[i+1] < 120 && d[i+2] < 120) masked.push(i);
        }
        if (masked.length === 0) { alert('पहले लाल ब्रश से मिटाने वाले हिस्से को मार्क करें!'); return; }

        // Multi-pass inpainting from surrounding area
        for (let pass = 0; pass < 5; pass++) {
            for (const idx of masked) {
                const px = idx / 4;
                const x = px % canvas.width, y = Math.floor(px / canvas.width);
                let r = 0, g = 0, b = 0, cnt = 0;
                const radius = 12 + pass * 4;
                for (let dy = -radius; dy <= radius; dy += 3) {
                    for (let dx = -radius; dx <= radius; dx += 3) {
                        const nx = x + dx, ny = y + dy;
                        if (nx < 0 || nx >= canvas.width || ny < 0 || ny >= canvas.height) continue;
                        const ni = (ny * canvas.width + nx) * 4;
                        if (d[ni] > 200 && d[ni+1] < 120 && d[ni+2] < 120) continue;
                        r += d[ni]; g += d[ni+1]; b += d[ni+2]; cnt++;
                    }
                }
                if (cnt > 0) { d[idx] = r/cnt; d[idx+1] = g/cnt; d[idx+2] = b/cnt; d[idx+3] = 255; }
            }
        }

        // Smooth the inpainted region
        for (let pass = 0; pass < 2; pass++) {
            for (const idx of masked) {
                const px = idx / 4;
                const x = px % canvas.width, y = Math.floor(px / canvas.width);
                let r = 0, g = 0, b = 0, cnt = 0;
                for (let dy = -2; dy <= 2; dy++) {
                    for (let dx = -2; dx <= 2; dx++) {
                        const nx = x + dx, ny = y + dy;
                        if (nx < 0 || nx >= canvas.width || ny < 0 || ny >= canvas.height) continue;
                        const ni = (ny * canvas.width + nx) * 4;
                        r += d[ni]; g += d[ni+1]; b += d[ni+2]; cnt++;
                    }
                }
                if (cnt > 0) { d[idx] = r/cnt; d[idx+1] = g/cnt; d[idx+2] = b/cnt; }
            }
        }

        ctx.putImageData(imageData, 0, 0);
        resultDataUrl = canvas.toDataURL('image/jpeg', 0.95);
        document.getElementById('resultImg').src = resultDataUrl;
        document.getElementById('resultSection').style.display = 'block';
        document.getElementById('resultCard').style.display = 'block';
        document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth' });
    }

    function continueEditing() {
        document.getElementById('resultCard').style.display = 'none';
        canvas.scrollIntoView({ behavior: 'smooth' });
    }

    function downloadResult() {
        if (!resultDataUrl) return;
        const a = document.createElement('a');
        a.download = 'sachin-ai-magic-erased.jpg';
        a.href = resultDataUrl;
        a.click();
    }
</script>
